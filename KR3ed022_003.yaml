body:
  text: 惡阻論治內經云陰搏陽別謂之有子三部脈浮沉正等無病者乃知有娠也妊既受矣多病惡阻惡阻者世諺所謂惡食是也此由婦人本虛平時喜怒不節當風取冷中脘宿有痰飲受妊經血既閉飲血相搏氣不宣通遂致心下憒悶頭暈眼花四肢沉重懈怠惡聞食氣喜食鹹酸多臥少起甚則吐逆不自勝持治療之法順氣理血豁痰導水然後平安矣參橘散治妊娠三月惡阻吐逆不食或心虛煩悶赤茯苓去皮橘皮去白各一兩麥門冬去心白朮川厚朴薑汁製炒人參甘草炙以上各半兩上㕮咀每服四錢重水一盞半生薑七片刮竹茹如指大煎至七分去滓溫服不拘時候旋覆半夏湯治妊娠惡阻病心中憒悶吐逆不食惡聞食氣頭暈四肢百節煩痛多臥少起旋覆花去枝萼芎藭細辛洗去土人參甘草炙以上各半兩半夏湯泡七次赤茯苓去皮當歸去蘆酒浸乾生薑陳皮去白以上各一兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候人參半夏丸治妊娠惡阻病醋心胸中冷腹痛吐逆不喜飲食半夏湯泡七次人參乾生薑以上各半兩上為細末以生地黃汁浸蒸餅為丸如梧桐子大每服四十丸用米飲送下不拘時候縮砂散治妊娠胃虛氣逆嘔吐不食縮砂仁不拘多少上為細末每服二錢入生薑自然汁少許沸湯點服不拘時候子煩論治妊娠四月六月多苦煩悶按醫經四月受少陰君火氣以養精六月受少陽相火氣以養氣所以如是又有不拘此二月而苦煩悶者由母將理失宜七情傷感心驚膽怯而然也麥門冬湯治妊娠心驚膽怯煩悶名曰子煩麥門冬去心防風白茯苓去皮以上各一兩人參半兩上㕮咀每服四錢水一盞半生薑五片入淡竹葉十片煎至八分去滓溫服不拘時候滑胎論治懷妊十月形體就成八月合進瘦胎易産之藥今世多用枳殼散非為不是若胎氣肥實可以服之況枳殼大能瘦胎胎氣本怯豈宜又瘦之也不若進救生散安胎益氣令子緊小無病易産又且多穩當救生散安胎益氣易産人參訶子煨去核麥糵炒白朮銼炒神麯炒橘紅炒上六味等分為細末每服三錢水一盞煎至七分空心食前溫服校正時賢胎前十八論治第一問妊娠三兩月胎動不安者何答曰男女陰陽會通血氣調勻乃成其孕設若下血腹痛蓋由於子宮久虛致令胎墮其危甚於正産若妊娠曾受此苦可預服杜仲丸以養胎杜仲丸杜仲去皮銼薑汁浸炒去絲川續斷酒浸各一兩上為細末棗肉煮爛杵和為丸如梧桐子大每服七十丸空心用米飲送下日二服第二問胎動腹痛者何答曰胎動腹痛其理不一或緣飲食冷熱動風毒物或因再交搖動骨節傷犯胞胎其候多嘔氣不調和或服熱藥太過氣血相搏急服順氣藥安胎不然變成漏胎則難療矣如聖丸鯉魚皮當歸去蘆酒浸熟地黃酒蒸阿膠銼蛤粉炒成珠白芍藥川芎川續斷酒浸甘草炙各等分上㕮咀每服四錢水一盞半入苧根少許生薑五片煎至七分去滓空心食前溫服第三問胎漏經血妄行者何答曰妊娠成形胎息未實或因房室驚觸勞力過度傷動胞胎或食毒物致令子宮虛滑經血淋瀝若不急治敗血湊心子母難保日漸胎干危亡不久桑寄生散治妊娠胎動不安下血不止桑寄生當歸去蘆酒浸川續斷酒浸芎藭香附子炒去毛阿膠銼蛤粉炒如珠子大茯神去木白朮以上各一兩人參半兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候佛手散治妊娠自四五月至七月因而築磕口噤欲絶用此藥探之若不損則痛止子母俱安若已損立便逐下當歸去蘆酒浸芎藭各一兩上二件㕮咀每服四錢酒一盞煎令欲干卻入水一盞再煎三二沸去滓溫服如口噤者時時灌下如人行五七里再進一服不過三服便生也膠艾湯治妊娠不問月數淺深因頓僕胎動不安腰腹疼痛或胎奔上刺心短氣熟地黃洗艾葉炒白芍藥川芎黃耆去蘆阿膠銼蛤粉炒成珠子當歸去蘆酒浸甘草炙以上各一兩上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服食前安胎散治妊娠從高墜下或為重物所壓觸動胎氣腹痛下血服此藥後覺胎動極熱胎已安矣縮砂不拘多少上於尉斗內炒令熱透卻去皮取仁研為細末每服二錢熱酒調服不飲酒煎艾鹽湯調服米飲亦可不拘時候第四問妊娠面赤口苦舌乾心煩腹脹者何答曰蓋緣恣情飲酒因食桃梨李羊雞面魚膻腥毒物致令百節痠痛大小便結澀可服歸涼節命散歸涼節命散川芎苧根白芍藥麥門冬去心當歸去蘆酒浸白朮各一兩糯米半合甘草炙半兩上㕮咀每服四錢水一盞半煎至一盞去滓溫服不拘時候大腹皮散治妊娠大小便赤澀枳殼去瓤麩炒大腹皮甘草炙各一錢赤茯苓去皮三錢上四味為細末每服二錢濃煎蔥白湯調下不拘時候冬葵子散治妊娠小便不利身重惡寒起則眩暈及水腫冬葵子三錢赤茯苓去皮二錢上為細末每服三錢米飲調服不拘時候利則住服如不通恐是轉胞加發灰少許神效曾有妊婦腹脹小便不利吐逆諸醫雜進溫脾胃寬氣去脹等劑服之反吐藥物不納轉加脹滿揍心驗之胎死腹中又服諸下胎藥不能通解舉家憂惶因得鯉魚湯論曰腳腫俗呼為皺腳亦有通身腫滿心胸急脹名曰胎水遂去妊婦心前衣服看之胸肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎可謂更生之人矣此證蓋緣懷身腹大妊娠不自知覺人人皆以謂身娠如此終不以為胎水病醫人何以得知故書此諭病家自當覺察鯉魚湯當歸去蘆酒浸白芍藥各三錢白茯苓去皮四錢白朮五錢上㕮咀每服四錢用鯉魚一尾不拘大小破洗鱗腸白水煮熟去魚每服用魚汁一盞半生薑七片橘皮少許同煎至一盞空心服如胎水去未盡再合服第五問胎冷腹脹虛痛兩脅虛鳴臍下冷疼欲泄小便頻數大便虛滑者何答曰胎氣既全子形成質或食瓜果甘甜飲冷不時之物當風取涼受不時之氣則令胎冷子身不能安處皮毛疼痛筋骨拘急手足攣拳致使母有此危證急服安胎和氣散安胎和氣散訶子麵裹煨去核白朮各一兩陳皮去白高良薑銼炒木香不見火白芍藥陳米炒甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候忌生冷物第六問妊娠心神忪悸睡里多驚兩脅膨脹腹滿連臍急痛坐臥不寧氣急逼迫胎驚者何答曰胎氣既成五臟安養皆因氣悶或為喧呼心忪悸亂致令胎驚筋骨傷痛四大不安急煎大聖散安保胎孕則無危矣大聖散白茯苓去皮川芎麥門冬去心黃耆去蘆蜜水炙當歸去蘆酒浸各一兩木香不見火人參甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候紫蘇飲治胎氣不和湊上心腹脹滿疼痛謂之子懸大腹皮川芎白芍藥陳皮去白紫蘇葉當歸去蘆酒浸各一兩人參甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片蔥白七寸煎至七分去滓溫服空心第七問懷孕月數未滿半産者何答曰本因臟腑虛微氣衰血弱病起相感精氣攻衝侵損榮衛有傷胞胎以致損落名曰半産急宜補治可保安寧稍緩變成虛勞不可醫也芎藭補中湯養新血去瘀血補虛扶危乾薑炮阿膠銼蛤粉炒芎藭五味子各一兩黃耆去蘆蜜水炙當歸去蘆酒浸白朮赤芍藥各一兩半木香不見火人參杜仲去皮銼炒甘草炙各半兩上㕮咀每服四錢水一盞半煎至一盞去滓通口服不拘時候第八問妊娠小便淋瀝者何答曰本因調攝失宜子臟氣虛蓋緣酒色過度傷其血氣致水臟閉澀遂成淋瀝名曰子淋宜服安榮散通利小便安榮散麥門冬去心通草滑石各一二錢當歸去蘆酒浸燈心甘草炙各半兩人參細辛洗各一錢上為細末每服三錢煎麥門冬湯調服不拘時候桑螵蛸散治妊娠小便不禁桑螵蛸十二個炙上為細末每服二錢空心食前米飲調服白薇散治妊娠遺尿不知出白薇白芍藥上等分為細末每服二錢食前酒調服第九問妊娠下痢赤白者何答曰蓋因冷物傷脾辛酸損胃冷熱不謂胎氣不安氣血凝滯下痢頻頻時有時無或赤或白腸鳴後重穀道疼痛急服蒙薑黃連丸不問冷熱二證皆可服之蒙薑黃連丸乾薑炮黃連去須縮砂仁炒芎藭阿膠銼蛤粉炒白朮各一兩乳香別研三錢枳殼去瓤炒半兩上為細末用鹽梅三個取肉入少醋糊同杵勻和如梧桐子大每服四十丸白痢乾薑湯下赤痢甘草湯下赤白痢乾薑甘草湯下並不拘時候當歸芍藥湯治妊娠腹中㽱痛下痢心下急滿白芍藥白茯苓當歸去蘆酒浸澤瀉川芎以上各一兩白朮一兩半上為細末每服三錢溫酒調服米飲亦可空心食前忌生冷第十問妊娠外感風寒渾身壯熱眼暈頭旋者何如答曰蓋因風寒客於皮膚傷於榮衛或洗項背或當風取涼致令頭目昏痛憎寒發熱甚至心胸煩悶大抵産前二命所繫不可輕易妄投湯劑感冒之初止宜進芎蘇散以發散表邪其病自愈芎蘇散紫蘇葉川芎白芍藥白朮麥門冬去心陳皮去白乾葛以上各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片蔥白二寸煎至八分去滓溫服不拘時候百合散治妊娠風熱相交咳嗽痰多心胸滿悶百合蒸紫菀茸洗貝母去心白芍藥前胡赤茯苓去皮桔梗去蘆炒各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候羚羊角散治妊娠中風頭項強直筋脈攣急言語蹇澀痰涎不消或發搐不省人事名曰子癇亦宜服之羚羊角鎊川獨活去蘆酸棗仁炒去殼五加皮去木各半錢薏苡仁炒防風去蘆當歸去蘆酒浸川芎茯神去木杏仁去皮尖各四分木香不見火甘草炙各二分半上㕮咀每服四錢水一盞生薑五片煎至七分去滓溫服不拘時候第十一問妊娠瘧疾者何答曰榮衛虛弱脾胃不足或感風寒或傷生冷傳成瘧疾急服驅邪散莫待吐逆見物不思卒難醫療驅邪散高良薑銼炒白朮草果仁橘紅藿香葉縮砂仁白茯苓去皮各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至八分去滓溫服不拘時候第十二問妊娠喘急兩脅刺痛脹滿者何答曰蓋因五臟不利氣血虛羸因食生冷或發憎寒唇青面白筋脈拘攣骨節痠痛皮毛乾澀上氣喘急大便不通嘔吐頻頻平安散主之平安散厚朴去皮薑汁製生薑各二兩乾薑炮陳皮去白各一錢川芎半錢木香二分乾地黃洗一錢半甘草炙四錢上㕮咀每服四錢水一盞半入鹽一捻煎至一盞去滓通口服不拘時候亦宜服紫蘇飲方載第六問下第十三問妊娠頭旋目暈視物不見腮項腫核者何答曰蓋因胎氣有傷肝臟毒熱上攻太陽穴痛嘔逆背項拘急致令眼暈生花若加涎壅危在片時急煎消風散散之消風散石膏煅甘菊花去枝梗防風去蘆荊芥穗川羌活去蘆羚羊角鎊川芎大豆黃卷炒當歸去蘆酒洗白芷各一兩甘草炙半兩上㕮咀每服四錢水一盞半入好茶半錢煎至八分去滓通口服食後有一妊婦將臨月兩眼忽然失明燈火不見頭痛目暈項腮腫滿不能轉頸諸醫治療不瘥轉加危困偶得此方對證合之服病減七八獲安分娩其眼帶吊起人物不辨有人云只服四物湯加荊芥防風更於眼科對第四十九轆轤轉關證服天門冬飲子但以此二般藥間服目漸稍明大忌酒面煎炙燒爆雞羊鵝鴨豆腐辛辣一切毒食並房勞及稍溫藥如其不然眼不復明也蓋此證為懷身娠多居火閣衣著裀褥厚蓋伏熱在裡或服補藥因食熱物太過致令胎熱肝臟壅極風充入腦所致天門冬飲子天門冬去心知母茺蔚子各一兩防風去蘆半兩五味子茯苓去皮川羌活去蘆人參各七錢半上㕮咀每服四錢水一盞半生薑三片煎至八分去滓食後溫服第十四問小腹虛脹者何答曰因食硬物傷妊娠既受病傳於脾胃脾胃氣虛冷逼小腹狀若奔豚或腰重大便祕澀兩脅虛鳴宜服勝金散溫中下氣疾即安矣勝金散吳茱萸去枝梗酒浸炒陳皮去白乾生薑乾薑炮川芎各一錢半厚朴去皮薑炒縮砂仁炒甘草炙各三錢上為細末每服二錢鹽湯調服不拘時候第十五問將産忽見橫倒者何答曰不能忌口恣情多食五臟氣滯六腑不和胎氣既肥或用力太早胎受驚觸急用瘦胎金液丸其兒身自順生矣金液丸飛生毛火燒如腋下毛尤佳半錢血餘無病女人發燒灰公母羊糞燒灰各半錢灶中心土一錢黑鉛三錢用小銚子火上熔投水銀半錢急攪結成砂子傾出細研硃砂半錢別研上為細末用粽子角為丸如緑豆大遇難産急難以倒流水吞下五丸兒身自順則正産子母活矣催生鉛丹治橫逆難産黑鉛一錢小銚子火上熔投水銀二錢急攪結成砂子傾出用熟絹汗衫角紐作丸子如緑豆大臨蓐香水吞下二丸立便生上譬如停水滅火積年無用偶爾不虞乃救一時之急也所謂胎前數證危急産後亦然於病勢不無過慮家有妊婦正當預備先合臨産或當煎下若得幸而無恙有不須服湯散必是棄之其丸所費亦不為多催生如聖散黃蜀葵子不拘多少上為細末每服二錢用熱酒調服如不飲酒熱湯亦得香桂散下死胎麝香半錢別研官桂三錢為末上件和勻只作一服溫酒調服須臾如手推下第十六問欲産忽然氣血暈悶不省人事者何答曰本因用力太過脈理衰微精神困倦心胸痞悶眼暈口噤面青發直命在須臾急服靈藥來蘇散木香不見火神麯銼炒陳皮去白麥糵炒黃耆去蘆生薑切炒黑阿膠銼蛤粉炒白芍藥各一錢糯米一合半苧根洗淨三錢甘草炙二三錢上㕮咀每服四錢水一盞煎至八分去滓斡開口灌連接煎再灌知人事可謂更生之人也第十七問胞肥臨産難生者何答曰身居富貴口厭甘肥聚樂不常食物無度既飽便臥致令胞胎肥厚根蒂堅牢行動氣急蓋緣不曾預服瘦胎之藥致於臨産必是難生入月可服無憂散則易生矣無憂散當歸去蘆酒浸川芎白芍藥各三錢木香不見火甘草炙各一錢半枳殼去瓤麩炒乳香別研各三錢血餘發灰一錢半以獖豬心血和之上為細末每服二錢水一盞煎至八分日進二服不拘時候第十八問坐草驀然氣痿目翻口噤者何答曰蓋因恣意喜怒遂致衛竭榮枯胎轉難動坐草時用性過多腹痛又不能孰忍目翻口噤面黑唇青沫出口中子母俱殞若兩臉微紅子死母活用霹靂奪命丹急救之霹靂奪命丹蛇蛻一條入瓦瓷罐內煅千里馬路上左腳舊草鞋一雙淨洗燒灰一錢金銀箔各七片發灰一錢馬鳴蛻蠶蛻燒灰一錢乳香半錢別研黑鉛二錢半水銀七分半依十五問中法修用上細末以獖豬心血為丸如梧桐子大倒流水灌下二丸如灌不行化開灌效校正郭稽中産後二十一論治第一論曰熱病胎死腹中者何答曰因母患熱病至六七日以後臟腑熱極熏煮其胎是以致死緣兒死身冷不能自出但服黑神散暖其胎須臾胎氣溫暖即自出矣然又有不因病熱以致胎死者或因頓僕或從高墜下或因房屋驚觸或臨産驚動太早觸犯禁忌産時未到經血先下穢露已盡致胎乾子死腹中何以驗之但看産婦舌色青黑及舌上冷者是其候也疑二之際且進佛手散三二服探之若不死子母俱安若胎已死立便逐下的知其胎死則進香桂散須臾如手推下黑神散此方産後無所不治當歸去蘆酒浸芍藥乾薑炮官桂不見火甘草炙生地黃洗各一兩黑豆炒去皮淨二兩附子炮去皮臍半兩上研羅為細末每服二錢匕溫酒調下又方不用附子入蒲黃二物並用尤佳香桂散方載産前十五問下佛手散方載産前第三問下第二論曰胎衣不下者何答曰母生子訖血流入衣中衣為血所脹是故不得下治之稍緩脹滿腹中上衝心胸疼痛喘急者難治但服奪命丹以速去衣中之血血散脹消胎衣自下亦有胎初下後産婦力少不能更用氣力産胞經停遇風冷乘之血道閉澀故胎衣不下取黑豆二大合炒令熟入醋一大盞煎三五沸去滓分三服溫服或取鞋底灸熱尉小腹上下三五次立效奪命丹附子炮去皮臍半兩牡丹皮一兩乾漆一兩上為細末用酸醋一升大黃末一兩同熬成膏和藥丸如梧桐子大溫酒吞下五七丸不拘時候第三論曰難産者何答曰胎成之後子居腹中每食母血食血有餘遂成積塊謂之兒枕子欲生時血塊先破為敗血散裹其子所以難産當服勝金散要知胎成之後全在調攝常欲其氣道平順十月滿足則産無不順矣更有年少初産才覺腹痛便相告報旁人擾擾産婦驚怖不安心氣蓄結氣道不順以致難産宜服催生獨勝散及紫蘇飲順氣安胎衣破漿行須臾即勝勝金散麝香一錢鹽豉一兩舊青布袋裹燒令紅急以乳錘研令細上為細末取稱錘燒紅以酒淬之調下藥一錢匕催生獨勝散方載産前十五問下紫蘇散方載産前十六問下第四論曰産後血暈者何答曰産後血暈因産所下過多血氣虛極是故暈悶甚則昏塞不知人氣息欲絶暈悶不止則能斃人若作暗風治之誠為謬矣但服清魂散自瘥如芎藭湯黑龍丹皆要藥也或以乾漆燒煙沖其鼻更於産婦房屋中頻用醋炭為佳清魂散澤蘭葉人參去蘆各一兩荊芥穗四兩川芎二兩甘草炙八錢上為細末每服一錢重熱湯溫酒各小半盞調勻急灌之下咽喉則眼開氣定省人事芎藭湯及黑龍丹方並載産後雜病論治下第五論曰産後口乾痞悶者何答曰産後血氣暴虛脾胃頓弱食麵太早停聚胃脘面毒上熏於肺是從口乾煩悶心下痞滿宜服見現丸以消化之或有産後勞傷虛羸因事觸忤怒氣上逆以致胸膈痞塞口乾煩悶者亦宜服見現丸蓋其間藥味皆是順氣快膈之劑紫蘇飲亦可服之見現丸高良薑銼炒薑黃蓽澄茄陳皮去白莪朮炮切人參京三稜上為細末用蘿蔔慢火煮令爛研細將余汁煮麵糊和丸如梧桐子大不拘時候用蘿蔔湯吞下三十丸或加至五十丸第六論曰産後乍寒乍熱者何答曰因産勞傷氣血蓋血屬於陰氣屬於陽血氣一傷陰陽互相乘克所以乍寒乍熱此特論陰陽不和之所由致者亦有因産惡暴下少留滯胞胎亦令人寒熱但小腹痛急為異爾陰陽不和宜服增損四物湯敗血停留宜服奪命丹或黑龍丹增損四物湯並可進增損四物湯當歸去蘆酒浸白芍藥川芎乾薑炮人參各一兩甘草炙半兩上為㕮咀每服四錢重水一盞薑三片同煎至六分去滓微熱服不拘時候奪命丹方載産後第二論治下黑龍丹方載産後雜病論治下第七論曰産後四肢虛腫者何答曰母生子訖例服黑神散及芎藭湯者取其逐瘀血以生新血也倘惡露不盡停留胞絡生病多端輕者為脹為痛為寒為熱甚者脈不調閉斷不通久成血瘕以致尩羸有如産後面目四肢浮腫此由敗血兼虛停積於五臟循經流入四肢留淫日深腐壞如水致令浮腫醫者不審便作水氣治之投以甘遂大戟等藥以導其水虛之復虛因茲夭枉者多矣但服調經散血行腫消自然良已黑龍丹亦治産後浮腫血滯所致不可不知調經散沒藥別研琥珀別研各一錢肉桂不見火赤芍藥當歸去蘆酒浸各一兩麝香半錢別研細辛洗半錢甘草炙二錢上為細末每服半錢重生薑汁溫酒各少許調勻服黑龍丹方載産後雜病證治下第八論曰産後乍見鬼神者何答曰肝能藏血心能主血因産走耗其血勞動肝心敗血奔沖邪淫於心所以乍見鬼神言語顛倒非風邪也但服調經散加生龍腦一捻煎服得睡即安黑龍丹亦能治療調經散方載第七論下黑龍丹方載産後雜病證治下第九論曰産後不語者何答曰心者君主之官神明出焉內候血海外應於舌舌者心之機産後敗血停蓄上干於心心氣閉塞則舌強而不語矣但服八珍散自瘥八珍散人參石菖蒲生地黃酒蒸焙川芎各一兩硃砂別研防風去蘆各半兩細辛洗淨一錢甘草炙半兩上為細末每服一錢薄荷湯調下不拘時候地黃多喜戀膈脾胃不快者以當歸代之其效尤著第十論曰産後腹痛又瀉痢者何答曰因産血氣勞傷外則腠理空疏內則腸胃虛怯若未滿月飲冷當風邪毒乘虛進襲留於分肉之間布於腸胃之內遂致腹脅㽱痛痛如刀刺流入大腸腸鳴洞泄不已痢下赤白宜服調中湯又有食肉太早強食過多停積不化臍腹疼痛而成泄痢者誠有之矣法當消化停滯則愈但不可用牽牛巴豆峻劑以虛氣血第五問中見現丸最佳倉卒未能辨此用局方中治中湯加縮砂仁煎服調中湯良薑銼炒當歸去蘆酒浸肉桂不見火白芍藥附子炮去皮臍川芎各一兩甘草炙人參各半兩上㕮咀每服三錢水二盞煎至一盞去滓熱服空心食前第十一論曰産後遍身疼痛者何答曰因産走動血氣升降失其常度留滯關節筋脈引急是以遍身疼痛甚則腰背強硬不能俯仰手足拘攣不能伸屈或身熱頭痛不可作他病治但服趁痛散循流血氣使筋脈舒暢疼痛自止俯仰得其所矣趁痛散川牛膝去蘆酒浸川當歸去蘆酒浸官桂不見火白朮黃耆去蘆川獨活去蘆生薑各半兩薤白二錢半甘草炙三錢上㕮咀每服四錢水一盞半煎至八分去滓熱服不拘時候加桑上寄生半兩尤佳第十二論曰産後大便祕澀者何答曰津液者血之餘因産傷耗血氣津液暴竭氣少不能運掉是以大便祕澀不通也輕者且進橘杏丸以潤滑之滑則通關若過六七日腹中滿痛尚且不通此必有燥糞在內乾澀未能得出耳卻服麻仁丸以通利之下燥糞則愈若以為有熱用重涼之劑以攻之轉更傷動胃氣變證多端性命危矣麻仁丸麻子仁別研枳殼去瓤麩炒人參大黃各半兩上為細末煉蜜為丸如梧桐子大每服五十丸溫湯米飲任下未通加丸數橘杏丸方載大便門祕結論治下第十三論曰産後血崩者何答曰因産所下過多血氣暴虛未得平復或因勞役或因驚恐致血暴崩又有榮衛損傷氣衰血弱亦變崩中若少腹滿痛此為肝經已壞為難治俱宜投固金丸止之若小腹脹滿此為內有瘀血則未可止之止之非特淋瀝不已小腹轉加脹滿若小腹脹滿且服芎藭湯及黑龍丹若小腹不滿急是內無瘀血可服固經丸止之忌熱藥者進十灰丸亦得固經丸赤石脂煅艾葉補骨脂炒木賊各半兩附子一枚炮去皮臍上為細末陳米飲和丸如梧桐子大食前溫酒送下五十丸米飲亦可十灰丸方載崩漏論下第十四論曰産後腹脹悶滿嘔吐者何答曰胃受水穀脾主運化主血生氣內濡臟腑者也因産腑臟曝虛惡露下少敗血乘虛散於脾胃脾受之而為腹脹胃受之則為吐逆亦有惡露過多氣無所主聚於脾胃脾受之則為腹脹胃受之則為吐逆抵聖湯而治惡露過多者於抵聖湯中去澤蘭赤芍藥倍加生薑橘皮也抵聖湯赤芍藥半夏湯泡澤蘭葉陳橘皮去白人參各一錢分甘草炙一錢生薑一錢上㕮咀每服四錢水一盞半煎至七分去滓溫服不拘時候第十五論曰産後口鼻黑氣起鼻衄者何答曰陽明者經脈之海起於鼻交額中還出挾口交人中左之右右之左産後氣消血敗榮衛不理散亂入於諸經卻還不得故令口鼻黑起及變鼻衄此緣産後虛熱變生此疾不治名曰胃絶肺絶上遇此疾急取緋線二條併産婦頂心發二條系中指上節即止無藥可療亦厭禳之一端也第十六論曰産後喉中氣急喘者何答曰榮者血也衛者氣也榮行脈中衛行脈外相隨上下謂之榮衛因産所下過多榮血曝竭氣無所生獨聚於肺中故令喘也此名孤陽絶陰為難治若惡露不快敗血停凝上熏於肺亦令喘急如此但服奪命丹血去喘急自止奪命丹方見第二論下第十七論曰産後中風者何答曰蓋因産後傷動血氣勞損經絡腠理空疏勞役太早風邪乘間而入始則客於皮膚次則入於筋脈又其次也傳於諸臟隨其諸臟經絡而生病焉或身體緩急或頑痹不仁或口目不正或奄奄忽忽神情悶亂乃中風候宜服小續命湯又有産後五七日強力下床或一月之內傷於房室或懷憂發怒動擾沖和或因著艾傷動臟腑得病之初眼澀口噤肌肉瞤搐漸至腰背筋急強直者不可治此乃人作非的爾中風所得也小續命湯治婦人産後失血中風冒昧不知痛處拘急不得轉則四肢緩急遺失便利方見諸風門中風論治第十八論曰産後心痛者何答曰心者血之主人有伏宿寒因産大虛寒搏於血血凝不得消散其氣遂上衝擊於心之絡脈故心痛但以大岩蜜湯治之寒去則血脈溫而經絡通心痛自止若誤以為所傷治之則虛極寒益甚矣心絡寒甚傳心之正經則變為真心痛朝發夕死夕發朝死若因七情傷感血與氣並而心痛者宜服玄胡索湯則痛自止大岩蜜湯熟地黃酒蒸焙當歸去蘆酒浸川獨活去蘆乾薑炮吳茱萸炒桂心不見火白芍藥小草各一兩甘草炙細辛各半兩上㕮咀每服半兩水二大盞煎至一盞去滓微熱服不拘時候玄胡索湯方載婦人血氣論治下第十九論曰産後熱悶氣上轉為腳氣者何答曰産後血虛生熱復因春夏取涼過度地之蒸濕因足履之所以著而為腳氣其狀熱悶掣縱驚悸心煩嘔吐氣上皆其候也服小續命湯二三劑必愈方見前惡附子者宜服獨活寄生湯若嘔者去地黃倍加生薑獨活寄生湯方見腳氣門腳氣論治第二十論曰産後汗出多而變痙者何答曰産後血虛肉理不密故多汗因遇風邪搏之則變痙也痙者口噤不開背強而直如發癇之狀搖頭馬鳴身反折須臾又發氣息如絶宜速斡口灌小續命湯方見諸風門中風論治稍緩即汗出如雨手拭不及者不可治上方不特治産婦凡婦女偶中此疾急以此藥灌之無不愈者或服他藥則不及矣第二十一論曰産後所下過多虛極生風者何答曰婦人以血為主因産下血過多氣無所主唇青肉冷汗出目暝神昏命在須臾此但虛極生風也如此則急服濟危上丹若以風藥治之則誤矣濟危上丹太陰玄精石別研乳香別研五靈脂硫黃別研桑上寄生陳皮去白阿膠蛤粉炒卷柏生各等分上將上四味同研勻石器內微火炒勿令焦了再研極細復入余藥末用生地黃汁煮糊為丸如梧桐子大每服五十丸食前用溫酒吞下當歸酒亦得産後雜病論治黑龍丹治妊娠臨産難生或胎衣不下産後血暈不省人事狀如中風血崩惡露不止腹中刺痛血滯浮腫血入心經語言顛倒如見鬼神血風相搏身熱頭痛或類瘧狀胎前産後一切危急狼狽垂死以此藥灌三四丸無不救活者五靈脂當歸去蘆酒浸生地黃川芎高良薑銼各一兩上細銼入沙鍋內紙筋鹽泥固濟炭火煅通紅候火滅冷取出細研入後藥百草霜五兩乳香生硫黃琥珀花蕊石各一錢上五味並研細末同前藥和勻米醋煮麵糊為丸如彈子大要服用火煅藥通紅投入生薑自然汁浸碎之以無灰酒併合童子小便頓服神效不可盡述當歸羊肉湯治産後發熱自汗肢體痛名曰蓐勞當歸去蘆酒浸人參各七錢黃耆去蘆一兩生薑半兩上㕮咀用羊肉一斤煮清汁五大盞去肉入前藥煎四盞去滓作六七服早晚三四服收汗止頭痛豬腰子粥治産後蓐勞發熱豬腰子一隻上去白膜切作柳葉片少鹽酒拌之先用粳米一合入蔥椒煮粥鹽醋調和將腰子鋪碗底用熱粥蓋之如作盦生粥狀吃之每日空心作粥極妙芎歸湯治大産小産對證加添服餌方見眩暈門眩暈論治腹中刺痛加白芍藥口乾煩渴加烏梅麥門冬發寒熱加乾薑白芍藥水停心下微嘔逆加茯苓生薑虛煩不得眠加人參竹葉大便祕澀加熟地黃橘紅杏仁小便不利加車前子腹脅膨脹加厚朴血崩不止加香附子咳嗽痰多如紫菀半夏生薑腰痛腳痛加牛膝心下疼痛加延胡索惡血不下腰腹重痛加牡丹皮漏蘆散治乳婦氣脈壅塞乳汁不行漏蘆二兩半蛇蛻炙一十條栝蔞十個急火燒存性上作細末每服二錢溫酒調下不拘時候仍吃熱養助之鍾乳粉散治乳婦氣少血衰脈澀不行乳汁絶少成煉鍾乳粉上細羅每服二錢濃煎漏蘆湯調下不拘時候血瘕論治腹中之病經書所載有積有聚有癖有疝有症有瘕蓋積者五臟所積其痛不離其部聚者六腑所聚其痛無有常處癖者病據兩脅之旁疝者弦急而多痛症者徵也有塊可驗瘕者假也假物成形其結聚浮假推移乃動此無它皆由飲食不節寒溫不調氣血勞傷臟腑虛弱受於風冷與氣血相結而成也惟婦人血瘕為病異於丈夫其所以異者非獨關於飲食不節而已多因産後勞動太早喜怒不調臟虛受寒或月水往來取涼過度惡血不散遇寒搏之寒搏則凝皆能成血瘕也病作之時令人心脅攻刺小腹痛重或腰背互相引而痛久而不消令人黃瘦羸弱遂致絶産診其脈弦急大者生虛小弱者死不治琥珀丸治婦人血瘕腹中有塊攻刺小腹痛重或腰背相引而痛久而不治黃瘦羸乏琥珀別研白芍藥川烏炮去皮川牛膝去蘆酒浸鱉甲醋炙蓬莪朮炮當歸去蘆酒浸梓厚朴薑製炒各一兩木香不見火澤蘭葉官桂不見火各半兩麝香別研半錢上為細末酒糊為丸如梧桐子大每服七十丸空心溫酒米飲任下三稜煎丸治婦人室女血瘕月經不通臍下堅結大如杯升久而不治必成血蠱京三稜莪朮各二兩芫花半兩青皮去瓤淨一兩半上銼如豆大用好醋一升煮乾焙為細末醋糊為丸如梧桐子大每服五十丸食前用淡醋湯吞下通經丸治室女月經不通臍下堅結大如杯發則寒熱往來此名血瘕當歸去蘆酒浸一錢半莪朮炮桂不見火青皮去白大黃炮乾薑炮桃仁去皮尖炒乾漆炒令煙盡紅花川椒去目及閉口者微炒放地上密蓋出汗各一錢上十味為末將一半用醋煮熬成膏一半入雞子清同搗勻丸如桐子大每服二十丸空心淡醋湯下六合湯治婦室經事不行腹中結塊疼痛腰痛腿痛當歸去蘆酒浸白芍藥官桂去皮熟地黃洗川芎莪朮炮各等分上㕮咀每服四錢水一盞煎至七分去滓空心溫服當歸丸治婦人月經不調血積證當歸赤芍藥川芎熟地黃黃耆京三稜各半兩神麯百草霜各二錢半上為細末酒糊為丸梧桐子大水下三十丸食前服婦室搐搦論治婦人室女有生平無病者一旦忽感手足搐搦之證痰涎壅塞精神昏憒不省人事醫者往往便作癇證治之非也殊不知婦室以肝氣為主蓋肝乃血之府庫肝既受病經候愆期或多或少或閉斷不通肝宮堙塞隨氣虛實而生病焉婦人多由血虛七情所感而生風女子血實七情所感而生熱邪乘四末是以卒然手足搐搦狀類癇證也治療之法先宜多進蘇合香丸溫酒化服以快其氣候其蘇醒亟用調經之法塞者通之通者調之虛者與人實者取之婦人宜服白薇丸女子宜服澤蘭丸多服以病退為期也白薇丸白薇紫石英火煅醋淬七次琥珀別研白芍藥桂心不見火川續斷酒浸防風去蘆山茱萸取肉當歸去蘆酒浸柏子仁炒川烏炮去皮尖牡丹皮去木各一兩木香不見火半兩麝香別研半錢上為細末生薑自然汁打米糊為丸如梧桐子大每服七十丸空心食前溫酒米飲任下澤蘭丸當歸去蘆酒浸澤蘭葉琥珀別研羚羊角別鎊研防風去蘆牡丹皮去木各一兩麝香別研半錢安息香酒煮去砂石半錢生地黃赤芍藥各半兩鐵粉半兩橘紅五錢上為細末煉蜜為丸如梧桐子大每服七十丸空心食前溫酒米飲任下求子論治素問云夫天地者萬物之父母也陰陽者血氣之男女也夫有夫婦則有父子婚姻之後則有生育生育者人倫之本也且男女之合二情交暢陰血先至陽精後沖血開裹精陰外陽內陰含陽胎而男形成矣陽精先至陰血後參精開裹血陽外陰內陽含陰胎而女形成矣男女婚姻貴乎及時夫婦貴乎強壯則易於受形也且父少母老生女必羸母壯父衰生男必弱誠有斯理或男子真精氣不濃婦女血衰而氣旺是謂夫病婦疹皆使人無子治療之法女子當養血抑氣以減喜怒男子益腎生精以節嗜欲依方調治陰陽和平則婦人樂有子矣抑氣散治婦人氣盛於血所以無子尋常頭暈膈滿體痛怔忡皆可服之香附子乃婦人之仙藥不可謂其耗氣而勿服香附子炒杵淨四兩茯神去根甘草炙各一兩上為細末每服二錢食前用沸湯調服仍兼進紫石英丸紫石英丸治婦人血弱子臟風冷凝滯令人少子紫石英煅醋淬七次禹餘糧火煅醋淬七次以上各二兩熟地黃紫葳辛夷仁桂心不見火卷柏葉醋炙牡蒙川續斷酒浸石斛去根柏子仁炒別研川烏炮去皮川牛膝去蘆酒浸芎藭烏賊魚骨醋炙當歸去蘆酒浸牡丹皮去木甘草炙以上各一兩桑上寄生山藥銼炒食茱萸炒細辛洗去土葉乾薑炮人參厚朴薑汁製炒各半兩天門冬洗去心一兩半上為細末煉蜜為丸如梧桐子大每服七十丸加至一百丸空心食前用溫米飲任下惡寒者用醋糊為丸亦佳陽起石丸治丈夫真精氣不濃不能施化是以無子陽起石火煅紅研極細鹿茸酒蒸焙韭子炒菟絲子水淘淨酒浸蒸焙別研細末天雄炮去皮肉蓯蓉酒浸各一兩覆盆子酒浸石斛去根桑寄生沉香別研原蠶蛾酒炙五味子各半兩上為細末酒煮糯米糊為丸如桐子大每服七十丸空心鹽湯鹽酒任下癰疽疔腫門附瘻癰疽論治夫發背癰疽者諸方載之備矣夫癰疽本乎一證然受病之所與外證頗有異焉蓋癰者六腑不和之所生疽者五臟不調之所致六腑主表其氣淺故癰皮薄而腫高五臟主裡其氣深故疽皮厚而腫堅多由喜怒憂思飢飽勞逸或服丹石或餐炙爆酒面溫床厚被盡力房室或外因風熱風濕所傷遂使陰陽蘊結榮衛為之壅滯陽滯於陰則生癰陰滯於陽則生疽凡此二毒發無定處當以脈別之諸浮數之脈應當發熱而反灑淅惡寒若有痛處乃發癰也脈數發熱而疼者發於陽也脈不數不發熱而疼者發於陰也不疼尤是惡證且癰疽初生如黍粟粒許大或癢或痛其狀至微此實奇患惟宜速療速療之法初覺之時並宜灼艾痛則灸至癢癢則灸至痛自然毒氣隨火而散也若不早治脊痛滋蔓結成癰疽卻當詳其虛實分其冷熱寒則溫之熱則清之虛則補之實則瀉之導以針石灼以艾柱治法合宜未有不全濟者也然癰疽證有安危此又不可不別古人所謂五善七惡是也煩躁時嗽腹痛渴甚或泄痢無度或小便如淋一惡也膿血大泄腫痛尤甚膿色敗臭痛不可近二惡也喘粗氣短恍惚嗜臥三惡也目視不正黑睛緊小白睛青瞳子上青者四惡也肩項不便四肢沉重五惡也不能下食服藥則嘔食不知味六惡也聲嘶色脫唇鼻青赤面目四肢浮七惡也動息自寧食飲知味一善也便利調勻二善也膿潰痛消色鮮不臭三善也神彩精明語聲清朗四善也體氣和平五善也若五善見三則瘥七惡見四則必危五善並至則善無以加也七惡並臻則惡之劇矣診其脈弦洪相搏外急內熱欲發癰疽脈來細沉時直者身有癰腫肺肝俱數即發癰疽四肢沉重肺脈大即死凡癰疽脈洪大者難治脈微澀者易愈近嵇大夫乃北人有藥方一宗甚寶祕之持以獻趙龍學繼而用和得之屢試屢效謾載於後以為治備之要嵇論治法嵇云金人大定間有遇異人傳狗寶丸得之者以獻之偽主其後嵇乃事偽朝以外科奉御療將士金瘡有功金主以金帛賜焉嵇治瘡凡癰疽丁漏惡瘡皆先以狗寶丸為第一義先投狗寶丸半時次投熱蔥粥以助之厚被蓋覆病者使汗出周浹則毒勢隨汗而解若汗不出則不可療矣汗罷則瘡之陷者必起散者必聚次以烏龍膏敷其腫若腫之外有赤暈者則以解毒散敷之凡敷藥必先自外向里塗之看正瘡大小凡正瘡之上並不許加分毫藥每日隨證服五香連翹湯十奇散緑豆粉等藥大率以狗寶丸為先以烏龍膏解毒散次之而服餌之藥則隨脈氣陰陽虛實而用之空心必服加減八味丸以助元氣俟瘡潰以針決去敗膿訖然後以乳香膏敷正瘡之上若尚有未盡膿則於膚藥當中直剪一路以通膿水膿欲盡以生肌散敷瘡口仍以乳香膏覆之更不須剪破膏藥乳香膏一日一換俟瘡口欲合即更不換膏藥矣烏龍膏之功在於消腫解毒散之功在於收暈暈收即不須用解毒散而烏龍膏直俟瘡潰敗膿出盡然後已此其大略也嵇云疽之證甚惡多有陷下透骨者服狗寶丸瘡四邊必起依前法用烏龍膏解毒散訖須用針刀開瘡孔其內已潰爛不復知痛乃納追毒丹於孔中以速其潰既潰後割去死肌洗以豬蹄湯敷以生肌散覆以乳香膏又敷之善角散以醋熬為糊貼之惡肉退去好肉漸生即用搜膿散翠霞散之類敷之若瘡中毒氣未盡慎勿早斂忌早上生肌之藥縱復平復必再發其間調理次第臨時制宜將護須慎之若證之善者自然腫起紅活乃即如前法狗寶丸專治癰疽發背附骨疽諸般惡瘡狗寶一兩生用癩狗腹中得之蟾酥二錢乳香別研沒藥別研雄黃硇砂輕粉麝香鉛白霜粉霜別研以上各一錢金頭蜈蚣七個頭尾腳足炙黃色研如泥烏金石即石炭袁州萍鄉縣有之二錢鯉魚膽七個乾者用之去皮臘月者尤佳狗膽一個乾者用之去皮黑狗者臘月者好頭胎孩兒乳一合黃蠟三錢上先將頭胎兒乳黃蠟放在銚內文武火化開用前藥末和成劑放在瓷器內要用旋丸如麻子大兩丸如病大三丸用白丁香七個直者為妙以新汲水化開送下狗寶丸腰以下病食前服腰以上食後服如人行三里用熱蔥白粥投之即以衣被蓋定汗出為度以後只吃瓜齏白粥常服十奇散留頭四邊以烏龍膏貼之烏龍膏治一切癰疽腫毒收赤暈木鱉子去殼半夏各一兩小粉四兩草烏半兩上於鐵銚內慢火炒令轉焦為細末出火毒再研細以冷水調敷一日一換解毒散去熱腫收赤暈寒水石二兩龍骨半兩黃連去須黃柏各一兩輕粉一錢上為細末和雞子清調以雞羽掃瘡上若是熱瘡加黃丹半兩乳香膏木鱉子去殼細銼當歸各一兩柳枝二八寸銼之上同以麻油四兩慢火煎令黑色次用乳香沒藥各半兩白膠香明淨者四兩共研細入油煎化用綿濾之上再事治之煉藥鐵銚令極淨再傾前藥油蠟在內候溫入黃丹一兩半以兩柳枝攪極得所再上火煎不住手攪候油沸起住攪直待注在水中成珠不散為度秋冬欲軟春夏欲堅傾在水盆中出火毒搜成劑收之追毒丹治諸瘡黑陷者先用狗寶丸治次以烏龍膏收腫散毒去赤暈乃用針刀開瘡納追毒丹使之潰然後去敗肉排膿隨證治之癰疽丁瘡附骨疽並皆治之巴豆七粒去皮心不去油研如泥白丁香一錢雄黃黃丹各二錢輕粉一錢加蟾酥尤神速上件研和加白麵三錢滴水為丸如麥狀針破瘡納之上覆以乳香膏追出膿血毒物漏瘡四壁死肌不去不可治亦以此法追毒去死肌乃養肉使愈矣疾小者用一粒大者加粒數用之生肌散寒水石二錢黃丹半錢龍骨七錢輕粉一錢上為細末干敷上貼以乳香膏紅膏藥治軟癰及惡瘡風濕所搏渾身疼痛瀝青白膠香各二錢兩黃蠟三錢上同於銚內煎化量麻油三錢許煎濾於水盆中揉成劑收之每用於水內捻作餅子隨瘡大小貼之上敷以紙此藥加當歸一兩於內煎令黃色濾去滓於水盆內取出藥揉成劑再加乳香末二錢和為乳香膏尤佳其加青黛者即名青金膏其加黃丹者即名紫金膏皆貨藥者誑人之術其功用一而已矣十奇散一名十宣散治癰疽化毒未成速散已成者速潰苦桔梗去蘆川當歸去蘆酒浸肉桂去粗皮不見火厚朴去皮薑汁製人參防風去蘆芎藭白芷不見火甘草生用黃耆去蘆洗淨寸截捶令扁冷鹽水潤透蒸焙上十味各精選藥材曬乾焙至淨方稱人參當歸黃耆各二兩余藥各一兩除桂別研羅外一處為細末入和桂令勻每服自三錢加至五錢六錢無灰酒調下日夜各數服以多為妙服至瘡口合更服為佳所以補前損杜後患也不飲酒人濃煎木香湯下然不若酒力之勝或飲酒不多不能勉強以木香湯兼酒調下功效當不減於酒五香連翹湯治疽作二日後宜以此湯與漏蘆湯相間連日服之桑寄生無真者寧缺之木香不見火連翹仁沉香鎊不見火黃耆去蘆生用升麻木通射干川獨活去蘆各三兩丁香揀不見火乳香別研大黃銼炒甘草生各半兩麝香別研一分半上為粗末和勻每服四大錢水一盞煎至八分去滓溫服不拘時候內托散豆粉一兩乳香別研半兩上為末和勻熟水調服一方煎生甘草湯調下少許時時細呷之要藥常在胸膈間凡有疽疾宜首先多服此藥一日連進十數服三日內可免變證使毒氣出外服之稍遲毒氣攻衝臟腑漸作嘔吐後來多致咽喉口舌生瘡黑爛生菌名曰心氣絶飲食藥餌無由可進如瘡發三五日之後此藥但可間服當別用藥以治療楊氏家藏方言有人因鼻衄初愈不曾表汗餘毒在經絡背發大疽自肩下連腰脅腫甚其堅如石色極紫黑醫以涼藥敷之中夜大嘔乃連進此藥四服嘔遂止既而瘡潰出赤水淋漓四十日而愈又有患瘰癧者痛過輒嘔服此藥嘔亦止近見有人病疽醫者不肯用此藥恐傷脾胃愚故引楊氏之言以解世人之惑肺癰論治夫肺癰者由風寒之氣內舍於肺其氣結聚所成也蓋肺為五臟之華蓋其位象天候於皮毛氣之所主將理失宜勞傷氣血風寒得以乘之蓋寒則生熱風極亦生熱壅積不散遂成肺癰矣肺癰之狀寸口脈數而實咳而胸內滿隱隱痛兩腳腫滿咽乾口燥煩悶多渴時出濁唾腥臭久久吐膿狀如粳米粥者難治有膿而嘔者不可治嘔膿而止者自愈凡病肺癰脈來短澀者順浮大者死其色當白而多赤者亦死桔梗湯治肺癰心胸氣壅咳嗽膿血心神煩悶咽乾多渴兩腳腫滿小便赤黃大便多澀桔梗去蘆貝母去心膜當歸去蘆酒浸栝蔞子枳殼去瓤麩炒薏苡仁炒桑白皮蜜水炙防己各一兩甘草節生用杏仁去皮尖麩炒百合蒸各半兩黃耆去蘆一兩半上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候若大便祕者加大黃小便祕者加木通葶藶散治肺癰喘咳氣急眠臥不得甜葶藶二兩半隔紙炒令紫上為細末每服二錢水一中盞煎至六分溫服不拘時候排膿散治肺癰得吐膿後宜以此藥排膿補肺綿黃耆去蘆二兩生用上為細末每服二錢水一中盞煎至六分溫服不拘時候丁腫論治素問云夫上古聖人之教下也虛邪賊風避之以時人之有生攝養為先將理失宜百疾由是生焉故四時迭更陰陽交變此二氣互相擊怒必成暴氣所謂暴氣者卒然大風大霧大寒大熱若未避而遇之襲於皮膚入於四體傳注經脈遂使腠理壅隔榮衛結滯陰陽二氣不得宣通遂成癰疽丁毒惡瘡諸腫之患養生之士須早識此方凡是瘡痍無所逃矣但丁腫有十三種一曰麻子丁二曰石丁三曰雄丁四曰雌丁五曰火丁六曰爛丁七曰三十六丁八曰蛇眼丁九曰鹽膚丁十曰水洗丁十一曰刀鐮丁十二曰浮漚丁十三曰牛狗丁大率瘡之初起必先癢而後痛先寒而後熱熱定則多寒四肢沉重頭痛心驚眼花見火甚者嘔逆嘔逆者多難治其麻子丁一種始末皆癢不得犯觸犯觸者即難療衆丁之中惟三十六丁可畏其狀頭黑浮起形如黑豆四畔大赤色今日生一明日生二三日生三乃至十若滿三十六藥所不治未滿三十六可治俗名黑疱忌嗔怒蓄積愁恨如浮漚丁牛狗丁二種無所禁忌縱不療亦不能殺人其狀與諸丁同何以知其觸犯脊強瘡痛極甚不可忍者是犯之狀也依方療之萬無失一矣嵇云諸瘡莫急於丁瘡有魚眼丁多發於足非神手不能治也大凡治丁瘡先以披頭針當頭刺之直至患者知痛處才引針而出血隨之流則以蟾酥追毒丹納之針孔中仍以紙捻送下使近痛處其上封以乳香膏四旁腫處敷以烏龍膏或有赤暈敷以解毒散並如前法二三日瘡潰拔去仍覆以乳香膏膿盡生肌並如前法嵇云有絲瘡證乃丁瘡之類醫若不識並無治法害人最速其瘡生手足間有黃泡其中或紫黑色即有一條紅絲迤邐向上而生若至心腹則使昏亂不救其紅絲或有生三兩條者治法以針橫截紅絲所至之處刺之止使血出以膏藥敷之更不復發動即愈矣此證得於喜怒不節血氣逆行而生內翰洪舜愈以惡瘡生齶上久不能治嵇云此名內疳瘡初發如蓮花痔根蒂小而下垂反大治法以勾刀決斷其根燒鐵器令七八分赤烙之以止血次以雄黃輕粉粉霜香白芷白蘞為散敷其上令病人側臥以槐枝作枕支其牙頰間毋使口合一兩時許瘡瘢定令病者自便治日得膿便可漸愈若此證久不治即四邊肉漸成死肌法用槐枝枕支病者牙毋使得合以小鐮去其惡肉令盡即撒生肌散上仍用乳香膏護之自非飲食時且令病者側臥支其牙頰毋使口合則津液不衝動瘡藥三日後肌肉漸生才可令病人自便無所礙矣洪內翰云此證緣醫家不識則無治法以至不救良可惜也此證得之作勞氣血虛憊所致嵇云治魚眼丁之法先以針刺之若痛則瘡根已走矣用療漏瘡之法以榆皮隨俞穴所往探之榆之所不及之處則針破引榆皮而出再自針穴尋之若針破處病人自痛血出則是活肌肉矣即於針瘡納蟾酥丹覆以乳香膏再於正瘡上針孔中納蟾酥丹三二粒乃覆以乳香膏則其丁瘡之根即向元所潰而愈二黃散治丁腫雄黃雌黃各等分上二味為末先用針刺四周及中心醋和塗之蒼耳散蒼耳根莖苗子但取一色燒為灰上為末醋泔澱和如泥塗上干即拔根出神驗蟾酥丹蟾酥一枚上為末以白麵和黃丹丸如麥顆狀針破患處以一粒納之神效蒼金沙散取丁瘡蕪菁根鐵生衣各等分上和搗以大針刺作孔復削蕪菁根如針大前鐵生衣塗上刺孔中又塗所搗者封上仍以方寸匕排帛塗貼之有膿出即易須臾拔根出立瘥忌油膩生冷等物灸法治丁腫灸掌後橫紋五指男左女右七壯即瘥已用得效丁腫灸法雖多然此一法甚驗出於意表也瘻論治嵇云癰之根腳淺而闊倘治之遲則有潰爛肌肉之患若久而不合則多為漏瘡治癰已具於前嵇云漏瘡當探其淺深渠在北地時有一人害漏瘡於脅間嵇以榆皮細枝刮去皮取線以綿裹其尖以綿牢系之以榆皮探瘡中瘡之穴乃自脅而達於腰在皮膚之間嵇遂於病者腰間以針決破用追毒丹三粒納於瘡中三日即潰而脅間之漏遂止則膿悉自腰間針孔中出膿盡生肌遂愈其服狗寶丸敷烏龍膏乳香膏生肌散並如前法嵇云澄江治一婦人漏瘡此婦人先於小腹下成一漏瘡久又於背脊腰下成一瘡嵇以榆枝自背探之乃直達於腹前之漏瘡嵇兩用追毒丹乳香膏烏龍膏而愈疥癬門瘡疥論治夫瘡疥之為病雖若不害人然而至難忍者多矣素問云諸痛癢瘡皆屬於心多由心氣鬱滯或飲食不節毒蘊於腸胃發見於皮膚古方有所謂馬疥水疥乾疥濕疥種類不一生於手足乃至遍體或癢或痛或脊或腫或皮肉隱嶙或抓之凸起或㾦癗或膿水浸淫治之內則當理心血祛散風熱外則加以敷洗理無不愈當歸飲子治心血凝滯內蘊風熱發見皮膚遍身瘡疥或腫或癢或膿水浸淫或發赤疹㾦癗當歸去蘆白芍藥川芎生地黃洗白蒺藜炒去尖防風去蘆荊芥穗各一兩何首烏黃耆去蘆甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候神異膏治一切瘡疥全蠍七個去毒皂角一錠銼碎巴豆七粒去殼蛇床末三錢麻油一兩黃蠟半兩輕粉半字雄黃別研三錢上先用皂角全蠍巴豆煎油變色去了三味入黃蠟化開取出冷處入雄黃蛇床末輕粉和勻成膏先用苦參湯溫洗卻以藥擦瘡疥上神效苦參湯苦參蛇床子白礬荊芥穗各等分上四味煎湯放溫洗竹茹膏治黃瘡熱瘡真麻油二兩青木香半二兩青竹茹一小團杏仁二十七粒去皮尖上用藥入麻油內慢火煎令杏仁色黃去滓入松脂末半兩熬成膏子每用少許擦瘡上癬論治夫癬之為病種狀不同古方所謂乾癬濕癬風癬苔癬之類癮疹如錢漸漸滋蔓或癢或痛或圓或斜其中生蟲搔之有汁此由風濕毒氣與血氣相搏凝滯而為此疾也胡粉散治一切癬神效胡粉一分砒半分大草烏一個生用蠍梢七枚雄黃別研一分硫黃別研一分斑蝥一枚麝香少許上八味為細末先用羊蹄根蘸醋擦動次用藥少許擦患處癭瘤瘰癧門癭瘤論治夫癭瘤者多由喜怒不節憂思過度而成斯疾焉大抵人之氣血循環一身常欲無滯留之患調攝失宜氣凝血滯為癭為瘤癭者多結於頸項之間瘤者隨氣凝結於皮肉之中忽然腫起狀如梅李子久則滋長醫經所謂癭有五種瘤有六證五癭者石癭肉癭筋癭血癭氣癭是也六瘤者骨瘤脂瘤膿瘤血瘤石瘤肉瘤是也治療之法五癭不可決破破則膿血崩潰多致夭枉六瘤者脂瘤可破去脂粉則愈外五證亦不可輕易決潰慎之慎之破積散治石癭氣癭筋癭血癭肉癭等證海藻洗龍膽海蛤通草昆布洗貝母去心二分礬枯松蘿各三分麥曲四分半夏二分湯泡上為細末酒服方寸匕日三忌甘草鯽魚豬肉五辛菜諸雜等物南星膏治皮膚頭面生瘤大者如拳小者如粟或軟或硬不疼不痛無藥可療不可輒有針灸生南星大者一枚去土薄切上細研稠黏如膏滴好醋五七滴如無生者以乾者為末投醋研如膏先將小針刺病處令氣透以藥膏攤紙上象瘤大小貼覺癢三五易瘥昆布丸治一切癭瘤不問新久昆布一兩洗海藻一兩洗小麥一兩好醋煮乾上三味為細末煉蜜為丸如杏核大每服一丸食後噙咽瘰癧論治夫瘰癧之病即九漏是也古方所載名狀不一難以詳述及其生也多結於項腋之間纍纍大小無定發作寒熱膿水潰漏其根在臟腑蓋肝主狼漏胃主鼠漏大腸主螻蛄漏脾主蜂漏肺主蚍蜉漏心主蠐螬漏膽主浮蛆漏腎主瘰癧漏小腸主轉脈漏原其所自多因寒暑不調或由飲食乖節遂致血氣壅結而成也巢氏所載決其生死反其目以視之其中有赤脈從上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死赤脈不下貫瞳子可治三因云有是説驗之少有是證理宜然也平時有一二治法用之已驗謾録於後皂子丸治瘰癧滿項不破及結核腫痛者好皂角子一升玄參連翹仁各一兩上用水五升砂鍋內慢火煎水盡為度每服揀取好皂角子軟者三粒食後臨臥時細嚼津下硬者搗爛蜜和如榛子大含化半月必瘥忌酒面熱毒物三聖丸治瘰癧丁香五十個斑蝥十個麝香一錢別研上細末用鹽豉五十粒湯浸研如泥和前藥令勻丸如緑豆大每服五七丸食前溫酒送下日進三服如至五七日外覺小便淋瀝是藥之效便加服或便下如青筋膜之狀是病之根也忌濕面魚肉一切動風物連翹丸治瘰癧結核破或未破者薄荷二斤裂取汁新者好皂角一挺水浸去皮裂取汁以上二味同於銀石器內熬成膏青皮一兩連翹半兩陳皮一兩不去白皂角子慢火炮去皮取皂子仁搗羅為末一兩半黑牽牛一兩半半生半炒上五味為末用前膏子為丸如梧桐子大每服三十丸煎連翹湯送下食後十日見效五痔腸風臟毒門五痔論治痔凡有五即牡痔牝痔腸痔脈痔血痔是也素問云困而飽食筋脈橫解腸澼為痔多由飲食不節醉飽無時恣食肥膩久坐濕地情欲耽著久忍大便遂使陰陽不和關格壅塞風熱下衝乃成五痔肛門生妒或左或右或內或外或狀如鼠奶或形似嬰桃或膿或血或癢或痛或軟或硬或脊或腫久而不治則成漏矣治之之法切不可妄用毒藥亦不可輕易割取多致淹滯惟當用穩重湯劑徐徐取效不可不知蝟皮丸治五種痔漏及蠱痔下血豬左足懸蹄燒灰存性蝟皮一枚燒灰存性黃牛角腮燒灰存性貫衆槐角子炒雷丸雞冠花槐花炒油發灰黃耆去蘆香白芷當歸去蘆酒浸枳殼去瓤生用玄參黃連去須防風去蘆鱉甲醋煮各半兩麝香別研半錢上為細末米糊為丸如梧桐子大每服七十丸加至一百丸空心米飲送下年高虛弱寒濕痔瘡不宜服之黃耆丸治五痔出血疼痛榼藤子煨用肉半兩川續斷酒浸黃耆去蘆貫衆附子炮去皮臍枯礬別研刺蝟皮燒灰當歸去蘆酒浸阿膠蛤粉炒各一兩麝香別研一字上為細末米糊為丸如梧桐子大每服七十丸空心米飲送下氣壯多熱之人不宜服此蝸牛膏敷痔有效蝸牛一枚麝香三分上用小砂合子盛蝸牛以麝香糝之次早取汁塗痔處枯礬散治五痔癢多痛少或膿或脹或漏血不止白礬枯半錢腦子一字別研上二味為末先用魚腥草煎湯放溫洗痔次用藥少許摻患處腸風臟毒論治夫腸風臟毒下血者皆由飽食過度房室勞損坐臥當風恣餐生冷或啖炙爆或飲酒過度或營衛氣虛風邪冷氣進襲臟腑因熱乘之使血性流散積熱壅遏血滲腸間故大便下血血清而色鮮者腸風也濁而色黯者臟毒也肛門射如血線者蟲蛀也又有陽氣不升血隨氣降而下血者下虛也下血之脈脈多洪大而芤蓋弦者勞也芤者下血也治療之法風則散之熱則清之寒則溫之虛則補之治法合宜無不效者矣加減四物湯治腸風下血不止側柏葉生地黃洗當歸去蘆酒浸川芎各一兩枳殼去瓤炒荊芥穗槐花炒甘草炙各半兩上㕮咀每服四錢水一盞半生薑三片烏梅少許煎至七分去滓溫服空心食前蒜連丸治臟毒下血鷹爪黃連去須不拘多少上為細末用獨蒜頭一顆煨香熟研和入臼杵熟丸如梧桐子大每服三四十丸空心陳米飲送下香梅丸治腸風臟毒烏梅同核燒灰存性香白芷不見火百藥煎燒灰存性上等分為末米糊為丸如梧桐子大每服七十丸空心用米飲送下斷紅丸治陽虛臟腑久而腸風痔疾下血不止或所下太多面色痿黃日漸羸瘦側柏葉微炒黃川續斷酒浸鹿茸燎去毛醋煮附子炮去皮臍黃耆去蘆阿膠銼蛤粉炒成珠子當歸去蘆酒浸各一兩白礬枯半兩上為細末醋煮米糊為丸如梧桐子大每服七十丸空心食前用米飲送下椿皮丸治腸風瀉血不止東行椿根白皮銼焙不拘多少上為細末醋糊為丸如梧桐子大每服七十丸空心食前用陳米飲送下石榴散治結陰瀉血不止酸石榴皮陳橘皮湯浸去白甘草炙銼乾薑炮各等分上焙乾為末每服二錢陳米飲調下日三服
