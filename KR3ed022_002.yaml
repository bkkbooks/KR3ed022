body:
  text: 卷柏丸治婦人室女腹臟冷熱相攻心腹絞痛腰痛腿痛赤白帶下面色痿黃四肢羸乏黃耆去蘆蜜水炙熟地黃洗各一兩半卷柏醋炙赤石脂煅醋淬七次鹿茸醋炙白石脂芎藭代赭石煅醋淬七次艾葉醋炒桑寄生鱉甲醋炙當歸去蘆酒洗微炒地榆各一兩木香不見火龍骨各半兩乾薑炮三分上為末醋煮糯米糊為丸如梧桐子大每服七十丸空心食前用米飲送下
