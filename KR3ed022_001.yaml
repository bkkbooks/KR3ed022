皮也肌膚鱗起毛折發黑蒸在骨也版齒黑燥大杼痠疼蒸在髓也肩背疼倦胻骨痠痛蒸在筋也眼昏脅痛爪甲焦枯蒸在脈也心煩體熱痛刺如針蒸在肉也自覺身熱多不奈何四肢瞤動蒸在血也毛髮焦枯有時鼻衄或復尿血評諸病證大略如斯若究其根惟心肺受蟲齧禍之甚也治法先宜去根次須攝養調治亦有早灸膏肓俞崔氏穴而得愈者若待其根深蒂固而治之則無及矣平時得三五方用之頗驗謾録於後以為備治鱉甲地黃湯治熱勞手足煩心怔悸婦人血室有乾血身體羸瘠飲食不為肌肉柴胡去蘆當歸去蘆酒浸麥門冬去心鱉甲醋炙石斛去根白朮熟地黃酒浸焙茯苓去皮秦艽去蘆各一兩人參肉桂不見火甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片烏梅少許煎至七分去滓溫服不拘時候此藥專治熱勞其性差寒脾胃強者方可服餌虛甚而多汗者不宜服黃耆飲子治諸虛勞損四肢倦怠骨節痠疼潮熱乏力自汗怔忡日漸黃瘦胸膈痞塞不思飲食咳嗽痰多甚則唾血黃耆蜜炙一兩半當歸去蘆酒浸紫菀洗去須石斛去根地骨皮去木人參桑白皮附子炮去皮臍鹿茸酒蒸款冬花各一兩半夏湯泡七次甘草炙各半兩上㕮咀每服四錢水一盞半生薑七片棗一枚煎至七分去滓溫服不拘時此藥溫補榮衛枯燥者不宜進唾血不止者加阿膠蒲黃各半兩蛤蚧丸治積勞咳嗽日久不瘥蛤蚧一枚酥炙鹿角不蛀者酥炙去皮子兩錠款冬花木香不見火杏仁去皮尖童子小便浸一晝夜控干蜜炒天麻半夏湯泡七次熟地黃酒蒸焙五味子各一兩丁香半兩上為細末煉蜜為丸如梧桐子大每服十五丸加至二十丸食後生薑湯下太上混元丹河車者天地之先陰陽之祖乾坤之橐籥鉛汞之匡廓胚腪將兆九九數足我則載而成之故謂之河車歷驗篇中名曰混沌皮蓋亦生天地陰陽之始為七十二丹之首高士垂慈始開端緒太上云若欲長生當修所生人之所生實資於此所以成功靈應非金石草木夜露曉霜之所比倫修真之士服之不輟誠足以還本元補益之道真得其真紫河車一具用少婦首生男子者良帶子全者於東流水洗斷血脈入麝香二錢在內以線縫定用生絹包裹懸胎於沙甕內入無灰酒五升慢火熬成膏子沉香別研硃砂別研水飛各一兩人參蓯蓉酒浸乳香別研安息香酒煮去砂石各二兩白茯苓去皮三兩上為細末入河車膏子和藥末杵千百下丸如梧桐子大每服七十丸空心溫酒送下沉香湯尤佳詳此丹以紫河車為主但佐使之藥太輕無病人久服可以輕身延年補損扶虛乃若病重之人服之卻宜用增添之法也男子真陽氣衰榮衛虛耗腰背疼痛自汗怔忡痰多咳喘夢遺白濁潮熱心煩腳膝無力宜於內加鹿茸酒蒸川巴戟去心鍾乳粉陽起石火煅附子炮去皮臍黃耆去蘆各二兩桑寄生無則以川續斷代生鹿角鎊龍骨紫菀以上各一兩上依前法修制和前藥末杵和前膏子為丸湯使如前或沉香湯下婦人血海虛損榮衛不足多致潮熱心煩口乾喜冷腹脅刺痛腰痛腿痛痰多咳嗽驚惕怔忡經候不調或閉斷不通宜於內加當歸去蘆酒浸石斛去根紫石英煅醋淬七次水飛柏子仁微炒別研鹿茸酒浸鱉甲醋炙各二兩卷柏葉一兩川牛膝去蘆酒浸一兩半上依前法修制和前藥末杵和前膏子為丸湯使如前任下虛寒者加炮熟附子二兩咳嗽者加紫菀茸二兩經效阿膠丸治勞嗽並咳血唾血阿膠蛤粉炒生地黃洗卷柏葉銼炒山藥銼炒大薊根五味子雞蘇各一兩柏子仁炒別研人參茯苓去皮百部洗去心防風去蘆遠志甘草水煮去心麥門冬去心各半兩上為細末煉蜜為丸如彈子大每服一丸細嚼濃煎小麥湯或麥門冬湯咽下地仙散治骨蒸肌熱一切虛勞煩躁生津液地骨皮去木二兩防風去蘆一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候崔丞相灸勞法外臺祕要崔相家傳方寶呂經驗方悉編載然皆差誤毗陵群有不刻最詳豫取諸本參校成此一書比古方極為委曲依此治人未嘗不驗往往一灸而愈豫在宜城久病虛羸亦用此而愈唐中書侍郎崔知悌序夫含靈受氣稟之於五行攝生乖理降之以六疾若歧黃廣記蔚有舊經攻灸兼行顯著斯術骨蒸病者亦名傳尸亦謂殗殜亦稱復連亦曰無辜丈夫以癖氣為根婦人以血氣為本無問少長多染此疾嬰孺之流傳注更苦其為狀也發乾而聳或聚或分或腹中有塊或腦後兩邊有小結多者乃至五六或夜臥盜汗夢與鬼交雖目視分明而四肢無力或上氣食少漸就沉羸縱延日時終於𣩄盡豫昔參洛州司馬嘗三十日灸治一十三人前後差者數逾二百至於貍骨獺肝徒聞曩説金牙銅鼻罕見其能未若此方扶危極急非止單攻骨蒸又別療氣療風或瘴或勞或邪或癖患狀既廣灸治者不可具録略陳梗概又恐傳授訛謬以誤將來今具圖形狀庶令覽者易悉使所在流布頗用家藏未暇外請名醫傍求上藥還魂返魄何難之有遇斯疾者可不務乎取穴法先兩穴令患人平身正立取一細繩蠟之勿念展縮順腳底貼肉堅踏之男左女右其繩前頭與大拇趾端齊後頭令當腳跟中心向後引繩循腳肚貼肉直上至曲身軍大橫紋截斷又令患人解發分兩邊令見頭縫自囟門平分至腦後乃平身正坐取向所截一頭令與鼻端齊引繩向上正循頭縫至腦後貼肉下循脊骨引繩向下至繩盡處當脊骨以墨點記之墨點不是灸處又取一繩子令患人合口將繩子按於口上兩頭至吻卻鉤起繩子中心至鼻柱根下如此便齊兩吻截斷將此繩展令直於前來脊骨上墨點處橫量取平勿令高下繩子先中折當中以墨記之卻展開繩子橫量以繩子上墨點正脊骨上墨點為正兩頭取平勿令高下於繩子兩頭以白圈記白圈是灸處以上是第一次點二穴次二穴令其人平身正坐稍縮臂膊取一繩繞項向前雙垂與鳩尾齊鳩尾是心歧骨人有無心歧骨者至雙胸前兩歧骨下量取一寸即鳩尾是也即雙截斷卻背翻繩頭向項後以繩子中停取心正當喉嚨結骨上其繩兩頭夾項雙垂循脊骨以墨點記之墨點不是灸處又取一繩子令其人合口橫量齊兩吻截斷還於脊骨上以墨點橫量如法繩子兩頭以白圈記之白圈是灸處以上是第二次點穴通前共四穴同時灸日別各七壯至二七壯纍灸至一百壯或一百五十壯為妙候瘡欲瘥又依後法灸二穴又次二穴以第二次量口吻繩子於第二次雙繩頭盡處墨點上當脊骨直上下豎點令繩中停中心在墨點上於上下繩頭盡以白圈兩穴白圈是灸穴以上是第三次點兩穴謂之四花灸兩穴各百壯三次共六穴各取離日量度訖即下火唯須三月三日艾最佳疾差百日內慎飲食房室安心靜處將息若一月後覺未瘥復初穴上再灸圖形狀於後凡骨蒸之後所起辨驗有二十二種並依上項灸之一胞蒸小便赤黃二玉房蒸男遺尿失精女月漏不調三腦蒸頭眩熱悶四髓蒸覺髓沸熱五骨蒸齒黑六筋蒸甲焦七血蒸發焦八脈蒸急緩不調九肝蒸或時眼前昏眩十心蒸舌焦或瘡或時胸滿十一脾蒸唇焦折或口瘡十二肺蒸口乾生瘡十三腎蒸耳乾焦十四膀胱蒸右耳焦十五膽蒸眼目失光十六胃蒸舌下痛十七小腸蒸下泄不禁十八大腸蒸右鼻孔痛十九三焦蒸乍寒乍熱二十肉蒸別人覺熱自覺冷二十一皮蒸皮肉生雞肉起二十二氣蒸遍身壯熱不自安息用尺寸取穴法凡孔穴尺寸皆隨人身形大小須男左女右量手指中心一節兩橫紋中心為一寸艾炷大小法凡艾炷須令腳根足三分若不足三分恐覆孔穴不備穴中經脈火氣不行即不能抽邪氣引正氣雖小兒必以中指取穴為準取艾法端午日日未出於艾中以意求其似人者輒指之以灸殊有效功時見一書中雲爾忘其何書也艾未有真似人者於明暗間苟以意命之萬法皆妄無一真者此何疑耶用火法黃帝曰松柏柿桑棗榆柳竹等木火用灸必害肌血慎不可用凡取火者宜敲石取火或水精鏡子於日得者太陽火為妙天陰則以槐木取火亦良諸痹門五痹論治風寒濕三氣雜至合而為痹皆因體虛腠理空疏受風寒濕氣而成痹也痹之為病寒多則痛風多則行濕多則著在骨則重而不舉在脈則血凝而不流在筋則屈而不伸在肉則不仁在脾則逢寒急逢熱則縱此皆隨所受邪氣而生證也大率痹病總而言之凡有五種筋痹脈痹皮痹骨痹肌痹是也筋痹之為病應乎肝其狀夜臥則驚飲食多小便數脈痹之為病應乎心其狀血脈不流令人痿黃心下鼓氣卒然逆喘不通嗌乾善噫肌痹之為病應乎脾其狀四肢懈怠發咳嘔吐皮痹之為病應乎肺其狀皮膚無所知覺氣奔喘滿骨痹之為病應乎腎其狀骨重不可舉不遂而痛且脹診其脈大而澀為痹脈來急者亦為痹脈澀而緊者亦為痹又有風血痹陰邪入於血經故也外有支飲亦令人痹當隨證施治蠲痹湯治身體煩疼項背拘急或痛或重舉動艱難及手足冷痹腰腿沉重筋脈無力當歸去蘆酒浸赤茯苓黃耆去蘆片子薑黃羌活各一兩半甘草炙半兩上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至八分去滓溫服不拘時候黃耆酒治風濕痹身體頑麻皮膚燥癢筋脈攣急言語謇澀手足不遂時覺不仁黃耆去蘆防風去蘆官桂不見火天麻萆薢石斛去根虎骨酥炙白芍藥當歸去蘆雲母粉白朮茵芋葉木香不見火仙靈脾甘草川續斷各一兩上銼如麻豆大以生絹袋盛以好酒一斗浸之春五日夏三日秋七日冬十日每服一盞溫服之不拘時候常令酒氣相續為佳防風湯茯苓湯治支飲手足麻痹多睡眩冒半夏湯泡七次赤茯苓去皮橘紅各一兩枳實去瓤麩炒桔梗去蘆甘草炙各半兩上㕮咀每服四錢水一盞半薑七片煎至七分去滓溫服不拘時候血病門附金瘡內損瘀血方失血論治吐血嘔血咳血醫經所載失血有三種一曰血衄二曰肺疽三曰傷胃是也蓋心主血肝藏血肺主氣血為營氣為衛相隨上下升降無有休息者也六氣不傷七情不郁營衛調平則無壅決之虞節宣失宜必致壅閉遂不得循經流注失其常度故有妄行之患焉夫血之妄行也未有不因熱之所發蓋血得熱則淖溢血氣俱熱血隨氣上乃吐衄也大抵脈芤為失血沉細者易治浮大者難治又有感冒汗後不解鬱結經絡隨氣湧泄而成衄血思慮傷心心傷則吐衄肺傷亦令人唾血又有折傷吐血治療之法當以證別之乃可施治又論夫吐血嘔血咳血三者皆謂之失血蓋肺主於氣心主於血肝藏於血血之與氣營周一身相隨上下無有休息者焉倘乖調攝營衛差經血隨氣逆遂有妄行之患所致之由因大虛損或飲酒過度或強食過飽或飲啖辛熱或憂思恚怒動擾三經而然諸失血之脈沉細者易治脈數浮大者難治且咳血一證不嗽者易治兼嗽者為難愈為肺傷故也醫經云便血猶可止咳血不易醫喉不停物毫髮必咳血滲入喉愈滲愈咳愈咳愈滲飲溲溺者十無一死服寒涼者百無一生以此觀之寒涼之劑不宜過進也諸方備列參而用之庶得萬全耳伏龍肝膏治吐血不止伏龍肝末生地黃汁麥門冬汁刺薊汁各三合白蜜半匙上件藥相合以慢火熬如稀餳不拘時候含半匙咽之大薊汁飲治吐血嘔血大薊汁生地黃汁各一合上件和勻入薑汁少許生蜜少許攪均冷服不拘時候錦節丸治唾血嘔血真錦灰藕節灰各半兩的乳香一錢別研上為細末煉蜜為丸如龍眼大每服一丸食後及臨臥噙化團參散治唾血咳嗽服涼藥不得者人參一兩黃耆一兩蜜水炙百合蒸半兩飛羅粉一兩上為細末每服二錢食後用白茅根煎湯調服茅花煎湯亦可天門冬湯治思慮傷心吐衄不止遠志去心甘草水煮白芍藥天門冬去心麥門冬去心黃耆去蘆藕節阿膠蛤粉炒沒藥當歸去蘆生地黃各一兩人參甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候大薊散治飲啖辛熱熱邪傷肺嘔吐出血一合或半升許名曰肺癰大薊根洗犀角鎊升麻桑白皮炙蒲黃炒杏仁去皮尖桔梗去蘆炒各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候雞蘇散治勞傷肺經唾內有血咽喉不利雞蘇葉黃耆去蘆生地黃洗阿膠蛤粉炒白茅根各一兩桔梗去蘆麥門冬去心蒲黃炒貝母去心甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候藕節飲治吐血衄血不止生藕汁生地黃汁大薊汁各三合生蜜半匙上件藥汁調和令勻每服一小盞細細冷呷之不拘時候加味理中湯治飲酒傷胃遂成嘔吐物與氣上衝與血吐出或心腹疼痛自汗名曰傷胃嘔血人參乾薑炮白朮各一兩乾葛甘草炙各半兩上為細末每服三錢水一大盞煎至七分去滓溫服不拘時候便血評治夫大便下血者多因過飽飲酒無度房室勞損榮衛氣虛風冷易入邪熱易蘊留注大腸則為下血血色鮮者風也色如小豆汁者寒也濁而色黯者熱也久而不愈必為痔漏之疾矣脈來浮弱按之帶芤者下血也治之之法風則散之熱則清之寒則溫之虛則補之所增之方並載於後更與腸風論中加以參訂而用之未有不奏效者也烏梅丸治大便下血不止烏梅三兩燒存性用上為細末好醋打米糊為丸如梧桐子大每服七十丸空心食前用米飲送下聚金丸治大腸畜熱或因酒毒下血不已黃連去蘆四兩一兩水浸曬乾一兩炒一兩炮一兩生用防風去蘆黃芩各一兩上為細末醋糊為丸如梧桐子大每服七十丸用米飲送下不拘時候金瘡內損瘀血方奪命散治金瘡打損及從高墜下木石所壓內損瘀血心腹疼痛大小便不通氣絶欲死紅蛭用石灰慢火炒令焦黃色半兩大黃二兩黑牽牛二兩上件為末每服三錢用熱酒調下如人行四五里再用熱酒調牽牛末二錢催之須臟腑轉下惡血成塊或成片惡血盡則愈心腹痛門附脅痛心痛論治夫心痛之病醫經所載凡有九種一曰蟲心痛二曰疰心痛三曰風心痛四曰悸心痛五曰食心痛六曰飲心痛七曰寒心痛八曰熱心痛九曰去來心痛其名雖不同而其所致皆因外感六淫內沮七情或飲啖生冷果食之類使邪氣搏於正氣邪正交擊氣道閉塞鬱於中焦遂成心痛夫心乃諸臟之主正經不可傷傷之則痛若痛甚手足青過節者則名曰真心痛真心痛者旦發夕死夕發旦死若乍間乍甚成疹而不死者名曰厥心痛不過邪氣乘於心支別絡也寸口脈緊心脈甚急皆主心痛又有痛甚而心脈沉伏者有之矣王叔和云心腹痛脈沉細瘥浮大弦長命必殂治法當推其所自而調之痛無不止矣又論夫心痛之病有真心痛有厥心痛心乃五臟六腑之所主法不受病其痛甚手足青而冷者名曰真心痛此神去氣竭旦發夕死夕發旦死或六淫七情之所傷五臟之氣衝逆其痛乍間乍甚成疹而不死者名曰厥心痛此皆邪氣乘於心支別絡也大抵痛為實痛宜下寒宜溫溫利之藥卻痛散主之若婦人血刺心痛倉卒取功效之速立應散主之其諸心痛各方審處而用之以平為期加味七氣湯治喜怒憂思悲恐驚七氣為病發則心腹刺痛不可忍時發時止發則欲死及外感風寒濕氣作痛亦宜服之半夏湯泡七次三兩桂心不見火玄胡索炒去皮各一兩人參甘草炙各半兩乳香三錢上㕮咀每服四錢水一盞半生薑七片棗一枚煎至七分去滓食前溫服婦人血痛加當歸煎九痛丸治九種心痛腹脅氣脹不欲飲食附子炮去皮臍二兩乾薑炮吳茱萸炒狼毒銼醋拌炒黃人參各一兩巴豆半兩去殼油上細末煉蜜為丸如梧桐子大每服三丸熱湯送下不拘時候愈痛散治急心痛胃痛五靈脂去砂石玄胡索炒去皮蓬莪朮煨銼良薑銼炒當歸去蘆洗上等分為細末每服二錢熱醋湯調服不拘時候蕪荑散治大人小兒蛔咬心痛經云蟲貫心則殺人欲驗之大便不可忍或吐青黃緑水涎沫或吐蟲出發有休止此是蛔心痛也宜速療之乾漆捶碎炒火煙盡一兩雷丸蕪荑各半兩上為細末每服三錢溫水七分盞調和服不拘時候甚者不過三服小兒每服半錢重燒脾散治飲啖生冷果菜寒留中焦心脾冷痛不可忍及老幼霍亂吐瀉乾薑炮厚朴薑製銼炒草果仁縮砂仁神麯銼炒麥糵炒橘紅良薑銼炒甘草炙各等分上為細末每服三錢用熱鹽湯點服不拘時候卻痛散治心痛不可忍者高良薑一兩銼如骰子火煨巴豆五枚去殼上和炒令轉色去巴豆不用研為細末每服二錢用熱酒調服不拘時候立應散治婦人血刺心痛玄胡索不拘多少去皮炒令轉色不可焦上為細末每服二錢酒一盞煎至七分服不拘時候不能飲者以陳米飲調下酒調亦得二者不若酒煮快脅痛評治夫脅痛之病醫經曰兩脅者肝之候又云肝病者兩脅下痛多因疲極嗔怒悲哀煩惱謀慮驚憂致傷肝臟肝臟既傷積氣攻注攻於左則左脅痛攻於右則右脅痛移逆兩脅則兩脅俱痛久而不愈流注筋脈或腰腳重墜或兩股筋急或四肢不舉漸至脊膂攣急疼痛氣遇風搏則脅下結塊氣遇寒搏則脅肋骨痛下連小腹上引心端大抵諸氣惟膀胱氣脅下痛最難治神保丸能治之更有肝之積名曰肥氣在左脅下大如覆杯其病左脅下痛連引小腹足寒轉筋肺之積名曰息賁在右脅下覆大如杯其病喘息奔溢肝積肥氣丸主氣肺積息賁湯主之方載後枳芎散治左脅刺痛不可忍者枳實炒川芎各半兩粉草炙二錢半上為細末每服二錢薑棗煎湯調服酒調亦可不拘時候推氣散治右脅疼痛脹滿不食枳殼去瓤麩炒桂心去粗皮不見火片子薑黃洗各半兩甘草炙三錢上為細末每服二錢薑棗煎湯調服熱酒調服亦可不拘時候神保丸治膀胱氣脅下痛或病項筋痛久而不愈流入背膂並皆治之木香胡椒各一分全蠍七枚巴豆十枚去皮心研上為細末入巴豆令均湯浸蒸餅為丸如緑豆大硃砂為衣每服七粒用茴香酒送下食前肥氣丸治肝之積在左脅下如覆杯有頭足如龜鱉狀久久不愈發咳逆痎瘧連歲不已青皮去白銼炒一兩川當歸去蘆洗一兩焙蛇含石火煅醋淬七次三分蒼朮削去皮米泔浸一宿銼炒一兩莪朮切京三稜切鐵豔粉各一兩半與三稜莪朮同入醋煮一伏時上為細末醋煮米糊為丸如緑豆大每服四十丸當歸浸酒食前服息賁湯治肺之積在右脅下大如覆杯久久不愈病灑灑寒熱氣逆喘咳發為肺癰半夏湯泡七次吳茱萸炒桂心不見火各七錢半人參桑白皮炙葶藶微炒甘草炙各三錢半上㕮咀每服四錢水一盞半生薑七片棗二枚煎至七分去滓食前溫服癥瘕積聚門積聚論治夫積有五積聚有六聚積者生於五臟之陰氣也聚者成於六腑之陽氣也此由陰陽不和臟腑虛弱風邪搏之所以為積為聚也有如憂思喜怒之氣人之所不能無者過則傷乎五臟逆於四肢傳克不行乃留結而為五積故在肝曰肥氣在心曰伏梁在脾曰痞氣在肺曰息賁在腎曰奔豚其名不同其證亦異肥氣之狀在左脅下大如覆杯肥大而似有頭足是為肝積診其脈弦而細其色青其病兩脅下痛牽引小腹足寒轉筋男子為積疝女子為瘕聚伏梁之狀起於臍下其大如臂上至心下猶梁之橫架於胸膈者是為心積診其脈沉而芤其色赤其病腹熱面赤咽乾心煩甚則吐血令人食少肌瘦痞氣之狀留於胃脘大如覆杯痞塞不通是為脾積診其脈浮大而長其色黃其病飢則減飽則見腹滿嘔泄足腫肉削久不愈令人四肢不收息賁之狀在右脅下大如覆杯喘息奔溢是為肺積診其脈浮而毛其色白其病氣逆背痛少氣喜忘目瞑膚寒皮中時痛或如蝨緣或如針刺奔豚之狀發於小腹上至心下上下無時有若豚走之狀是為腎積診其脈沉而急其色黑其病飢則見飽則減小腹裡急腰痛口乾目昏骨冷久不愈令人骨痿少氣又如六聚之成於六腑則異是矣何者六腑屬於三陽太陽利清氣陽明泄濁氣少陽化精氣有如都會之腑主轉輸以為常也夫苟六腑失常則邪氣聚而不散始發既無根本上下無所留止其痛亦無常處故在上則格在下則脹傍攻兩脅如有杯塊易於轉動故非五積之比也凡脈快而緊者積聚也脈來小沉重者胃中有積聚也大抵病各有證治各有方如診心腹積聚其脈牢強急者生虛弱急者死又諸脈實強者生沉小者死此又不可不察也又論夫積者傷滯也傷滯之久停留不化則成積矣且人之臟腑皆因觸冒以成疾病惟脾胃最易受觸蓋日用飲食稍或過多停滯難化或吐或嘔或泄或痢當是之時法宜推蕩然後助養脾胃所謂推蕩者更宜斟量人之虛實傷滯之輕重而推蕩之停滯一消則不成積克化失宜久之必成積聚癥瘕矣所謂積者有氣積肉積酒積茶積食積痰積更有婦室月經不通遂成血積凡治諸積之要並載於後倘於前證參酌而用之可也香稜丸治五積破痰癖消症塊及冷熱積聚木香不見火丁香各半兩京三稜細銼酒浸一宿枳殼去瓤麩炒莪朮細銼一兩用去殼巴豆三十粒同炒巴豆黃色去巴豆不用青皮去白川楝子銼炒茴香炒上等分為細末醋煮麵糊為丸如梧桐子大以硃砂研極細為衣每服二十丸炒生薑鹽湯下溫酒亦得不拘時候妙應丸治老人虛人一切虛寒痃癖積塊攻脹疼痛黑附子二枚各重七錢去皮臍剜作罐子硇砂三錢用水一盞化在盞中火上熬干稱木香不見火七錢半破故紙微炒畢茇各一兩上將飛過硇砂末分入附子甕內卻用剜出附子末蓋口用和成白麵裹藥半指厚慢炭火內煨令黃色去面同木香等為細末卻將原裹附子熟黃面為末醋調煮糊為丸如緑豆大每服十五丸至二十丸食後生薑湯送下磨積丸治腸胃因虛氣癖於盲膜之外流於季脅氣逆息難多日頻年醫所不治久則營衛停凝一日敗濁潰為癰膿多至不救胡椒一百五十粒木香不見火二錢半全蠍去毒十個上為細末粟米飲為丸如緑豆大每服十五丸橘皮湯下大七氣湯治六聚狀如癥瘕隨氣上下發作有時心腹㽱痛攻刺腰脅上氣窒塞喘咳滿悶小腹䐜脹大小便不利或復泄瀉淋瀝無度京三稜莪朮青皮去白陳皮去白藿香葉桔梗去蘆銼炒肉桂不見火益智仁各一兩半甘草炙三分香附子炒去毛一兩半上為㕮咀每服五錢水二盞煎至一盞去滓溫服食前阿魏丸治氣積肉積心腹膨滿結塊疼痛或引脅肋疼痛或痛連背膂不思飲食木香不見火檳榔各半兩胡椒阿魏用醋化開旋入各二錢半上為細末用阿魏膏子並粟米飯杵和為丸如梧桐子大每服四十丸不拘時候用生薑橘皮湯下脾積丸治食積茶積飲食減少面黃腹痛陳倉米半斤用巴豆七粒去殼同米炒令赤色去巴不用青皮去瓤炒陳橘皮各二兩上為細末好醋搜和為丸如豌豆大每服二十丸食後用淡薑湯送下麴櫱丸治酒癖不消心腹脹滿噫醋吞酸啘逆不食脅肋疼痛神麯銼炒麥糵炒各一兩黃連去須半兩巴豆三粒去殼同炒令轉色去巴豆不用上為細末沸湯搜丸如梧桐子大每服五十丸食後用薑湯吞下袞金丸治痰積中脘耽瞑嘔吐頭疼噁心時吐酸水陳皮不去白天南星生用乾薑洗去灰生用各半兩雄黃二錢半研極細上為細末用生薑自然汁浸蒸餅為丸如梧桐子大以前雄黃末為衣每服五十丸食後生薑湯下宿食門宿食論治難經云脾氣通於口口和則知穀味矣心氣通於舌舌和則知五味矣是知穀味五味莫不經由口舌而入於胃也善攝生者謹於和調使一飲一食入於胃中隨消隨化則無滯留之患若稟受怯弱飢飽失時或過餐五味魚腥乳酪強食生冷果菜停蓄胃脘遂成宿滯輕則吞酸嘔惡胸滿噎噫或泄或利久則積聚結為癥瘕面黃羸瘦此皆宿食不消而主病焉大率才有停滯當量人虛實速宜克化之不可後時養成沉疴也黑丸子治中脘有宿食吞酸噁心口吐清水噫宿腐氣或心腹疼痛及中虛積聚飧泄赤白痢下烏梅肉七個百草霜三錢杏仁去皮尖別研三七枚巴豆去殼並油二枚半夏湯泡七次九枚縮砂仁三七枚上為細末和勻用薄糊為丸如黍米大每服十五丸加至二十丸用熟水送下薑湯亦得更看虛實增損丸數或因食生冷魚膾等用治中湯送下亦可如意丸治虛中積冷氣弱有傷不能傳化心下堅痞兩脅脹滿心腹疼痛噫宿腐氣及霍亂吐瀉米穀不消久痢赤白膿血相雜久病黃色羸瘦及腹中一切食症之疾並皆治之枳殼去瓤檳榔橘紅半夏湯泡七次莪朮京三稜乾薑泡黃連去須各二兩巴豆三七粒連殼用上件除巴豆外銼如豆大用好醋合巴豆煮乾去巴豆余藥焙為細末薄糊為丸如緑豆大每服十丸加至十五丸用茶清薑湯任下食後臨臥服有孕婦人不宜服阿魏丸治脾胃怯弱食肉食麵或食生果停滯中焦不能克化致腹脹疼痛嘔惡不食或痢或祕悉主之阿魏酒浸化旋入官桂不見火莪朮炮麥糵炒神麯炒青皮去瓤羅卜炒白朮乾薑炮各半兩百草霜三錢巴豆去殼油三七個上件為細末和勻用薄糊為丸如緑豆大每服二十丸不拘時薑湯送下面傷用麵湯送下生果傷用麝香湯送下脹滿門脹滿論治脹滿者俗諺所謂膨亨是也內經問人有病旦食不能暮食此為何病歧伯對曰名曰鼓脹治之以雞矢醴一劑至二劑已治法雖詳而不論其病之所由生故切有疑焉大抵人之脾胃主於中州大腹小腹是其候也若陽氣外強陰氣內正則臟氣得其平病何由生苟或將理失宜風寒暑濕得以外襲喜怒憂思得以內傷食啖生冷過飲寒漿擾動沖和如是陰氣當升而不升陽氣當降而不降中焦痞結必成脹滿脹滿不已變證多端或腸鳴氣走漉漉有聲或兩脅腰背痛連上下或頭痛嘔逆或胸悶不食或大小便為之不利未有不因脹滿而使焉更有五疸水氣腳氣及婦人血膨令人脹滿若論其脈脈浮者可治脈虛小者為難治平肝飲子治喜怒不節肝氣不平邪乘脾胃心腹脹滿連兩脅妨悶頭暈嘔逆脈來浮弦防風去蘆桂枝不見火枳殼去瓤麩炒赤芍藥桔梗去蘆銼炒各一兩木香不見火人參檳榔當歸去蘆酒浸川芎桔紅甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候紫蘇子湯治憂思過度邪傷脾肺心腹膨脹喘促胸滿腸鳴氣走漉漉有聲大小便不利脈虛緊而澀紫蘇子一兩大腹皮草果仁半夏湯泡七次厚朴去皮薑製炒木香不見火桔紅木通白朮枳實去瓤麩炒人參甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片棗二枚煎至七分去滓溫服不拘時候枳實湯治腹脹發熱大便祕實脈多洪數此名熱脹枳實去瓤麩炒半兩厚朴薑製炒一兩大黃酒蒸甘草炙各三錢桂心不見火二錢半上㕮咀每服四錢水一盞半生薑五片棗二枚煎至七分去滓溫服不拘時候嘔者加半夏一兩朴附湯治老人虛人中寒下虛心腹膨脹不喜飲食脈來浮遲而弱此名寒脹附子炮去皮厚朴薑製炒上二味等分㕮咀每服四錢水二盞薑七片棗子二枚煎至八分去滓溫服不拘時候少加木香尤佳強中湯治脾胃不和食啖生冷過飲寒漿多致腹脹心下痞滿有妨飲食甚則腹痛乾薑炮去土白朮各一兩青皮去白桔紅人參附子炮去皮臍厚朴薑製炒甘草炙各半兩草果仁丁香各三兩上㕮咀每服四錢水一盞半生薑五片大棗二枚煎至七分去滓溫服不拘時候嘔者加半夏半兩或食麵致脹滿加蘿蔔子半兩桂香丸治大人小兒過食雜果腹脹氣急肉桂不見火一兩麝香別研一錢上為細末飯丸如緑豆大大人十五丸小兒七丸不拘時候熟水送下未痊再服獨聖湯治脾胃不足過食瓜果心腹脹堅痛悶不安鹽五合上用水一升煎消頓服自吐下即定或因食麥令人腹脹酒和薑汁飲一兩杯即消大正氣散治脾胃怯弱風寒濕氣傷動沖和心腹脹滿有妨飲食厚朴薑製炒藿香葉半夏湯泡七次桔紅白朮各一兩甘草炙檳榔桂枝不見火枳殼去瓤麩炒乾薑炮各半兩上㕮咀每服四錢水一盞半生薑五片棗子二枚煎至七分去滓溫服不拘時候水腫門水腫論治水腫為病皆由真陽怯少勞傷脾胃脾胃既寒積寒化水蓋脾者土地腎者水也腎能攝水脾能捨水腎水不流脾舍堙塞是以上為喘呼咳嗽下為足膝膚腫面浮腹脹小便不利外腎或腫甚則肌肉崩潰足脛流水多致不救歧伯所謂水有膚脹鼓脹腸覃石瘕種類不一皆聚水所致夫水之始起也目裹微腫如臥蠶起之狀頸脈動喘時咳陰股間寒足脛腫腹乃大為水已成以手按其腹隨手而起如裹水之狀此其候也又有蠱脹腹滿不腫水脹面目四肢俱腫治蠱以水藥治水以蠱藥非其治也治療之法先實脾土脾實則能捨水土得其政面色純黃江河通流腎水行矣腫滿自消次溫腎水骨髓堅固氣血乃從極陰不能化水而成冰中焦溫和陰水泮流然後腫滿自消而形自盛骨肉相保巨氣乃平然此病證不可治者有五五證見巢氏病源然水病最難治特須慎於口味戒房勞謔戲若不能戒此愈而復病者多矣經云治水之法腰以上腫宜發汗腰以下腫宜利小便此至當之論然腫滿最慎於下當辨其陰陽陰水為病脈來沉遲色多青白不煩不渴小便澀少而清大腑多泄此陰水也則宜用溫暖之劑如實脾散復元丹是也陽水為病脈來沉數色多黃赤或煩或渴小便赤澀大腑多閉此陽水也則宜用清平之藥如疏鑿飲子鴨頭丸是也又有年少血熱生瘡變為腫滿煩渴小便少此為熱腫素問所謂結陽者腫四肢是也實脾散治陰水先實脾土厚朴去皮薑製炒白朮木瓜去瓤木香不見火草果仁大腹子附子炮去皮臍白茯苓去皮乾薑炮各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不拘時候復元丹治陰水次溫腎水附子炮二兩木香煨茴香炒川椒炒出汗獨活去蘆厚朴薑製炒橘紅吳茱萸炒桂心不見火白朮肉豆蔻麵裹煨檳榔各半兩澤瀉一兩上為細末麵糊為丸如梧桐子大每服七十丸用紫蘇湯送下空心食前疏鑿飲子治水氣通身洪腫喘呼氣急煩躁多渴大小便不利服熱藥不得者澤瀉赤小豆炒商陸羌活去蘆大腹皮椒目木通秦艽去蘆檳榔茯苓皮上等分㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候葶藶丸治腫滿水氣蠱脹甜葶藶半兩白朮半兩桑白皮赤茯苓防己三分牽牛半兩半生半熟羌活陳皮澤瀉各三分郁李仁湯去皮熬紫色稱三分與葶藶二味別研如膏令極細上為細末與上二味同研煉蜜和入臼內杵之丸如桐子大初服十丸空心晚食前一日二服生薑橘皮湯下不知加至二三十丸以知為度或加蘿蔔子甘遂二分切片炒鴨頭丸治水腫面赤煩渴面目肢體悉腫腹脹喘急小便澀少甜葶藶略炒豬苓去皮漢防己以上各一兩上為細末緑頭鴨血為丸如梧桐子大每服七十丸用木通湯送下麻黃甘草湯治水腫從腰以上俱腫以此湯發汗麻黃去根節四兩甘草二兩上㕮咀每服三錢水一盞半煮麻黃再沸內甘草煎至八分取汗慎風冷有人患氣促積久不瘥遂成水腫服之有效但此藥發表老人不可輕用更宜詳審七皮飲大腹皮陳皮茯苓皮生薑皮青皮地骨皮甘草皮以上各半兩上為細末每服三錢水一大盞煎八分溫服無時候赤小豆湯治年少血氣俱熱遂生瘡疥變為腫滿或煩或渴小便不利赤小豆炒當歸去蘆炒商陸澤瀉連翹仁赤芍藥漢防己木豬苓去皮桑白皮炙澤漆以上各半兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候熱甚者加犀角二錢半三仁丸治水腫喘急大小便不利郁李仁杏仁炮去皮尖薏苡仁以上各一兩上為細末用米糊為丸如梧桐子大每服四十丸不拘時候米飲下脾約麻仁丸雖不言治腫然水腫人腎腫水光不可行者三服神驗麻仁五兩別研枳實麩炒半斤厚朴去粗皮薑製半斤芍藥半斤大黃去皮一斤蒸切杏仁湯去皮炒黃別研五兩上前二味別研如泥用四味為細末入臼杵勻蜜丸如梧子大每服二十丸臨臥溫水下以大便通利為度未利再服此是古法今治腎腫水光只一二服以退為度不必利可也塗臍膏治水腫小便絶少地龍豬苓去皮針砂以上各一兩上為細末擂蔥涎調成膏敷臍中約一寸高闊絹帛束之以小便多為度日兩易加味腎氣丸治腎虛腰重腳重小便不利附子炮二兩白茯苓去皮澤瀉山茱萸取肉山藥炒車前子酒蒸牡丹皮去木各一兩官桂不見火川牛膝去蘆酒浸熟地黃各半兩上為細末煉蜜為丸如梧桐子大每服七十丸空心米飲下蠱毒門蠱毒論治經書所載蠱毒有數種閩中山間人造作之以蟲蛇之類用器皿盛貯聽其互相食啖有一物獨存者則謂之蠱取其毒於酒中能禍於人中其毒也令人心腹絞痛如有物咬吐下血皆如爛肉若不即治蝕人五臟即死然此病有緩有急急者倉卒十數日便死緩者延引歲月遊周腹內氣力羸憊骨節沉重發即心痛煩躁而病人所食之物亦變化為蠱漸侵食臟腑則死矣死則病流注染著旁人遂成蠱注也欲驗之法令病人唾水沉者是蠱不沉者非蠱也或含一大豆豆脹皮脫者蠱也豆不爛脫非蠱也以鵠皮至病人臥下勿令病人知病劇者是蠱病不劇者非蠱也治療之法不可作他病治之切須審細古人以敗鼓皮燒灰米飲服方寸匕須臾自呼蠱家姓名令呼喚將去則愈凡中蠱嚼生黑豆不腥白礬味甘皆中毒也丹砂丸治蠱毒雄黃別研硃砂別研各半兩鬼臼巴豆去皮心油各一兩上為細末煉蜜為丸如大豆大每服三丸空心煎乾薑湯送下當轉下惡物並蠱毒等當煩悶後以鴨為羹食之雄麝散治五種蠱毒雄黃末麝香末各一字上件藥取生羊肺如指大以刀開內雄黃等末以肺裹吞之礬灰散治中諸物毒晉礬建茶各等分上件藥為細末每服二錢新汲水調下得吐即效未吐再服黃疸門五疸論治古方論有黃疸有疸病命名不同其實一也詳觀他書黃有三十六種疸有五種三十六種黃者聖惠方載之備矣五疸之證感之者多不容不詳其五疸者黃汗黃疸谷疸酒疸女勞疸是也黃汗之狀身體俱腫汗出不渴狀如風水汗出染衣黃如蘖汁其脈自沉此由脾胃有熱汗出入水浴水入汗空中故汗黃也黃疸之狀食己即飢身體面目爪甲牙齒及小便悉黃欲安臥或身體多赤多青皆見者必發寒熱此由酒食過度臟腑熱極水穀相併積於脾胃復為風濕所搏結滯不散熱氣鬱蒸所為也大抵發於陰部其人必嘔發於陽部必振寒而發熱谷疸之狀食畢即頭眩心中怫鬱不安而發黃此由大飢大食胃氣衝蒸所致也酒疸之狀身目發黃心中懊痛足脛滿小便黃面發赤斑此由飲酒多進谷少胃內生熱因大醉當風入水所致也女疸之狀身目皆黃發熱惡寒小腹滿急小便不利此由大勞大熱不能保攝房後入水所致也其間多渴而腹脹者其病難療又有時氣傷風傷寒伏暑亦令人發黃五疸口淡怔忡耳鳴腳弱微寒發熱小便白濁當作虛證治不可妄投涼劑愈傷血氣臨病之際不可不辨明也黃耆散治黃汗黃耆去蘆蜜水炙赤芍藥茵陳各二兩石膏四兩麥門冬去心豉各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候茵陳散治黃疸茵陳木通梔子仁各一兩大黃炒一兩瓜蔞一個石膏二兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片蔥白一莖同煎至八分去滓溫服不拘時候谷疸丸治谷疸苦參三兩龍膽草一兩牛膽一枚上為細末用牛膽汁入少煉蜜為丸如梧桐子大每服五十丸空心食前熟水或生薑甘草湯送下紅丸子亦可服方載和劑局方中葛根湯治酒疸葛根二兩枳實去瓤麩炒梔子仁豉各一兩甘草炙半兩上㕮咀每服四錢水一盞半煎至八分去滓溫服不拘時候茵陳湯治時行瘀熱在裡鬱蒸不消化為發黃茵陳二兩大黃一兩梔子仁三錢上㕮咀每服四錢水一盞半煎至八分去滓溫服不拘時候加減五苓湯治伏暑郁發黃煩渴小便不利赤茯苓去皮豬苓去皮澤瀉白朮茵陳各等分上為㕮咀每服四錢水一盞半煎至八分去滓溫服不拘時候秦艽飲子治五疸口淡耳鳴腳弱微寒發熱小便白濁秦艽去蘆當歸去蘆酒浸芍藥白朮官桂去皮不見火茯苓去皮熟地黃酒蒸橘紅小草川芎各一兩半夏湯泡甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候滑石散治女勞疸身目俱黃惡寒發熱小腹滿急小便艱難滑石一兩半白礬一兩燒令汁盡上件藥搗細羅為散每服不計時候以大麥粥飲調下二錢小便出黃水為度上為細末用醋麵糊為丸如梧桐子大礬紅為衣每服三十粒食後薑湯下小兒臨時加減與服咳喘痰飲門咳嗽論治夫嗽者古人所謂咳是也蓋皮毛者肺之合也皮毛先受邪氣邪氣以從其合也又經云五臟六腑皆令人咳非獨肺也由是觀之皮毛始受邪氣邪氣先從其合然後傳為五臟六腑之咳外則六淫所傷內則七情所感連滯歲月致傷五臟遂成勞咳者多矣且傷於風者憎寒身熱自汗惡風而咳傷於寒者憎寒身熱無汗惡寒而咳傷於暑者煩渴引飲而咳傷於濕者骨節煩疼四肢重著而咳喜傷心者喉中介介如梗狀甚者咽腫喉痹謂之心咳怒傷於肝者兩脅下痛甚則兩胠下滿謂之肝咳思傷脾者右脅下痛痛引肩背甚則不可以動動則咳劇謂之脾咳恐傷於腎者腰背相引而痛甚則咳涎謂之腎咳憂傷於肺者喘息有音甚則唾血謂之肺咳臟咳不愈則腑受之心咳不已小腸受之咳與氣俱失肝咳不愈膽受之咳嘔膽汁脾咳不愈胃受之咳而嘔嘔甚則長蟲出肺咳不愈大腸受之咳而遺矢腎咳不愈膀胱受之咳而遺溺久咳不愈三焦受之咳而腹滿不欲食此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也又況房勞過度飢飽失宜疲極叫呼勞神傷心皆令人咳夫咳嗽之脈浮大者生沉小伏匿者死治療之法當推其所自而調之無不效者矣今人治咳多喜用罌粟殼烏梅之類殊不知罌粟殼其性緊澀烏梅味酸乃傷脾之劑脾胃壯實者服之猶可脾胃稍弱者未見其效穀氣先有所損矣能慎此者庶免後患也杏子湯治一切咳嗽不問外感風寒內傷生冷及痰飲停積悉皆治療人參半夏湯泡七次茯苓去皮細辛洗乾薑炮官桂不見火杏仁去皮尖炒白芍藥甘草炙五味子各等分上㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候此藥味多辛辣其性稍熱若冷嗽則宜服之如熱嗽豈宜服之若的因感寒得之宜加少麻黃去根節煎何以知其感寒脈息沉緊身熱無汗惡寒而咳者是也橘蘇散治傷風咳嗽身熱有汗惡風脈浮病人挾熱服杏子湯不得者此藥穩當橘紅紫蘇葉杏仁去皮尖五味子半夏湯泡七次桑白皮炙貝母去心白朮各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候白朮湯治五臟受濕咳嗽痰多上氣喘急身體痛重脈來濡細白朮二兩五味子半夏湯泡七次白茯苓去皮橘紅各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候團參飲子治病因抑鬱憂思喜怒飢飽失宜致臟氣不平咳嗽膿血漸成肺痿憎寒壯熱羸瘦困頓將成勞瘵人參紫菀茸洗阿膠蛤粉炒百合蒸細辛洗去葉土款冬花杏仁去皮夾炒天門冬湯浸去心半夏湯泡七次經霜桑葉五味子各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五大片煎至七分去滓食後溫服因氣而咳者宜加木香咳而唾血有熱者加生地黃咳而唾血有寒者加鍾乳粉因疲極而咳嗽者加黃耆因咳損而唾血者加沒藥藕節咳而嘔逆腹滿不食者加白朮仍倍加生薑咳而小便多者加益智仁咳而大便溏者去杏仁加鍾乳粉咳而面浮氣逆者加沉香橘皮煎半夏丸治肺藏蘊熱痰嗽胸膈塞滿栝蔞子去殼別研半夏湯泡七次焙取末各一兩上件和勻生薑自然汁打麵糊為丸如梧桐子大每服五十丸食後用薑湯送下呵子飲治久嗽語聲不出呵子去核一兩杏仁泡去皮尖一兩通草二錢半上㕮咀每服四錢水一盞半煨生薑切五片煎至八分去滓溫服食後百花膏治喘嗽不已或痰中有血款冬花百合蒸焙上等分為細末煉蜜為丸如龍眼大每服一丸食後臨臥細嚼薑湯咽下噙化尤佳喘論治素問云諸氣者皆屬於肺諸喘者亦屬於肺是以人之一呼一吸謂之息呼吸之間脾受其氣通乎榮衛合乎陰陽周流一身無過不及然後權衡得其平矣將理失宜六淫所傷七情所感或因墜墮驚恐度水跌僕飽食過傷動作用力遂使臟氣不和榮衛失其常度不能隨陰陽出入以成息促迫於肺不得宣通而為喘也診其脈滑手足溫者生脈澀四肢寒者死數者亦死謂其形損故也更有産後喘急為病尤亟因産所下過多榮血暴竭衛氣無所主獨聚於肺故令喘急謂之孤陽絶陰為難治醫療之法當推其所感詳其虛實冷熱而治之如産後喘急已載於婦人産後十六論中矣茲不再敘亦有痰停胃脘痰與氣搏肺道壅塞亦令人上氣此又不可不知也又論夫喘者上氣也嗽者古人所謂咳也經云諸氣者皆屬於肺肺主皮毛皮毛先受邪氣邪氣以從其合也則知喘嗽之疾關係乎肺明矣但久嗽不已傳於五臟六腑至於三焦病之極也前所載論治洞究其源茲舉大略不復再敘臨病之際又當審訂對證用之以平為期華蓋散治風寒冷濕之氣傷於肺經上氣喘促不得睡或聲音不出者杏仁去皮尖炒紫蘇子微炒麻黃去根節赤茯苓去皮橘紅桑白皮炙各一兩甘草炙半兩上為細末每服二錢水一盞煎至七分食後溫服葶藶散治過食煎爆或飲酒過度致肺壅喘不得臥及肺癰咽燥不渴濁唾腥臭甜葶藶炒桔梗去蘆栝蔞子川升麻薏苡仁桑白皮炙葛根各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓食後溫服二黃丸治停痰在胃喘息不通呼吸欲絶雌黃一錢雄黃一兩上二味研羅極細用黃蠟為丸如彈子大每服一丸於半夜時熱煮糯米粥乘熱以藥投在粥內攪轉和粥吃杏參飲治因墜墮驚恐度水跌僕疲勞筋力喘急不安人參桑白皮橘紅大腹皮檳榔白朮訶子麵裹煨取肉半夏湯泡七次桂心不見火杏仁去皮尖炒紫菀洗甘草炙上等分㕮咀每服四錢水一盞半生薑五片入紫蘇葉七葉煎至七分去滓溫服不拘時候四磨湯治七情傷感上氣喘息妨悶不食人參檳榔沉香天台烏藥上四味各濃磨水和作七分盞煎三五沸放溫服或下養正丹尤佳定喘丹治男子婦人久患咳嗽肺氣喘促倚息不得睡臥齁䶎嗽亦宜服之杏仁去皮尖炒別研馬兜鈴蟬蛻洗去土並足翅炒各一兩煅砒二錢別研上件為末蒸棗肉為丸如葵子大每服六七丸臨睡用蔥茶清放冷送下忌熱物人參胡桃湯治胸滿喘急不能睡臥新羅人參寸許切片胡桃五個取肉切片上作一服用水一小盞生薑五片煎至七分去滓臨臥溫服杏仁煎治久患肺喘咳嗽不已睡臥不得服之即定杏仁去皮尖胡桃肉上等分研為膏入煉蜜少許丸如彈丸每服一丸或二丸細嚼用薑湯咽下食後及臨臥服痰飲論治飲凡有六即懸飲溢飲支飲痰飲留飲伏飲巢氏載之詳矣龐安常云人身無倒上之痰天下無逆流之水誠哉斯言以此思之人之氣道貴乎順順則津液流通決無痰飲之患調攝失宜氣道閉塞水飲停於胸膈結而成痰其為病也症狀非一為喘為咳為嘔為泄為眩暈心嘈怔忡為悁愯寒熱疼痛為腫滿攣癖為癃閉痞隔未有不由痰飲之所致也診其脈偏弦為飲浮而滑亦為飲也觀夫治飲之法或下或汗或溫或利此固定法愚者之見溫利之差可以無害汗下之錯為病不淺矣不若順氣為先分導次之氣順則精液流通痰飲運下自小便中出有病喜吐痰唾服八味丸而作效者亦有意焉王叔和云腎寒多唾蓋腎為水之官腎能攝水腎氣溫和則水液運下腎氣虛寒則邪水溢上其間用山茱萸山藥輩取其補附子肉桂取其溫茯苓澤瀉取其利理亦當矣臨病之際又加詳審焉又痰飲論夫嗽者五臟皆有嗽皆因內傷脾胃外感風邪皮毛屬肺風寒隨玄府而入腠理開張內外相合先傳肺而入遂成咳嗽乃肺寒也寒化熱熱則生痰喘滿也經云喉中介介如梗狀甚則嗽血也胸滿氣喘痰盛稠黏皆肺熱也導痰湯治一切痰厥頭目旋運或痰飲留積不散胸膈痞塞脅肋脹滿頭痛吐逆喘急痰嗽涕唾稠黏坐臥不安飲食可思半夏湯泡七次四兩天南星炮去皮橘紅枳實去瓤麩炒赤茯苓去皮各一兩甘草炙半兩上㕮咀每服四錢水二盞生薑十片煎至八分去滓溫服食後檳榔散治胸膈痰飲腹中虛鳴食不消化或加嘔逆或臂痛項疼檳榔半夏湯泡七次杏仁去皮尖炒桔梗去蘆銼炒橘紅旋覆花去枝梗乾薑炮白朮各一兩人參甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候枳朮湯治飲癖氣分心下堅硬如杯水飲不下肉桂去皮不見火三分附子炮去皮臍細辛洗去土葉白朮各一兩桔梗去蘆銼炒檳榔甘草炙各三分枳實麩炒二分上㕮咀每服四錢水一盞半生薑七片煎至七分去滓溫服不拘時候赤石脂散治引飲過度遂成痰飲吐水無時服諸痰藥不效者赤石脂煅二兩上為細末每服二錢用薑湯或酒調服不拘時候五套丸治胃氣虛弱三焦痞塞不能宣行水穀故為痰飲結聚胸臆之間令人頭目昏眩胸膈脹滿咳嗽氣急嘔逆腹痛伏於中脘亦令臂疼不舉腰腳沉重久而不散流入於脾脾惡濕得水則脹脹則不能消化水穀又令腹中虛滿而不食也半夏一兩切破天南星一兩每個切作十數塊二味洗水浸三日每日易水次用白礬三兩研碎調入內再浸三日洗淨焙乾薑炮高良薑銼炒白茯苓去皮白朮各一兩木香不見火丁香不見火青皮去白陳皮去白各半兩上十味為細末用神麯一兩大麥糵二兩同碾取末打糊和藥為丸如梧桐子大每服三十丸至五十丸溫熟水送下不拘時候常服溫脾胃去宿冷消留滯化飲食闢霧露風冷山嵐瘴癘不正非時之氣但是酒癖停飲痰水不消纍服湯藥不能作效者服之如神二生湯專治痰附子生去皮臍半夏生用上等分㕮咀每服四錢水二盞生薑十片煎至七分去滓溫服空心入少木香煎尤佳諸瘧門諸瘧論治素問云夫瘧疾皆生於風又云夏傷於暑秋必病瘧此四時之氣使然也或乘涼過度露臥濕處飲冷當風飢飽失時致令脾胃不和痰積中脘遂成此疾所謂無痰不成瘧夫病之始發也必先起於毫毛伸欠乃作寒栗鼓頷頭痛如破渴欲飲冷或先寒後熱或先熱後寒或熱多寒少或寒多熱少或但熱不寒或但寒不熱或一日一發或間日一發或三日一發一日一發者易治間日一發者難愈三日一發者尤其難愈瘧之名狀不一有所謂疸瘧寒瘧溫瘧食瘧牝瘧牝瘧之類皆寒熱二氣之所變化也大抵瘧脈自弦弦數者多熱弦遲者多寒弦小緊者可下之弦遲者可溫之脈緊數者發汗針灸之脈浮大者宜吐之久而不愈脅下痞滿結為癥瘕名曰瘧母各分受病之由以意消息施以治法養胃湯治寒多熱少或但寒不熱頭痛惡心胸滿啘嘔身體疼痛栗栗振寒面色青白不進飲食脈來弦遲厚朴薑製炒藿香葉半夏湯泡七次白茯苓去皮各一兩人參甘草炙橘紅各三分草果仁蒼朮米泔水浸一宿削去皮銼炒各半兩上㕮咀每服四錢水一盞半生薑七片棗子一枚煎至八分去滓溫服不拘時多寒者內加附子煎清脾湯治疸瘧脈來弦數但熱不寒或熱多寒少膈滿能食口苦舌乾心煩渴水小便黃赤大腑不利青皮去白厚朴薑製炒白朮草果仁柴胡去蘆茯苓去皮半夏湯泡七次黃芩甘草炙各等分上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候萬安散治一切瘧疾得病之初以其氣壯進此藥以取效氣虛胃弱及妊婦不宜服之蒼朮泔水浸去黑皮銼炒厚朴薑製炒陳皮去白檳榔常山酒浸一宿甘草炙上六味各一錢半重和勻用水二盞酒一盞煎至一盞半去滓夜露一宿當發日分作兩服蕩溫早晨進一服俟其發時再進一服忌食熱物片時紅丸子專治食瘧莪朮京三稜醋煮各二兩胡椒一兩青皮炒香三兩阿魏一錢醋化上為末別用陳倉米末同阿魏醋煮糊為丸如梧桐子大每服五十丸加至百丸用薑湯吞下或因食生果成瘧用麝香湯吞下加味香薷飲治伏暑成瘧煩悶多渴微微振寒寒罷大熱小便黃赤或背寒面垢方見諸暑門中暑論治鱉甲飲子治瘧疾久不愈脅下痞滿病人形瘦腹中結塊時發寒熱名曰瘧母鱉甲醋炙白朮黃耆去蘆草果仁檳榔芎藭橘紅白芍藥甘草炙厚朴薑製炒上等分㕮咀每服四錢水一盞半生薑七片棗子一枚烏梅少許煎至七分去滓溫服不拘時候七棗湯治五臟氣虛陰陽相勝作為痎瘧不問寒熱先後與夫獨作疊作間日悉主之附子一枚炮裂以鹽水浸再炮如此七次不浸去皮臍上㕮咀水半碗生薑七片棗七枚煎至八分盞當發日去滓空心溫服川烏亦可用果附湯治脾寒瘧疾不愈振寒少熱面青不食或大便溏泄小便反多草果仁附子炮去皮臍上等分㕮咀每服半兩水二盞生薑七片棗一枚煎至七分去滓溫服不拘時候灸法治瘧疾久不愈不問男女於大椎中第一骨節處灸三七壯立效或灸第三骨節亦可大便門泄瀉論治素問曰春傷於風夏必飧泄邪氣留連乃為洞泄此由榮衛不足腠理空疏春傷於風邪氣留連於肌肉之內後因腸胃虛怯以乘襲之遂成泄瀉又云濕勝則濡瀉寒甚為泄暑熱乘之亦為泄至於七情傷感藏氣不平亦致溏泄邪氣久客腸胃則為不禁之患矣醫療之法寒則溫之風則散之熱則清之濕則分利之此不易之法其如飲食不節過食生冷而成泄瀉者乃由中州不運脾胃有傷也但停滯泄瀉一證直須積滯已消然後用以斷下藥今人往往便固止之蘊積於中而成痢疾者多有之其如七情傷感所致兼以調氣藥隨證主治則不失其機要矣大抵滑泄一證最忌五虛五虛者脈細皮寒少氣前後泄利飲食不入得此必死其有生者漿粥入胃泄注止則虛者活誠哉斯言也又論夫瀉痢兩證皆因腸胃先虛虛則六淫得以外入七情得以內傷至於飲食不節過食生冷多飲寒漿洞擾腸胃則成注下注下不已余積不消則成滯下前論所載可謂詳盡治瀉之法先當分利水穀車前子煎湯調五苓散是也次則理正中焦理中湯及治中湯是也理中不效方可斷下乳豆丸固腸丸是也或尚腹痛未宜斷下斷下太早必成痢疾矣惟當調中化積痛輕者宜服治中湯蘇合香丸腹痛更甚者必然成痢醫經所謂腹痛甚者必下痢也宜進靈砂丹以逐其積此丹用之屢驗瀉者止痢者斷疼者愈有積者內化且不動臟腑大凡痢疼不先去其積雖獲暫安後必為害或陰陽相搏冷熱不調而成瀉利者當進香連丸湯使具後更有脾腎頓虛腹脅膨脹飲食不化而泄瀉者宜溫助脾腎棗肉丸是也今之人久瀉不止多投來復丹誤矣蓋來復丹內用硝石硫黃皆有利性青皮陳皮又有導性豈宜服之如夏月曝下乃可服也更當審詳胃風湯治腸胃不足風冷乘之水穀不化泄瀉注下腹中虛滿及腸胃受濕下如豆汁或下瘀血日夜無度並宜服之人參白茯苓芎藭桂心不見火當歸去蘆白芍藥白朮甘草上等分㕮咀每服四錢水一盞半入粟米百餘粒煎至七分去滓空心稍熱服加味五苓湯治伏暑熱二氣及冒濕泄瀉注下或煩或渴或小便不利赤茯苓去皮澤瀉木豬苓去皮肉桂不見火白朮各一兩車前子半兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候或進來復丹亦可戊巳丸治脾胃不足濕熱乘之泄瀉不止米穀不化腸鳴腹痛黃連去須吳茱萸白芍藥各等分上為細末米糊為丸如梧桐子大每服五十丸空心用米飲送下火輪丸治腸胃虛寒心腹冷痛泄瀉不止乾薑炮附子炮去皮臍肉豆蔻麵裹煨上等分為細末米糊為丸如梧桐子大每服五十丸空心米飲送下白朮附子湯治腸胃虛濕腸鳴泄瀉或多自汗白朮二兩附子炮茯苓去皮各一兩上㕮咀每服四錢水一盞半生薑七片棗子一枚煎至七分去滓溫服不拘時候四柱散治元臟氣虛真陽耗散兩耳常鳴臍腹冷痛頭旋目暈四肢怠倦小便滑數泄瀉不止白茯苓去皮附子炮去皮臍人參木香不見火各一兩上為細末每服三錢水一盞半生薑五片入鹽少許煎至七分食前溫服滑泄不止加肉豆蔻訶子煎名曰六柱散加味治中湯治脾胃不足飲食不節過食生冷腸鳴腹痛泄瀉注下乾薑炮白朮青皮去白陳皮去白縮砂仁各一兩人參去蘆甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不拘時候或兼進感應丸棗肉丸治脾腎虛寒或腸鳴泄瀉腹脅虛脹或胸膈不快飲食不化破故紙四兩炒木香不見火稱一兩肉豆蔻二兩麵裹煨香去面不用上為細末燈心煮棗肉為丸如梧桐子大每服七十丸用薑鹽湯送下空心食前禹餘糧丸治腸胃虛寒滑泄不禁禹餘糧石煅赤石脂煅龍骨蓽茇訶子麵裹煨乾薑炮肉豆蔻麵裹煨附子炮上等分為細末醋糊為丸如梧桐子大每服七十丸米飲送下食前乳豆丸治大腸虛寒滑泄不止鍾乳粉一兩肉豆蔻半兩麵裹煨香去面不用上為細末煮棗肉杵和為丸如梧桐子大每服七十丸空心食前用米飲送下固腸丸治大腸久冷滑泄不禁附子一隻炮去皮臍肉豆蔻一兩麵裹煨香去面不用上為細末醋糊為丸如梧桐子大每服七十丸食前用陳米飲送下痢疾論治今之所謂痢疾者即古方所謂滯下是也蓋嘗推原其故矣胃者脾之腑也為水穀之海榮衛充焉大腸者肺之腑也為傳導之官化物出焉夫人飲食起居失其宜運動勞役過其度則脾胃不充大腸虛弱而風冷暑濕之邪得以乘間而入故為痢疾也大凡傷熱則為赤傷冷則為白傷風則純下清血傷濕則下如豆羹汁冷熱交併則赤白兼下或飲服冷酒物恣情房室勞傷精血而成九毒痢者雖可因證辨治然常嘆世之人初感此病往往便用罌粟殼石榴皮訶子肉豆蔻輩以止澀之殊不知痢疾多因飲食停滯於腸胃所由致倘不先以巴豆等劑以推其積滯逐其邪穢鮮有不致精神危困久而羸弱者余嘗鑑焉每遇此證必先導滌腸胃次正根本然後辨其風冷暑濕而為之治法故傷熱而赤者則清之傷冷而白者則溫之傷風而純下清血者則祛逐之傷濕而下豆羹汁者則分利之又如冷熱交併者則溫涼以調之傷損而成久毒痢者則化毒以保衛之夫如是藥無不應而疾無不愈者矣雖然又當觀脈之虛實何如耳如下痢脈微小者生脈浮洪者難治腸澼頻下膿血者診脈宜滑大也若弦急者必死又身寒則生身熱則死苟臨病之際由此驗治萬不失一矣黑丸子治脾胃怯弱飲食過傷留滯不化遂成痢下宜速進此藥推導更須斟酌受病深淺增損丸數還當逐盡積滯方佳卻徐徐補養之方見宿食門四味阿膠丸治協熱下利其色黃煩躁多渴臍腹疼痛小便不利黃連去須四兩茯苓去皮二兩赤芍藥三兩阿膠蛤粉炒一兩上為細末醋糊為丸如梧桐子大每服五十丸空心食前用米飲下駐車丸治冷熱不調下痢赤白日夜無度腹痛不可忍者黃連去須六兩阿膠蛤粉炒當歸去蘆焙洗各三兩乾薑炮二兩上為細末醋煮米糊為丸如梧桐子大每服五十丸加至七十丸空心用米飲送下胃風湯治風冷乘虛入客腸胃水穀不化泄瀉注下臍腹虛滿腸鳴㽱痛及腸胃受濕下如豆羹汁或下瘀血日夜無度並宜服之方見泄瀉門烏梅丸治熱留腸胃下痢純血臍腹㽱痛或先經下痢未斷服熱藥蘊毒伏熱滲成血痢皆治之烏梅肉二兩黃連去須三兩當歸去蘆枳殼去瓤麩炒各一兩上為細末醋糊為丸如梧桐子大每服七十丸空心食前米飲送下當歸丸治冷留腸胃下痢純白腹痛不止當歸去蘆酒洗芍藥附子炮去皮臍白朮乾薑炮厚朴薑汁製阿膠蛤粉炒各一兩烏梅肉二兩上為細末醋糊為丸如梧桐子大每服五十丸空心用米飲送下香茸丸治下痢危困麝香半錢別研臨時入鹿茸燎去皮毛酥炙一兩上鹿茸為細末方入麝香以燈心煮棗肉為丸如梧桐子大每服五十丸空心食前用米飲送下若每料添滴乳香半兩尤有效茜根丸治一切毒痢及蠱注痢血下如雞肝心煩腹痛茜根洗川升麻犀角鎊地榆洗當歸去蘆洗黃連去須枳殼去瓤麩炒白芍藥上等分為細末醋煮米糊為丸如梧桐子大每服七十丸空心食米飲送下香連丸治陰陽相搏冷熱不調或瀉或痢木香二寸分作二段一段用糯米炒去米不用一段生用黃連半兩去須一半吳茱萸炒去茱萸不用一半生用上為細末米糊為丸如梧桐子大每服七十丸白痢用乾薑湯下赤痢用甘草湯下赤白痢用甘草乾薑湯下血痢用醋湯下並食前服祕傳香連丸治赤痢木香切片二半兩黃連去須四兩生薑切片四兩上三味先鋪生薑在鍋底次鋪黃連在薑上次又鋪木香於黃連上用新汲井水三碗煎乾不要攪動候煎乾取出三味焙乾碾為細末以醋調陳倉米粉打糊為丸如小梧桐子大每服七十丸空心食前米飲湯送下艾薑丸治白痢艾葉陳者四兩乾薑炮去灰二兩上二味各碾為末用醋調陳倉米粉打糊為丸如小梧桐子大每服七十丸空心食前米飲送下以上二方乃男文煜得之於賈平章魏國公屢嘗以此方取奇效實不敢私祕附刊於此靈砂丹治積痢不問久新及治積瘧食瘧硇砂一兩別研硃砂一分別研上用黃蠟半兩巴豆三七粒去殼同於銀石器內重湯煮一伏時候巴豆紫色為度去二七粒只將一七粒與前二味同研極均再熔前蠟搜和成劑每旋丸如緑豆大每服五丸至七丸水瀉用生薑湯下白痢用艾湯下赤痢用烏梅湯下服時須極空腹服畢一時不可吃食臨臥服之尤佳可食淡粥一日瘧疾用乳香湯麵東服於不發日晚間服祕結論治素問云大腸者傳導之官變化出焉平居之人五臟之氣貴乎平順陰陽二氣貴乎不偏然後精液流通腸胃益潤則傳送如經矣攝養乖理三焦氣澀運掉不行於是乎壅結於腸胃之間遂成五祕之患夫五祕者風祕氣祕濕祕寒祕熱祕是也更有發汗利小便及婦人新産亡血走耗津液往往皆令人祕結燥則潤之濕則滑之祕則通之寒則溫利之此一定之法也又論祕凡有五即風祕氣祕濕祕冷祕熱祕是也多因腸胃不足風寒濕熱乘之使臟氣壅滯津液不能流通所以祕結也論治之法前論載之詳矣茲不再敘但年高之人以致祕結者非少壯比多服大黃恐傷真氣後方所載有威靈仙丸最佳內用威靈仙取其主諸風宣通五臟去腹內冷氣滯氣內用黃耆取其補氣使氣充得以運掉蜜炙取以滑潤之義枳實取其下氣寬腸藥用三品專而不雜老人諸祕結大相宜也臨病之際更以後方詳審虛實選而用之可也皂角丸治風祕專而有效不可不知麻仁丸治腸胃不調熱結祕澀大麻仁別研如膏川大黃銼碎微炒厚朴去皮銼薑製炒赤芍藥各二兩杏仁去皮尖別研枳實去瓤麩炒各一兩上為細末煉蜜為丸如梧桐子大每服七十丸空心米飲送下以利為度強羸臨時加減枳殼丸治腸胃氣壅風盛大便祕實方見五臟門脾胃虛實論治半硫丸治年高冷祕及痃癖冷氣生硫黃研細半夏湯浸焙取末上等分和勻用生薑自然汁打麵糊為丸如梧桐子大每服五十丸空心溫酒薑湯任下橘杏丸治氣祕老人虛弱人皆可服橘紅取末杏仁湯浸去皮尖上二味等分和勻煉蜜為丸如梧桐子大每服七十丸空心用米飲送下紫蘇麻仁粥此藥順氣滑大便紫蘇子麻子仁上二味不拘多少研爛水濾取汁煮粥食之檳榔散治腸胃有濕大便祕澀檳榔不拘多少上為細末每服二錢用蜜湯點服不拘時候潤腸丸治發汗利小便亡津液大腑祕老人虛人皆可服肉蓯蓉酒浸焙二兩沉香別研一兩上為細末用麻子仁汁打糊為丸如梧桐子大每服七十丸空心用米飲送下蜜導法每用蜜三合入豬膽汁兩枚在內煎如餳出冷水中捏如指大長三寸許納下部立通威靈仙丸治老人腸胃虛津液不能內潤氣澀不能運掉大便祕結不問風冷氣祕皆可服之威靈仙洗去蘆黃耆去蘆蜜水炙各一兩枳實麩炒半兩上為細末煉蜜為丸如梧桐子大每服七十丸空心食前用米飲送下皂角丸治大腸有風大便祕結尊年之人尤宜服之皂角炙去子枳殼去瓤麩炒上等分為細末煉蜜為丸如梧桐子大每服七十丸空心食前用米飲送下小便門淋利論治附尿血膀胱不利為癃閉此由飲酒房勞或動役冒熱或飲冷逐熱或散石發動熱結下焦遂成淋閉亦有溫病後餘熱不散霍亂後當風取涼亦令人淋閉淋閉之為病種凡有五氣石血膏勞是也氣淋為病小便澀常有餘瀝石淋為病莖中痛溺卒不得出膏淋為病尿似膏出勞淋為病勞倦即發痛引氣衝血淋為病熱即發甚則尿血候其鼻頭色黃者小便難也又論夫淋利兩證醫經曰膀胱不利為癃不約為遺尿又云膀胱者州都之官津液藏焉氣化則能出矣人之有生將理失宜役用過度勞傷腎經腎藏有熱熱留膀胱流入脬臟遂成淋病腎藏有寒寒積膀胱注於脬臟小便頻數或遺尿而不禁遂成利病治療之法熱則清利之寒則溫固之清利之法已具前論溫固之策備載後方臨病之際更在詳酌焉地膚子湯治下焦結熱小便赤黃不利數起出少莖痛或血赤溫病後餘熱及霍亂後當風取涼過度飲酒房勞及行步冒熱冷飲逐熱熱結下焦及散石熱動關格小腹堅胞脹如斗諸有此淋悉皆治之地膚子一兩知母黃芩豬苓去皮瞿麥去莖葉枳實麩炒升麻通草葵子海藻洗各半兩上㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候忌甘草通草湯治諸淋通草王不留行葵子茆根桃膠瞿麥當歸去節洗蒲黃炒滑石以上各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候琥珀散治小便不通琥珀不拘多少上為細末每服二錢用萱草根煎湯調服燈心湯調服亦可小薊飲子治下焦結熱血淋生地黃洗四兩小薊根滑石通草蒲黃炒淡竹葉藕節當歸去蘆酒浸山梔子仁甘草炙各半兩上㕮咀每服四錢水一盞半煎至八分去滓溫服空心食前赤茯苓湯治上腸實熱面赤多汗小便不通方見五臟門心小腸虛實論治宣氣散治小便不通臍腹急痛甘草木通各三錢梔子二錢葵子滑石各一錢上為末每服半錢燈心調下木通散治小便不通小便腹痛不可忍木通滑石各一兩黑牽牛頭末半兩上為末每服一錢水半盞燈心十莖蔥白一莖煎三分食前溫服鹿角膠丸治房損傷中小便尿血鹿角膠半兩油頭髮灰沒藥別研各三錢上為末用茆根汁打糊為丸如梧桐子大每服五十丸空心鹽湯下菟絲子丸治小便多或不禁菟絲子淘淨酒蒸焙二兩五味子一兩牡蠣煅取粉一兩肉蓯蓉酒浸二兩附子炮去皮臍一兩雞䏶胵半兩微炙鹿茸酒炙一兩桑螵蛸酒炙半兩上為細末酒糊為丸如梧桐子大每服七十丸食前鹽酒鹽湯任下萆薢丸治小便頻數日夜無時川萆薢洗上不拘多少為細末酒和為丸如桐子大每服七十丸空心食前鹽湯鹽酒任下破故紙丸治腎氣虛冷小便無度破故紙鹽炒茴香鹽炒上等分為細末酒糊為丸如桐子大每服五十丸或一百丸空心鹽酒鹽湯下縮泉丸治脬氣不足小便頻數天台烏藥益智仁上等分為細末酒煮山藥末糊為丸如梧桐子大每服七十丸臨臥用鹽湯送下白濁赤濁遺精論治素問云夫精者身之本也蓋五臟六腑皆有精腎為都會關司之所聽命於心人能法道清靜精氣內持火來坎戶水到離扃陰平陽祕精元密固矣若夫思慮不節嗜欲過度遂使水火不交精元失守由是為赤濁白濁之患焉赤濁者心虛有熱也多因思慮而得之白濁者腎虛有寒也過於嗜欲而得之其狀漩而如油光彩不定漩腳澄下凝如膏糊皆嗜欲思慮之所致耳各分受病之由施以治法使坎離既濟陰陽協和然後火不上炎而神自清水不下滲而精自固安有赤濁白濁之患哉雖然思慮過度不特傷心亦能病脾脾生虛熱而腎不足故土邪乾水亦令人便下渾濁史載之云夏則土燥而水濁冬則土堅而水清醫多峻補則疾愈甚若以中和之藥療之水火既濟脾土自堅其流清矣又論遺精白濁二證脈息多澀傷精脈也醫經曰男子二八腎氣盛天癸至天癸者精也精者身之本也腎藏精藏精者不可傷皆由不善衛生喜怒勞逸憂愁思慮嗜欲過度起居不常遂致心火炎上而不息腎水散漫而無歸上下不得交養心腎受病心受病者令人遺精白濁腎受病者亦令人遺精白濁此皆心腎不交關鍵不牢之所致也腎病者當禁固之心病者當安寧之更有少壯之人情動於中所願不得意淫於外而有是證者施治之法不宜祕固祕固則愈甚惟當以後方豬苓丸主之蓋半夏有利性豬苓導腎水導氣使通之意也許學士詳言之矣但虛損精滑之人卻不宜服此藥方並載於後臨病之際更宜加審焉祕精丸治下虛胞寒小便白濁或如米泔或若凝脂腰重少力牡蠣煅菟絲子酒浸蒸焙別研龍骨生用五味子韭子炒桑螵蛸酒炙白茯苓去皮白石脂煅各等分上為細末酒糊為丸如桐子大每服七十丸空心鹽酒鹽湯任下瑞蓮丸治思慮傷心便下赤濁白茯苓去皮石蓮肉炒去心龍骨生用天門冬去心遠志洗去心甘草水煎麥門冬去心柏子仁炒別研紫石英火煅七次研令極細當歸去蘆酒浸酸棗仁炒去殼龍齒各一兩乳香半兩別研上為細末煉蜜為丸如桐子大硃砂為衣每服七十丸空心溫酒棗湯任下羊脛灰丸治思慮傷脾脾不攝精遂致白濁厚朴去皮取肉薑汁炒二兩羊脛炭火煅過通紅存性一兩上為細末白水麵糊為丸如桐子大每服百丸空心米飲下固精丸治嗜欲過度勞傷腎經精元不固夢遺白濁肉蓯蓉酒浸薄切片陽起石火煅研極細鹿茸燎去毛酥炙赤石脂火煅七次川巴戟捶去心韭子炒白茯苓去皮鹿角霜龍骨生用附子炮去皮臍各等分上為細末酒糊為丸如桐子大每服七十丸空心鹽酒鹽湯任下芡實丸方見諸虛門虛損論治豬苓丸治年壯氣盛情欲動心所願不得意淫於外夢遺白濁半夏一兩豬苓一二兩上半夏銼如豆大豬苓為末先將一半炒半夏令黃色不令焦地上去火毒半日取半夏為末以一半豬苓末調勻和丸如桐子大候乾更用余豬苓末同炒微裂入不油炒瓶中養之每服四十丸空心溫酒鹽湯下如常服於申未間冷酒下分清散治小便白濁漩面如油或小便頻數川萆薢益智仁天台烏藥石菖蒲上等分為細末每服二錢水一盞入鹽少許煎至七分午後及臨臥溫服三白丸治遺精白濁及滑泄盜汗龍骨生用一兩牡蠣火煅一兩鹿角霜二兩上為細末酒煮麵糊為丸如梧桐子大每服四十丸空心食前用鹽湯送下霍亂門霍亂論治人生稟命以五臟為主應乎五行本於五味素問云陰之所生本在五味過食尚乃有傷何況飽食豚膾復餐乳酪海陸百品無所不啖眠臥冷席多飲寒漿胃中諸食結而不消陰陽二氣壅而反戾揮霍之間變成吐利此名霍亂輕者腳多轉筋甚者遍體轉筋夏月伏暑亦令人吐利傷寒亦令人吐利當察其由施以治法大抵霍亂脈來浮洪者可治脈來微而遲氣少不語者不可治古今論定更無疑矣理中湯治過食生冷或飲寒漿遂成吐下脹滿食不消心腹痛人參甘草炙乾薑炮白朮各等分上為銼散每服四錢水一大盞煎至七分去滓溫服不拘時候若臍上築者腎氣動也去朮加桂一兩吐多者去朮加生薑半夏各半兩利多者復用術心悸者加茯苓一兩渴水者倍術一兩腹痛者倍乾薑一兩腹滿者去朮加附子厚朴各半兩病退而不食者加白豆蔻橘紅麥糵各半兩薑附湯治霍亂轉筋手足厥冷多汗嘔逆方見諸寒門中寒論治上如法煎服利不止加少肉蔻氣乏加人參通脈四逆湯治霍亂多寒肉冷脈絶吳茱萸炒二兩附子炮去皮臍一兩桂心去皮不見火通草細辛洗去葉土白芍藥甘草炙以上各半兩當歸去蘆三錢上㕮咀每服四錢水一盞酒半盞生薑七片棗子一枚煎至七分去滓溫服不拘時候加味香薷飲治夏月伏暑霍亂吐利不止煩悶多渴方見諸暑門中暑論治麥門冬湯治霍亂已愈煩熱不解多渴小便不利麥門冬去心橘皮去白半夏湯泡七次白茯苓去皮白朮各一兩人參甘草炙各半兩小麥半合上㕮咀每服四錢水一盞半生薑五片烏梅少許煎至八分去滓溫服不拘時候洗法治霍亂轉筋蓼一把去兩頭水三升煮取二升放溫重洗漬法治霍亂轉筋入腹鹽多用煎湯於槽中暖漬之灸法霍亂已死腹中有暖氣者鹽內臍中灸二七壯嘔吐翻胃噎膈門附咳逆噦嘔吐論治夫人受天地之中以生莫不以胃為主蓋胃受水穀脾主運化生血生氣以充四體者也若脾胃無所傷則無嘔吐之患其或飲食失節溫涼不調或喜餐腥膾乳酪或貪食生冷肥膩露臥濕處當風取涼動擾於胃胃既病矣則脾氣停滯清濁不分中焦為之痞塞遂成嘔吐之患焉然此特論飲食過傷風涼冷濕之所由致者又如憂思傷感宿寒在胃中脘伏痰胃受邪熱瘀血停蓄亦能令人嘔吐故診其脈代者霍亂代而絶者亦霍亂也霍亂脈大者可治微細者不可治脈遲氣息劣不欲言者亦不可治治療之法詳具於後臨病之際更加審諦而用之無不得其宜矣理中湯治過食生冷或飲寒漿遂成吐下脹滿食不消心腹痛方見霍亂門如法煎服吐甚者加半夏生薑煎或飲食不節過食生冷肥膩腥膾吐逆不止加青皮陳皮煎理中湯夏月霍亂吐利宜進香藿飲已載諸瘧門中或因傷風傷濕吐逆皆宜用五苓散多加生薑煎傷風加蔥白生薑煎最佳丁香半夏丸治宿寒在胃嘔吐吞酸丁香不見火一兩乾薑炮半夏湯泡七次橘紅各二兩白朮一兩半上為細末生薑自然汁打糊為丸如桐子大每服五十丸食前淡薑湯送下大藿香散治憂愁思慮悲恐驚七情傷感氣鬱於中變成嘔吐或作寒熱眩暈痞滿不進飲食藿香葉半夏曲白朮木香不見火各一兩白茯苓去皮桔梗去蘆銼炒人參枇杷葉拭去毛官桂不見火甘草炙各半兩上為細末每服三錢水一大盞生薑五片棗子一枚煎至七分去滓溫服不拘時候旋覆花湯治中脘伏痰吐逆眩暈旋覆花去梗半夏湯泡七次橘紅乾薑炮各一兩檳榔人參甘草炙白朮各半兩上㕮咀每服四錢水一盞半生薑七片煎至七分去滓溫服不拘時候竹茹湯治胃受邪熱心煩喜冷嘔吐不止葛根三兩半夏湯泡七次二兩甘草炙一兩上㕮咀每服五錢水二盞入竹茹棗許大薑五片煎至七分去滓取清汁微冷細細服不拘時候赤芍藥湯治瘀血蓄胃心下滿食入即嘔血名曰血嘔赤芍藥二兩半夏湯泡七次一兩半橘紅一兩上㕮咀每服四錢水一盞半薑七片煎至七分去滓溫服不拘時候玉浮丸治男子婦人脾胃虛弱一切嘔吐及久新翻胃不問得病之由皆可服之真良方也人參白殭蠶炒去絲白朮乾薑炮丁香肉豆蔻麵裹煨橘紅白豆蔻仁麥蘖炒附子炮去皮臍木香不見火南星炮檳榔半夏湯泡七次甘草炙上等分為細末每藥二分用生面一分和勻入百沸湯煮令浮攪和再取生薑自然汁搜和丸如梧桐子大每服二錢用淡薑湯下不拘時候病甚者不過三服惡熱藥者去附子大便祕者去肉豆蔻胃丹方見五臟門脾胃虛實論治翻胃論治夫翻胃者本乎胃食物嘔吐胃不受納言胃口翻也多因胃氣先逆飲酒過傷或積風寒或因憂思悒怏或因蓄怒抑鬱宿滯痼癖積聚冷痰動擾脾胃不能消磨穀食致成斯疾原其所自女人得之多由血氣虛損男子得之多因下元冷憊有才食而便吐者有食久而後翻胃者受病既若異同醫療固宜審察如前所載玉浮丸胃丹等藥後方所載入藥靈砂丁附散之類皆可對證選而用之服藥未應者宜灸中脘足三里二穴中脘一穴在臍上四寸足三里一穴在膝下三寸各灸七壯或九壯其效尤著焉其諸嘔吐備載前方不復再敘也入藥靈砂治翻胃嘔吐食飲不下靈砂末一兩丁香末木香末胡椒末各半錢上件和勻煮棗圈肉杵和為丸如緑豆大每服五十粒生薑米飲送下不拘時候青金丹治一切吐逆水銀八錢生硫黃一錢別研上二件入無油銚內用慢火花開以柳大篦子撥炒或有煙焰以醋灑之結成砂子再研為細末用粽尖杵和為丸如緑豆大每服三十丸用生薑橘皮煎湯送下不拘時候服丁附散治翻胃吐逆粥藥不下者大附子一隻上坐於磚上四面著火漸漸逼熱淬入生薑自然汁中浸一霎時再用火逼再淬約盡薑汁半碗為度削去皮焙乾為末入丁香末二錢和勻每服二錢水一盞粟米少許煎至七分攄去粟米帶溫服之不拘時候不過三服太倉丸治脾胃虛弱不進飲食翻胃不食亦宜服之陳倉米一升用黃土炒米熟去土不用白豆蔻二兩丁香一兩縮砂仁二兩上為細末用生薑自然汁法丸如梧桐子大每服百丸食後用淡薑湯送下五噎五膈論治素問云陽脈結謂之膈蓋氣之與神併為陽也逸則氣神安勞則氣神耗倘或寒溫失宜食飲乖度七情傷感氣神俱擾使陽氣先結陰氣後亂陰陽不和臟腑生病結於胸膈則成膈氣流於咽嗌則成五噎五膈者憂恚寒熱氣也五噎者憂思勞食氣也其為病也令人胸膈痞悶嘔逆噎塞妨礙飲食胸痛徹背或脅下支滿或心忡喜忘咽噎氣不舒治療之法調順陰陽化痰下氣陰陽平勻氣順痰下膈噎之疾無由作矣又有下虛氣上控膈令人心下堅滿痞急肌中苦痹緩急如刺不得俯仰名曰胸痞五噎散治五噎食不下嘔厄痰多咽喉噎塞胸背滿痛人參半夏湯泡七次桔梗去蘆銼炒白豆蔻仁木香不見火杵頭粳白朮畢澄茄沉香不見火枇杷葉拭去毛乾生薑各一兩甘草炙半兩上為細末每服二錢水一中盞生薑七片煎至六分食後溫服五膈散治五膈胸膈痞悶諸氣結聚脅肋脹滿痰逆噁心不進飲食李憲德生堂經驗方云治五般膈氣結胸膈痰逆滿噁心嘔厄枳殼去瓤麩炒木香不見火青皮去白大腹子白朮半夏曲銼炒丁香不見火天南星湯泡去皮乾薑炮麥蘖炒草果仁各一兩甘草炙半兩上為細末每服二錢水一中盞生薑五片煎至六分溫服不拘時候栝蔞實丸治胸痞胸中痛徹背喘急妨悶栝蔞實別研枳殼去瓤麩炒半夏湯泡七次桔梗炒各一兩上為細末薑汁打糊為丸如梧桐子大每服五十丸食後用淡薑湯送下咳逆論治夫咳逆之病考詳諸書無該載者唯孫真人云咳逆遍尋方論無此名稱但古人以咳逆為噦耳多因吐利之後胃中虛寒遂成此證亦有胃虛膈上熱噦至八九聲相連收氣不回者卻當仔細看脈與證施以治法大抵老人虛人久病人及婦人産後有此證者皆是病深之候非佳兆也羌活附子散治吐利後胃寒咳逆羌活去蘆附子炮去皮臍茴香炒各半兩乾薑炮去土丁香各一兩上為細末每服二錢水一盞入鹽少許煎至七分空心熱服橘皮湯治吐利後胃中虛膈上熱咳逆者橘皮去白二兩人參甘草炙各半兩上銼散每服四錢水一盞半竹茹一小塊生薑五片棗二枚煎至七分去滓溫服不拘時候柿蒂湯治胸滿咳逆不止柿蒂丁香各一兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓熱服不拘時候灸法其法婦人屈乳頭向下盡處骨間是穴丈夫及乳小者以一指為率正男左女右與乳相直間陷中動脈處是穴艾炷如小豆許灸三壯腳氣門腳氣論治千金言腳氣皆由感風毒所致又經云地之寒暑風濕皆作蒸氣足常履之遂成腳氣然古來無腳氣之説黃帝時名為厥兩漢之間名曰緩風宋齊之後謂之腳氣其名雖不同其實一也以此觀之寒暑風濕皆能致此非特風毒而已矣腳氣之病初得不覺因他病乃始發動或奄然大悶經三兩日方乃覺之先從腳起或緩弱疼痹或行起忽倒或兩脛腫滿或足膝枯細或心中忡悸或小腹不仁或舉體轉筋或見食吐逆惡聞食氣或胸滿氣急或遍體痠痛此其候之不同也大抵寒中三陽所患必冷暑中三陰所患必熱誠哉斯言若論其脈浮而弦者起於風濡而弱者起於濕洪而數者起於熱遲而澀者起於寒風者汗而愈濕者溫而愈熱者下而愈寒者尉而愈凡得腳氣速宜針灸之唯用湯淋洗者醫之大禁也觀夫腳氣皆由腎氣虛而生然婦人亦有病腳氣者必因血海既虛宿懷嗔恚復感悲傷遂成斯疾今婦人病此者甚衆知婦人以血海虛而得之與男子腎虛類矣治婦人之法與男子用藥固無異但兼以治憂恚藥無不效也且補瀉之法當順四時春秋二時宜急補瀉夏月疾盛專須汗利入冬以後須量人之盛衰微加滋補不然則氣血日衰必使年年遇蒸熱而作理之必然也治法大概無越於斯又當於四時中僅加調攝不得久坐久立冷濕之地暑月亦不當露坐濕處能慎於此依法隨證治之無不瘥矣又論夫腳氣之病昔人命名不一今人謂之腳氣男子得之受病於腎婦人得之受病血海寒暑風濕嗔恚悲傷皆能致此腳氣之候有輕有重有干有濕有陰有陽有虛有實治療之法腳氣雖日壅疾無補法惟當瀉之理固然也愚者之見亦可補之當順四時之序而補瀉之春夏宜汗利秋冬乘疾小歇微加滋補不然則氣血日衰必使年年遇蒸熱而疾作也此外更宜針之灸之若用湯淋洗者醫之大禁也後方隨證參考用之無不瘥者也獨活寄生湯治肝腎虛弱或久履濕冷之地或足汗脫履或洗足當風為濕毒內攻兩脛緩縱攣痛痹弱或皮肉紫破有瘡足膝攣重川獨活三兩桑寄生如無以續斷代杜仲炒去絲川牛膝去蘆酒浸細辛洗去葉土官桂不見火白茯苓去皮防風去蘆川芎川當歸去蘆人參熟地黃芍藥秦艽去土以上各二兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎七分去滓溫服不拘時候氣虛下利或中脘不快者除地黃倍加生薑婦人新産患腹痛不可轉動及腰部痛攣痹弱不可屈伸者亦宜服之大能除風消血檳榔湯治一切腳痛順氣防壅檳榔香附子去毛陳皮去白紫蘇葉木瓜去瓤五茄皮甘草炙各一兩上㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服婦人腳氣多由血虛加當歸半兩室女腳痛多由血實加赤芍藥一兩半大便祕結虛弱者加枳實壯盛者加大黃並不拘時候大腹皮散治諸證腳氣腫滿小便不利大腹皮三兩干宣木瓜去瓤二兩半紫蘇子微炒檳榔荊芥穗烏藥橘紅紫蘇葉各一兩蘿蔔子炒半兩沉香不見火桑白皮炙枳殼去瓤麩炒各一兩半上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候神烏丸治遠年近日乾溼腳氣川烏炮去皮臍切片炒令變色虎脛骨酥炙海桐皮川萆薢各一兩川牛膝去蘆酒浸肉蓯蓉酒浸各一兩半金毛狗脊燎去毛半兩上為細末用木瓜膏子為丸如梧桐子大每服七十丸空心食前用溫酒送下造木瓜膏法先用好艾葉以鹽水灑濕蒸炊欠再灑再蒸凡三次用宣瓜一個去皮瓤切下蓋作甕子填艾葉在內卻用蓋子合定再蒸極軟取去艾葉不用只將木瓜細研為膏加減檳榔湯治一切腳氣腳氣名曰壅疾貴乎疏通春夏宜服之檳榔陳皮去白紫蘇葉各一兩甘草炙半兩上㕮咀每服半兩水一盞半生薑五片煎至八分去滓溫服不拘時候如腳痛不已者加宣木瓜五茄皮煎婦人腳痛加當歸煎室女腳痛多是肝血盈實宜加赤芍藥煎師尼寡婦亦宜服之中滿不食者加枳實煎痰逆或嘔者加半夏煎腳痛大便不通者用此湯下青木香丸如更不通加大黃煎小便不利加木通煎轉筋者加吳茱萸煎腳腫而痛者加大腹皮木瓜煎足痛而熱者加地骨皮煎加味四斤丸治肝腎俱虛精血不足足膝酸弱步履無力如受風寒濕氣以致腳痛腳弱者最宜服之虎脛骨酥炙二兩天麻宣木瓜去皮瓤一個蒸肉蓯蓉酒潤焙川烏炮去皮各一兩川牛膝洗去蘆酒潤一兩半沒藥別研乳香別研各半兩上為細末入木瓜膏杵和入少酒糊為丸如梧桐子大每服七十丸空心食前用溫酒鹽湯任下消渴門消渴論治消渴之疾皆起於腎盛壯之時不自保養快情縱欲飲酒無度喜食脯炙醯醢或服丹石遂使腎水枯竭心火燔熾三焦猛烈五臟乾燥由是消渴生焉醫經所載有消渴內消強中三證消渴者多渴而利內消者由熱中所作小便多於所飲食物皆消作小便而反不渴令人虛極短氣強中者莖長興盛不交精液自出皆當審處施以治法大抵消渴之人愈與未愈常防患癰疾其所慎者有三一飲酒二房勞三鹼食及面能慎此者雖不服藥而自可愈不如此者縱有金丹亦不可救深思慎之加減腎氣丸治勞傷腎經腎水不足心火自用口舌焦乾多渴而利精神恍惚面赤心煩腰痛腳弱肢體羸瘦不能起止山茱萸取肉白茯苓去皮牡丹皮去木熟地黃酒蒸五味子澤瀉鹿角鎊山藥銼炒各一兩沉香不見火官桂不見火各半兩上為細末煉蜜為丸如梧桐子大每服七十丸用鹽湯米飲任下弱甚者加附子一兩兼進黃耆湯薺苨丸治強中為病莖長興盛不交精液自出消渴之後多作癰疽多由過服丹石所致薺苨大豆去皮茯神去木磁石煅研極細玄參栝蔞根石斛去根地骨皮去木熟地黃酒浸鹿角各一兩沉香不見火人參各半兩上為細末用豬腎一具煮如食法令爛杵和為丸如梧桐子大每服七十丸空心用鹽湯送下如不可丸入少酒糊亦可豬肚丸治消渴豬肚一枚治如食法黃連去蘆小麥炒各五兩天花粉茯苓去木各四兩麥門冬去心二兩上五味為末內豬肚中縫塞安甑中蒸之極爛木臼中杵和丸如桐子大每服七十丸米飲下隨意服之如不能丸入少煉蜜諸疝門諸疝論治巢氏云疝者痛也皆由榮衛虛弱飲食寒溫不調致風冷邪氣乘虛入於腹中遂成諸疝發則小腹疼痛痛或繞臍或逆上搶心引心皆痛甚則手足厥冷自汗嘔逆或大小便祕難大抵諸疝之脈脈當弦緊蓋弦者寒也緊者痛也疝有七證厥疝症疝寒疝氣疝盤疝胕疝狼疝是也何以言之厥疝則心痛足冷食已則吐症疝腹中氣乍滿氣積如臂寒疝因寒飲食卒然脅下腹中痛氣疝腹中乍滿乍減而痛盤疝腹中痛引臍旁胕疝腹痛連臍下有積聚狼疝小腹與陰相引而痛諸疝不愈邪氣留滯乃成積聚其為病也或左或右上脅下有如覆杯或臍上下如臂或腹大如盤令人羸瘦少氣灑淅寒熱嗜臥飲食不為肌膚或腹滿嘔泄或遇寒則痛其脈厥而緊浮而牢皆積聚之脈也但牢疆急者生虛弱急者不可治聚香飲子治七情所傷遂成七疝心腹脹痛痛引腰脅連背不可俯仰檀香木香乳香沉香丁香並不見火藿香葉各一兩玄胡索炒去皮片子薑黃炒川烏炮去皮尖桔梗去蘆銼炒桂心不見火甘草炙各半兩上㕮咀每服四錢水一盞半生薑七片棗一枚煎至七分去滓溫服不拘時候桂枝烏頭湯治風寒疝腹中痛逆冷手足不仁身體疼痛灸刺不能療及賊風入腹五臟拘急不得轉側發作叫呼陰縮大烏頭二兩半去皮尖桂心不見火白芍藥各三兩甘草炙二兩上㕮咀每服四大錢水二盞生薑七片棗一枚入蜜半匙煎至七分去滓食前溫服益智仁湯治疝痛連小腹攣搐叫呼不已診其脈沉緊是腎經有積冷所致益智仁乾薑炮甘草炙茴香炒各三錢烏頭炮去皮生薑各半兩青皮去白二錢上㕮咀每服四錢水二盞入鹽少許煎至七分去滓空心食前溫服玄附湯治七疝心腹冷痛腸鳴氣走身寒自汗大腑滑泄玄胡索炒去皮附子炮去皮臍各一兩木香不見火半兩上㕮咀每服四錢水一盞半生薑七片煎至七分去滓溫服不拘時候金鈴子散治七疝寒注下焦少腹引外腎疼痛大便多閉川楝子去皮核取肉一兩用巴豆七枚去殼同炒令黃色去巴豆上為細末每服二錢熱鹽酒調服空心食前狼毒丸治七疝久而不愈發作無時臍腹堅硬疼痛狼毒銼炒一兩芫花醋炒川烏炮去皮尖各一兩椒紅炒乾薑炮乾漆炒煙盡三稜鱉甲醋煮沒藥各半兩全蠍去毒九枚上為細末醋糊為丸如梧桐子大每服四十丸空心薑湯溫酒任下尉法鹽半斤炒極熱以故帛包尉痛處陰㿗論治夫陰㿗之證有四種一曰腸㿗二曰氣㿗三曰卵脹四曰水㿗是也聖惠云腎氣虛風冷所侵流入於腎不能宣散而然也三因云陰㿗屬肝系宗筋胃陽明養之考之衆論俱為至當多由不自衛生房室過度久蓄憂思恐怒之氣或坐臥冷濕處或勞役無節皆能致之病則卵核腫脹偏有大小或堅硬如石或臍腹絞痛甚則膚囊腫脹多成瘡毒輕者時出黃水甚則成癰潰爛大抵卵脹腸㿗皆不易治氣㿗水㿗灸之易愈也又有小兒有生以來便如此者乃宿疾也四㿗治法橘核丸用之屢驗謾録於後橘核丸治四種㿗病卵核腫脹或成瘡毒輕則時出黃水甚則成癰潰爛橘核炒海藻洗昆布洗海帶洗川楝子取肉炒桃仁麩炒各一兩厚朴去皮薑汁炒木通枳實麩炒延胡索炒去皮桂心不見火木香不見火各半兩上為細末酒糊為丸如桐子大每服七十丸空心鹽酒鹽湯任下虛寒甚者加炮川烏一兩堅脹不消者加硇砂二錢醋煮旋入牡丹皮散治小兒㿗卵偏墜防風去節牡丹皮去木上等分為細末每服二錢溫酒調服如不飲酒鹽湯點服亦可灸法治陰卵偏大㿗病關元穴在膝下三寸灸百壯良眩暈門眩暈論治素問云諸風掉眩皆屬於肝則知肝風上攻必致眩暈所謂眩暈者眼花屋轉起則眩倒是也由此觀之六淫外感七情內傷皆能所致當以外證與脈別之風則脈浮有汗項強不仁寒則脈緊無汗筋攣掣痛暑則脈虛煩悶濕則脈細沉重吐逆及其七情所感遂使臟氣不平鬱而生涎結而為飲隨氣上逆令人眩暈眉稜骨痛眼不可開寸脈多沉有此為異耳與夫疲勞過度下虛上實金瘡吐衄便利及婦人崩中去血皆令人眩暈隨其所因治之乃活法也羌附湯治中風頭眩惡風自汗或身體不仁方見諸濕門中濕論治三五七散治陽虛風寒入腦頭痛目眩暈轉如在舟車之上耳內蟬鳴或如風雨之聲應風寒濕痹腳氣緩弱等疾並皆治之天雄炮去皮細辛洗去葉土各三兩乾薑炮山茱萸取肉各五兩防風去蘆山藥銼炒各七兩上為細末每服二錢用溫酒調服食前加味香薷飲治中暑眩暈煩悶不蘇方見諸暑門中暑論治芎術湯治冒雨中濕眩暈嘔逆頭重不食川芎半夏湯泡七次白朮各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候玉液湯治七情傷感氣鬱生涎隨氣上逆頭目眩暈心嘈忪悸眉稜骨痛大半夏洗淨湯泡七次切作片子上件每服四錢水二盞生薑七片煎至七分去滓入沉香水一呷溫服不拘時候芎歸湯治一切失血過多眩暈不蘇芎藭當歸去蘆酒浸上等分㕮咀每服三錢水一盞半煎至七分去滓溫服不拘時候沉香磁石丸治上盛下虛頭目眩暈耳鳴耳聾沉香半兩別研磁石火煅醋淬七次細研水飛葫蘆巴炒川巴戟去心陽起石煅研附子炮去皮臍椒紅炒山茱萸取肉山藥炒各一兩青鹽別研甘菊花去枝萼蔓荊子各半兩上為細末酒煮米糊為丸如梧桐子大每服七十丸空心鹽湯送下倉卒不能辦此沉香湯送下養正丹方見咳嗽痰飲門亦可驚悸怔忡健忘門附虛煩驚悸論治夫驚悸者心虛膽怯之所致也且心者君主之官神明出焉膽者中正之官決斷出焉心氣安逸膽氣不怯決斷思慮得其所矣或因事有所大驚或聞虛響或見異相登高陟險驚忤心神氣與涎郁遂使驚悸驚悸不已變生諸證或短氣悸乏體倦自汗四肢浮腫飲食無味心虛煩悶坐臥不安皆心虛膽怯之候也治之之法寧其心以壯膽氣無不瘥者矣溫膽湯治心虛膽怯觸事易驚夢寐不祥異象感惑遂致心驚膽怯氣鬱生涎涎與氣搏復生諸證或短氣悸乏或復自汗四肢浮腫飲食無味心虛煩悶坐臥不安半夏湯泡七次竹茹枳實去瓤各二兩陳皮去白三兩白茯苓去皮一兩半甘草一兩炙上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不拘時候遠志丸治因事有所大驚夢寐不祥登高陟險神魂不安驚悸恐怯遠志去心薑汁淹石菖蒲各二兩茯神去皮木白茯苓去皮人參龍齒各一兩上為細末煉蜜為丸如梧桐子大辰砂為衣每服七十丸用熟水送下食後臨臥怔忡論治夫怔忡者此心血不足也蓋心主於血血乃心之主心乃形之君血富則心君自安矣多因汲汲富貴戚戚貧賤又思所愛觸事不意真血虛耗心帝失輔漸成怔忡怔忡不已變生諸證舌強恍惚善憂悲少顏色皆心病之候難經云損其心者益其榮法當專補真血真血若富心帝有輔無不愈者矣又有冒風寒暑濕閉塞諸經令人怔忡五飲停蓄堙塞中脘亦令人怔忡當隨其證施以治法益榮湯治思慮過制耗傷心血心帝無輔怔忡恍惚善悲憂少顏色夜多不寐小便或濁當歸去蘆酒浸黃耆去蘆小草酸棗仁炒去殼柏子仁炒麥門冬去心茯神去木白芍藥紫石英細研各一兩木香不見火人參甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片棗一枚煎至七分去滓溫服不拘時候龍齒丹治心血虛寒怔忡不已痰多恍惚龍齒附子炮去皮臍切片薑汁浸一宿遠志去心甘草煮酸棗仁炒去殼別研當歸去蘆酒浸官桂去皮不見火琥珀別研南星銼薑汁浸一宿各一兩木香不見火紫石英煅醋淬七遍沉香別研熟地黃酒蒸焙各半兩上為細末煉蜜為丸如梧桐子大硃砂為衣每服五十丸用棗湯送下不拘時候法丹治憂愁思慮謀用過度或因驚恐傷神失志耗傷心血怔忡憂惚夢寐不安方見五臟門心小腸虛實論治茯苓飲子治痰飲蓄於心胃怔忡不已赤茯苓去皮半夏湯泡七次茯神去木橘皮去白麥門冬去心各一兩沉香不見火甘草炙檳榔各半兩上㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候排風湯治風虛冷濕閉塞諸經令人怔忡方見諸風門中風論治宜加炒酸棗仁煎壽星丸治驚憂思慮氣結成痰留蓄心包怔忡驚惕痰逆噁心睡臥不安方見諸風門中風論治健忘論治夫健忘者常常喜忘是也蓋脾主意與思心亦主思思慮過度意舍不精神宮不職使人健忘治之之法當理心脾使神意清寧思則得之矣歸脾湯治思慮過度勞傷心脾健忘怔忡白朮茯神去木黃耆去蘆龍眼肉酸棗仁炒去殼各一兩人參木香不見火各半兩甘草炙二錢半上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不拘時候虛煩論治夫虛煩者心虛煩悶是也且人之有血氣分為榮衛別乎陰陽榮衛通適然後陰平陽祕精神乃治攝養乖方榮衛不調使陰陽二氣有偏勝之患或陰虛而陽盛或陰盛而陽虛素問云陽虛則外寒陰虛則內熱陽盛則外熱陰盛則內寒今虛損之病陰虛生內熱所致也但虛煩有數證不可不辨傷寒大病不復霍亂吐瀉之後及婦人産後皆使人心虛煩悶又有虛火之人心火內蒸亦致心煩治療之際不可不詳審也竹葉湯治傷寒大病後及霍亂吐瀉後心虛煩悶內熱不解竹葉麥門冬去心人參茯苓去皮小麥炒半夏湯泡七次各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候小草湯治虛勞憂思過度遺精白濁虛煩不安小草黃耆去蘆當歸去蘆酒浸麥門冬去心石斛去根酸棗仁炒去殼各一兩人參甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候地仙散治傷寒後伏暑後煩熱不安及虛勞煩熱方見虛損門勞瘵論治癲癇門癲癇論治夫癲癇病者考之諸方所説名稱不同難於備載別録有五癇之證一曰馬癇作馬嘶鳴應乎心二曰羊癇作羊叫聲應乎脾三曰雞癇作雞叫聲應乎胃四曰豬癇作豬叫聲應乎腎五曰牛癇作牛吼聲應乎肺此五癇應乎五畜五畜應乎五臟者也發則旋暈顛倒口眼相引目睛上搖手足搐搦背脊強直食頃乃蘇原其所因皆由驚動臟氣不平鬱而生涎閉塞諸經故有是證或在母腹中受驚或幼小受風寒暑濕或因飢飽失宜逆於臟氣而得之者可隨所感施以治法又論夫癇病者十歲以下為癇大抵其發之原皆因三種風癇驚癇食癇是也因此三種變作諸癇若不早治久成痼疾其發之狀卒然仆地口眼相引或目睛上搖或手足掣縱或背脊強直頸項反折或搖頭弄舌或數齧齒皆其證也但正發搐掣之時勿捉持之捉之則曲捩不隨也所得之方用之屢驗可以為備治之要鴟頭丸治風癇不問長幼發作漸頻嘔吐涎沫飛鴟頭一枚燒炭虢丹五錢細研皂角五挺酥炙上為細末用糯米糊為丸如緑豆大每服十五丸加至二十丸以粥飲送下不拘時候蛇黃丸治五癇困積風熱風痰攻心所致蛇黃小者二十枚以豬膽汁拌入火煅通紅取出地上出火毒研令極細上用狗膽一枚取汁和粟米飯丸如緑豆大每服十五丸溫酒送下不拘時候吐涎乃效長幼皆可服控涎丸治諸癇久不愈頑涎聚散無時變生諸證悉皆治之生川烏去皮半夏洗殭蠶不炒此三味銼碎生薑汁浸一宿各半兩全蠍去毒七個鐵粉三錢甘遂一錢半上為細末生薑自然汁打糊為丸如緑豆大硃砂為衣每服十五丸食後用薑湯吞下忌食甘草惺神散治驚癇潮作仆地不省口吐涎沫雄鴟梟一枚用瓷罐盛以黃泥固濟炭火煅令紅上為細末每服二錢入麝香少許溫酒調服熟水亦得不拘時候乳朱丹治癲癇乳香別研硃砂細研水飛上用乳香熔化拌和硃砂為劑丸和龍眼大每服一丸側柏葉浸酒磨化蕩溫服不拘時候諸汗門自汗論治難經云心之液為汗凡自汗出者皆心之所主也人之氣血應乎陰陽和則平偏則病陰虛陽必湊故發熱自汗陽虛陰必乘故發厥自汗又況傷風中暑傷濕喜怒驚悸房室虛勞歷節腸癰痰飲産蓐等病皆能致之更有盜汗一證睡著而汗自出亦由心虛所致脈來微而澀濡而虛虛而弱皆主自汗桂枝湯治傷風脈浮自汗惡風桂枝不見火白芍藥各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片大棗二枚煎至八分去滓溫服不拘時候發汗汗不止者謂之漏風宜加炮熟附子煎消暑丸治中暑脈虛自汗煩渴半夏一斤好醋五升煮乾茯苓去皮半斤甘草半斤上為細末生薑自然汁為丸如梧桐子大每服百丸熟水咽下不拘時候此藥臻至修治用之極效中暑為患下即蘇傷暑發熱頭痛用之尤驗夏中常服止渴利小便雖多次水亦不為害應是暑藥皆不及之朮附湯治中濕脈細自汗體重白朮四兩附子炮去皮臍一兩半甘草炙二兩上㕮咀每服四錢水一盞半薑七片煎至七分去滓溫服不拘時候黃耆湯治喜怒驚恐房室虛勞致陰陽偏虛或發厥自汗或盜汗不止悉宜服之黃耆去蘆蜜水炙一兩半白茯苓去皮熟地黃酒蒸肉桂不見火天門冬去心黃根龍骨各一兩五味子小麥炒防風去蘆當歸去蘆酒浸甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候發厥自汗加熟附子發熱自汗加石斛耆附湯治氣虛陽弱虛汗不止肢體倦怠黃耆蜜水炙附子炮去皮臍各等分上㕮咀每服四錢薑五片水一盞半煎至七分去滓溫服眼門眼論治人之有雙眼若天之有兩曜五臟六腑之精華宗脈之所聚洞視萬化肝之外候者也然骨之精為瞳子屬腎筋之精為黑眼屬肝血之精為絡裹屬心氣之精為白眼屬肺肉之精為約束屬脾眼通五臟氣貫五輪由此觀之人之有生須固養身之道善攝生者養氣存神安心惜視然後心氣通暢肝氣和平精氣上注於目則目無其疾矣倘將養乖理六淫外傷七情內郁嗜欲不節飲食無度生食五辛熱啖炙煿久視勤書憂哀悲泣皆能病目目之為病睛色赤者病在心色白者病在肺色青者病在肝色黃者病在脾色黑者病在腎況方論有五輪八廓內外障等之證茲不復敘治療之法必須洞明形狀細察根源窮其是非若能細審無不瘥除然病眼之人不得當風看日喜怒房勞五辛炙煿酒食毒物並宜斷之惟須寬緩情性慎護調攝即無不瘥也若縱恣乖違觸犯禁忌自貽其咎必須喪明而後已可不謹歟又論夫眼者內則屬乎五臟外則應乎五輪瞳人黑水腎之主也血輪如環心之主也絡裹者脾之主也白睛屬肺總管於肝眼帶雖繫於肝明孔遍通五臟五臟皆有神善攝生者調五臟以養神神安則臟和臟和則眼目清潔自無疾矣凡所感之由與夫治療可選而用之倘或精血衰微勤書久視憂哀悲泣而得之者對證施治外有胎赤一證人之初生洗沐不潔令穢水浸漬於眼眥使眶臉赤爛漸至長大終不能瘥故云胎赤然小兒易虛易實易寒易熱輕進涼劑恐傷胃氣止宜用龍腦膏點之以瘥為度決明子散治風熱毒氣上攻眼目腫痛或卒生翳膜或赤脈弩肉或癢或澀羞明多淚或始則昏花漸成內障但是一切暴風客熱皆宜服之黃芩甘菊花去枝梗木賊決明子石膏赤芍藥川芎川羌活去蘆甘草蔓荊子石決明各一兩上為細末每服三錢水一中盞生薑五片煎至六分食後服桑白皮散治肺氣壅塞熱毒上攻眼目白睛腫脹日夜疼痛心胸煩悶玄參桑白皮枳殼去瓤麩炒川升麻杏仁去皮尖炒旋覆花去枝梗防風去蘆赤芍藥黃芩甘菊花去枝梗甘草炙甜葶藶炒各一兩上㕮咀每服四錢水一盞半生薑三片煎至八分去滓食後溫服爐甘石散治一切目疾不問得病之因悉皆治之爐甘石半斤用黃連四兩如豆大於銀石器內煮一伏時去黃連取石研腦子別研二錢半上件和勻每用半字白湯泡放溫時時洗之補腎丸治腎氣不足眼目昏暗瞳人不分明漸成內障磁石火煅醋浸七次水飛菟絲子淘淨酒浸蒸別研各二兩五味子熟地黃酒浸焙枸杞子楮實子覆盆子酒浸肉蓯蓉酒浸焙車前子酒蒸石斛去根各一兩沉香別研青鹽別研各半兩上為細末煉蜜為丸如梧桐子大每服七十丸空心鹽湯送下養肝丸治肝血不足眼目昏花或生眵淚久視無力當歸去蘆酒浸車前子酒蒸焙防風去蘆白芍藥蕤仁別研熟地黃酒蒸焙川芎楮實子各等分上為細末煉蜜為丸如梧桐子大每服七十丸用溫熟水送下不拘時候秦皮散治暴風客熱赤眼腫痛癢澀眵淚昏暗滑石秦皮黃連各等分上為細末每用半錢沸湯泡澄清溫洗不拘時候羊肝丸治肝經有熱目赤睛疼視物昏澀羊肝一具生用黃連去須為末上先將羊肝去筋膜於砂盆內搗爛入黃連末丸如梧桐子大每服五十丸用熱水送下不拘時候太清散治暴風客熱目赤睛疼隱澀難開銅青半兩別研薑粉末二錢半上藥研細和勻每用少許沸湯泡放溫頻洗之造薑粉法臘月間用生薑洗切碎於砂盆內擂爛以新麻布裂汁澄腳取粉陰乾龍腦膏治赤眶瞼赤爛白龍腦細研一錢蕤仁去殼二錢半杏仁湯浸去皮尖七枚上件藥都研為膏用人乳汁調和令均甕閣中盛每以銅筋少許著目眥頭日二三次杏連散治風熱上攻羞明澀痛黃連去須一錢槌碎杏仁七粒槌碎上用水半盞以二藥在內安飯上蒸一時久澄清放溫洗了用紙蓋覆安頓湯瓶上頻頻洗之咽喉門咽喉論治夫咽者咽也喉者候也咽者因物以咽喉者以候呼吸之氣物之與氣莫不由於咽喉也若陰陽和平榮衛調攝氣道無不宣暢矣攝養乖違喜餌丹石多食炙爆過飲熱酒致胸膈壅滯熱毒之氣不得宣泄咽喉為之病焉病則為腫為痛為喉痹為窒塞不通為不利而生瘡或狀如肉臠吐不出咽不下皆風熱毒氣之所致耳又有伏熱上衝乘於懸壅或長或腫懸壅者在乎上齶也更有腑寒亦使人喉閉而不能咽者治之當辨明也又論夫咽者言可以咽物也又謂之嗌氣之流通厄要之處胃所繫地氣之所主也喉者言其中空虛可以通氣息呼吸之道路肺之候所天氣之所主也若臟氣和平則病不生臟氣不平寒熱壅塞所以生病也醫治之藥熱則通之寒則溫之不熱不寒依經調之所得之方謾録於後以備緩急之需焉牛蒡子湯治風熱上壅咽喉窒塞或痛或不利或生瘡瘍或狀如肉臠疼痛妨悶牛蒡子玄參升麻桔梗去蘆犀角木通去節黃芩甘草各等分上㕮咀每服四錢水一盞半薑三片煎至八分去滓溫服不拘時候三神湯治咽喉熱腫語聲不出喉中如有物梗荊芥穗桔梗去蘆各一兩甘草生用半兩上㕮咀每服四錢水一盞半薑三片煎至八分去滓溫服不拘時候二聖散治纏喉風急喉痹鴨嘴膽礬二錢白殭蠶去絲嘴半兩上為細末每服少許以竹管吹入喉中立驗硼砂散治懸壅腫痛硼砂別研馬牙硝枯滑石寒水石以上各二錢腦子別研一錢白礬枯一錢半上件藥研令極細末每服半錢新汲水調下不拘時候射干丸治腑寒咽閉不能咽射干杏仁麩炒黃玄參附子炮去皮臍桂心不見火各等分上為細末煉蜜為丸如雞頭大每服一丸心新綿裹噙咽津白礬散治纏喉風急喉痹白礬三錢巴豆三枚去殼分作六瓣上將白礬及巴豆於銚內慢火熬化為水候乾去巴取礬研為細末每用少許以蘆管吹入喉中絳雪散治咽喉腫痛咽物妨礙及口舌生瘡龍腦半字硼砂一錢硃砂二錢馬牙硝半錢寒水石二錢上各研和勻每用一字摻於舌上用津咽之食後臨臥大青湯治咽喉唇腫口舌糜爛疳惡口瘡大青葉升麻大黃銼炒各二兩地黃生切焙三兩上為末每服二錢水一盞煎至六分去滓溫服微利止口齒門附舌口論治夫口者足太陰之經脾之所主五味之所入也蓋五味入口藏於脾胃為之運化津液以養五氣五氣者五臟之氣也節宣微爽五臟之氣偏勝由是諸疾生焉且咸則為寒酸則停滯澀則因燥淡則由虛熱則從苦從甘也口臭者乃腑臟臊腐之不同蘊結於胸膈之間而生熱沖發於口也口瘡者脾氣凝滯風熱加之而然醫療之法各隨其所因以治無過與不及爾又論夫口者脾之候齒者骨之餘髓之所養也人之一身此為大要凡有病起因口而成含惡氣以咽津液痰癖而在膈心胸壅滯毒氣攻蒸熏之既久故齒為之病焉其諸風寒蘊熱而得之者方載於後升麻散治上膈壅毒口舌生瘡咽喉腫痛升麻赤芍藥人參洗桔梗去蘆乾葛各一兩甘草生用半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候緑雲散治口瘡臭氣穢爛久而不瘥黃柏半兩螺青二錢上為細末臨臥用一錢於舌下咽津不妨碧雪治一切壅熱咽喉閉腫不能咽物口舌生瘡舌根緊強言語不正腮項腫痛蒲黃青黛硼砂焰硝甘草各等分上為細末每用手指捻摻於喉中津咽或呷少冷水送下頻頻用之芎芷膏治口氣熱臭香白芷川芎各等分上為細末煉蜜丸如雞頭大食後臨臥噙化一丸丁香丸治口臭穢丁香三錢甘草一錢炙芎藭二錢白芷半錢以上不見火上為細末煉蜜丸如彈子大綿裹一丸噙咽津赴筵散治毒熱上攻口中生瘡黃柏蜜炙細辛洗去土葉上等分為細末每用少許摻於舌上有涎吐出以愈為度青金散治小兒白口瘡急惡狀似木耳五倍子去土垢四兩青黛四錢上為細末好油調鴉羽掃口向咽喉流入咽喉中瘡爛次日便下兼治痔瘡亦佳蛾黃散治赤白瘡疼唇破兼治熱瘡黃蘗去皮寒水石燒上各等分為細末干貼口瘡上塗唇上兼治諸瘡較遲者粉紅散治小兒白口瘡咽喉惡聲啞干胭脂一錢枯礬一兩上研勻每用一錢生蜜調如稀糊掃口瘡咽喉內咽了藥來日大便退了瘡皮為驗齒論治夫齒乃骨之餘氣骨乃腎之所主呼吸之戶門者也精氣強則齒自堅腎氣衰則齒自豁且手陽明大腸之脈入於齒灌注於牙倘風寒壅熱之氣鬱滯心胸沖發於口則齒為之病矣輕者為宣露齦頰浮腫甚則為疳𧈟齲脫之證也亦有腎氣虛壅齒痛宣露當進補腎藥其諸隨證施以治法牢牙散治一切齒痛不問久新全蠍七個去毒細辛洗淨三錢草烏二個去皮乳香二錢別研上為細末每用少許擦患處須臾以溫鹽水盥漱莽草散治風壅熱氣上攻齒齦浮腫或連頰車疼痛或宣露血出莽草川升麻柳枝槐角子鶴蝨地骨皮藁本去蘆槐白皮上㕮咀每服一兩水一盞入鹽少許煎至七分盞去滓熱含冷吐之日用三次蟾酥丸治牙疼不可忍蟾酥一字生附子角二豆大巴豆一枚去皮研麝香少許上件藥都研令勻蒸餅為丸黍豆大以新綿裹一丸咬之有涎即吐之香鹽散此藥常用牢牙去風冷蛀齲宣露一切齒疾大香附子炒令極黑三錢兩青鹽半兩別研上為細末和勻用如常法乃鐵甕先生良方也安腎丸治虛熱牙齒浮腫疼痛肉蓯蓉酒浸焙桃仁麩炒破故紙炒白朮干山藥銼炒石斛去根白蒺藜炒去刺川烏炮去皮臍川萆薢川巴戟去心各等分上為細末煉蜜為丸如梧桐子大每服七十丸空心鹽湯下必勝散治齒衄蒲黃略炒螺兒清等分上為細末每用少許擦患處少待用溫鹽水漱之驅毒飲治熱毒上攻宣露血出齒齦腫痛不可忍者屋遊即瓦屋上青苔不拘多少洗淨上煎湯澄清入鹽一小撮放溫頻頻漱之麝香散治急疳惡蝕內損枯白礬一兩黃丹一錢半炒麝香一字上為細末研勻乾擦牙疳處頻上朱粉散治白口瘡惡及牙疳蝕枯白礬一兩干胭脂一錢半輕粉半錢麝香少許上研勻油調掃口瘡或干貼唇論治唇者脾之所主胃者脾之所合其經起於鼻環於唇其支脈絡於脾脾胃受邪則唇為之病焉蓋風勝則動寒勝則揭燥勝則乾熱勝則裂氣鬱則生瘡血少則瀋而無色治之之法內則當理其脾外則當敷以藥無不效者矣瀉黃飲子治風熱蘊於脾經唇燥坼裂口舌生瘡白芷升麻枳殼去瓤麩炒黃芩防風去蘆半夏湯泡七次石斛去根各一兩甘草生用半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候薏苡仁湯治風腫在脾唇口瞤動或生結核或為浮腫薏苡仁炒防己赤小豆炒甘草炙各等分上㕮咀每服四錢水一盞半生薑三片煎至八分去滓溫服不拘時候橄欖散治唇緊燥裂生瘡橄欖不拘多少燒灰上為細末以豬脂和塗患處舌論治經云心氣通乎舌舌和則知五味矣蓋舌者脾脈之所通心氣之所主和則知味資於脾而榮於身者也二臟不和風寒中之則舌強而不能言壅熱攻之則舌腫而不得語更有重舌木舌舌胎出血等證皆由心脾虛風熱所乘而然耳又論舌者心之所候脾氣之所通攝養違理二臟不和風熱內蘊舌為之病焉遂致舌腫重舌木舌舌胎舌衄舌瘡等證更有傷寒舌出過寸此毒熱攻心也治療之法輕者清之重者瀉之但舌瘡一證不特因實熱所致亦有虛熱上攻而然者卻又不可例用涼劑也貴乎鎮墜寧心而已局方所載黑錫養正二丹並以冷鹽水送下參丹蜜砂並以參沉湯送下用之多效醫療之方並載於後玄參升麻湯治心脾壅熱舌上生瘡木舌重舌舌腫或連腮頰兩邊腫痛玄參赤芍藥升麻犀角鎊桔梗去蘆貫衆洗黃芩甘草炙各等分上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候蒲黃散治舌忽然硬腫或血出如湧烏賊魚骨蒲黃炙各等分上為細末每用少許塗舌上瘥杏仁膏治口舌熱乾燥或舌上生胎語言不真升麻杏仁去皮尖甘草炙各一兩黑豆五十粒炒去皮上為細末入白蜜五合生地黃汁五合慢火熬成膏子丸如雞頭大常噙一丸津化咽下舌上生苔只用生薑片蘸冷水擦洗之亦妙烙腫法凡舌腫舌下必有噤蟲狀如螻蛄或似臥蠶子亦有頭尾其頭少白可燒鐵筋頭烙烙腫則自消也百草霜散治舌忽然腫硬逡巡塞悶殺人百草霜食鹽上等分用井華水調塗舌上良久消愈必勝散治舌衄方見齒論治如神散治傷寒熱毒攻心舌出過寸梅花片腦不拘多少上為細末以一字摻於舌上未和再摻則愈小續命湯治心脾虛中風寒舌強不能語言方見諸風門中風論治加荊瀝煎服耳門耳論治夫耳者腎之所候腎者精之所藏腎氣實則精氣上通聞五音而聰矣若疲勞過度精氣先虛於是乎風寒暑濕得以外入喜怒憂思得以內傷遂致聾聵耳鳴熱壅加之出血出膿則成聤耳底耳之患候其顴頰色黑者知其耳聾也亦有手少陽之脈動厥而聾者耳內輝輝焞焞也手太陽脈動厥而聾者耳內氣滿也大抵氣厥耳聾尚易治精脫耳聾不易藥愈諸證既殊治各有法又論夫耳者腎之候腎乃宗脈之所聚其氣通於耳腎氣和平則聞五音而聰矣腎氣不平則耳為之受病也前論載之備矣醫經云腎氣通於耳心寄竅於耳風寒暑濕燥熱得之於外應乎腎憂愁思慮得之於內系乎心心氣不平上逆於耳亦致聾聵耳鳴耳痛耳癢耳內生瘡或為聤耳或為掀腫六淫傷之調乎腎七情所感治乎心醫療之法寧心順氣欲其氣順心寧則耳為之聰矣宜用局方妙香散以石菖蒲煎湯調服以順心氣參丹蜜砂以寧心君調腎之藥蓯蓉丸是也各方參而用之可也塞耳丸治耳聾無不效石菖蒲一寸巴豆一枚去皮全蠍一枚去毒上為細末蔥涎打和如棗核大綿裹納耳中蓯蓉丸治腎虛耳聾或風邪入於經絡耳內虛鳴肉蓯蓉酒浸切片焙山茱萸去核石龍芮石菖蒲菟絲子淘淨酒浸蒸焙川羌活去蘆鹿茸燎去毛切片酒浸蒸石斛去根磁石火煅醋淬七次水飛附子炮去皮臍各一兩全蠍去毒二七個麝香一字旋入上為細末煉蜜為丸如梧桐子大每服七十丸加至一百丸空心鹽酒鹽湯任下磁石散治風虛耳聾無聞磁石火煅防風去蘆羌活去蘆黃耆去蘆鹽水浸焙木通去粗皮白芍藥桂心不見火各一兩人參半兩上㕮咀每服四錢水一盞半羊腎一對切片去脂膜煎至七分去滓食前溫服犀角飲子治風熱上壅耳內聾閉脊腫掣痛膿血流出犀角鎊菖蒲木通玄參赤芍藥赤小豆炒甘菊花去枝梗各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候立效散治聤耳底耳有膿不止真陳橘皮燈上燒黑一錢為末麝香少許別研上二味和勻每用少許先用綿蘸耳內膿淨上藥鳴聾散治耳中如潮聲蟬聲或暴聾一稱通耳法治耳聾無所聞磁石一塊如豆大穿山甲燒存性為末一字上用新綿子裹了塞於所患耳內口中銜小生鐵覺耳內如風聲即住煙脂散治聤耳煙脂白礬火上熬干上等分為細末每用少許以綿杖子蘸藥紝在所患耳中杏仁飲治耳卒痛或有水出杏仁一五錢炒令焦上研為末蔥涎搜和捏如棗核大綿裹塞耳中鼻門鼻論治夫鼻者肺之候職欲常和和則吸引香臭矣若七情內郁六淫外傷飲食勞役致鼻氣不得宣調清道壅塞其為病也為衄為癰為息肉為瘡瘍為清涕為窒塞不通為濁膿或不聞香臭此皆肺臟不調邪氣蘊積於鼻清道壅塞而然也治之之法寒則溫之熱則清之塞則通之壅則散之無越於斯但時氣鼻衄不可遽止如出三升以上恐多者方可斷之活人書所謂衄血者乃解蓋陽氣重故也不可不知又論夫鼻者肺之所主職司清化調適得宜則肺臟宣暢清道自利攝養乖方則清道壅塞故鼻為之病焉蓋肺主於氣肝藏於血邪熱傷之則血熱血熱則氣亦熱血氣俱熱隨氣上逆故為鼻衄甚則生瘡風寒乘之陽經不利則為壅塞或為清涕蘊積不散則不聞香臭或為鼻癰或生息肉鼻痛之患矣又有熱留膽腑邪移於腦遂致鼻淵鼻淵者濁涕下不止也傳為衄蔑瞑目故得之氣厥也所得作效之方並載於後以為備治之要辛夷散治肺虛風寒濕熱之氣加之鼻內壅塞涕出不已或氣息不通或不聞香臭辛夷仁細辛洗去土葉藁本去蘆升麻川芎木通去節防風去蘆羌活去蘆甘草炙白芷各等分上為細末每服二錢食後茶清調服香膏治鼻塞不利當歸去蘆木香不見火通草細辛洗蕤仁去殼川芎白芷各三錢上七味㕮咀和羊髓微火合煎三五沸白芷色黃膏成去滓取如小豆內鼻中龍骨散治時氣鼻衄三升以上恐多宜此藥止龍骨不拘多少上為細末用少許吹入鼻中九竅出血者皆用此藥吹之通草膏治癰鼻者有息肉不聞香臭通草附子炮去皮臍細辛洗上等分為細末以蜜和綿裹少許納鼻中梔子仁丸治肺熱鼻發赤瘰俗名酒皶鼻梔子仁不拘多少上為細末溶黃蠟等分為丸如梧桐子大每服二十丸食後空心茶酒嚼下半月效忌酒炙爆又方枇杷葉去毛焙乾上為末茶調一二錢日三服蒼耳散治鼻流濁涕不止名曰鼻淵辛夷仁半兩蒼耳子炒二錢半香白芷一兩薄荷葉半錢上並曬乾為細末每服二錢用蔥茶清食後調服山梔散治鼻衄不止山梔子不拘多少上件燒為細末每用少許吹入鼻中立止生葛散治鼻衄不止生葛根小薊根上二件洗淨搗取汁每服一盞蕩溫服不拘時候萊蔔飲治鼻衄不止蘿蔔不拘多少上搗取自然汁每服一錢入鹽少許冷服不拘時候或滴少許入鼻中亦可茜根散治鼻衄終日不止心神煩悶茜根黃芩阿膠蛤粉炒側柏葉生地黃各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑三片煎至八分去滓溫服不拘時候香墨汁治鼻衄不止香墨蔥汁上件藥以蔥汁磨墨滴少許於鼻中即止麥門冬飲治衄血不止麥門冬生地黃每兩水煎扎指法治鼻衄不止上用線緊扎中指中節如左鼻出血扎左手中指中節右鼻出血扎右手中指中節兩鼻出血則左右俱扎之頭面門頭痛論治夫頭者上配於天諸陽脈之所聚凡頭痛者血氣俱虛風寒暑濕之邪傷於陽經伏留不去者名曰厥頭痛蓋厥者逆也逆壅而衝於頭也痛引腦巔甚而手足冷者名曰真頭痛非藥之能愈又有風熱痰厥氣虛腎厥新沐之後露臥當風皆令人頭痛治法當推其所自而調之無不切中者矣又論夫頭者諸陽之所聚諸陰脈皆至頸而還獨諸陽脈皆上至頭耳則知頭面皆屬陽部也且平居之人陽順於上而不逆則無頭痛之患陽逆於上而不順沖壅於頭故頭痛也風寒在腦邪熱上攻痰厥腎厥氣虛氣攻皆致頭痛前論已有治法但氣虛氣攻頭痛愈而復作延引歲月者多有之矣偏正頭風婦人氣盛血虛産後失血過多氣無所主皆致頭痛惟蠍附丸治氣虛氣攻頭痛尤合造化之妙其間所用附子取其助陽以扶虛鍾乳取其補陽以鎮墜全蠍取其鑽錐之義蔥涎則取通行其氣湯使用以椒鹽蓋椒能下達鹽能引用使虛氣歸於其下對證用之無不作效者矣芎辛湯治風寒在腦或感邪濕頭重頭痛眩暈欲倒嘔吐不定川芎一兩細辛洗去土白朮甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片茶芽少許煎至七分去滓溫服不拘時候菊花散治風熱上攻頭痛不止口乾頰熱石膏甘菊花去梗防風去蘆旋覆花去梗枳殼去瓤麩炒蔓荊子甘草炙川羌活去蘆各等分上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候蔥附丸治氣虛頭痛附子一隻炮去皮臍上為細末蔥涎為丸如梧桐子大每服五十丸空心茶清送下三生丸治痰厥頭痛半夏白附子天南星各等分上細末生薑自然汁浸蒸餅為丸如緑豆大每服四十丸食後薑湯送下玉真丸治腎厥頭痛不可忍其脈舉之則弦按之則堅生硫黃二兩別研石膏硬者不煅半夏湯泡七次硝石別研各一兩上為細末研和勻生薑汁煮糊為丸如梧桐子大每服四十丸食前用薑湯或米飲下虛寒甚者去石膏用鍾乳粉一兩更灸關元百壯二芎餅子治氣厥上盛下虛痰飲風寒伏留陽經偏正頭疼痛連腦巔吐逆噁心目暝耳聾常服清頭目化風痰撫芎川芎乾薑炮藁本去蘆蒼耳炒天南星炮去皮防風去蘆甘草炙上等分為細末生薑汁浸蒸餅為丸如雞頭大捏作餅子曬乾每服五餅細嚼茶酒任下不拘時候葫蘆巴散治氣攻頭痛葫蘆巴炒京三稜醋浸焙各半兩乾薑炮二錢半上為細末每服二錢溫生薑湯或溫酒調服不拘時候都梁丸治偏正頭風一切頭疼香白芷日乾二兩上件研為細末煉蜜為丸如龍眼大每服二丸食後細嚼用茶芽煎湯咽下蠍附丸治氣虛頭疼大附子一枚全蠍去毒二個鍾乳粉二錢半上用附子剜去心安全蠍在附子內卻以余附子為末用鍾乳粉面少許水和作劑包裹煨令熟上為細末並擂蔥涎為丸如梧桐子大每服七十丸空心食前用椒鹽湯送下芎烏散治男子氣厥頭疼婦人氣盛頭疼及産後頭痛悉皆治之川芎天台烏藥上等分為細末每服二錢臘茶清調服或用蔥茶湯調服並食後一字散治頭風雄黃研令極細半兩細辛洗去葉半兩川烏尖去皮五個生用上為細末每服一字入薑汁少許茶芽煎湯調服食後腰痛門腰痛論治素問云腰者腎之腑轉搖不能腎將憊矣審如是説則知腎繫於腰多因嗜欲過度勞傷腎經腎臟既虛喜怒憂思風寒濕毒得以傷之遂致腰痛又有墮墜內肭氣凝血滯亦致腰痛大抵腰痛之脈脈皆沉弦沉弦而緊者寒腰痛沉弦而浮者風腰痛沉弦而濡細者濕腰痛墮墜閃肭以致氣凝血滯而痛者脈多沉弦而實也當推其所因合其脈以治無不效者矣又論夫腰痛者屬乎腎也多因勞役傷腎腎臟氣虛風寒冷濕得以襲之恚郁憂思得以傷之皆致腰痛前論悉已備載但墮墜閃肭血氣凝滯而痛者未有藥也菴䕡丸主之今之人每患腰痛不問虛實多進牽牛之藥殊不知牽牛之為性能傷腎氣服之未見作效腎氣先有所損矣倘的是氣滯腰痛進一二服則可如服之不效用橘核入鹽炒浸酒放溫送下小七香丸最佳所謂看不上面自有奇功萬一腎虛腰痛牽牛豈宜服也謹之謹之五積散治寒傷腎經腰痛不可俯仰方方見諸寒門中寒論治附術湯治濕傷腎經腰腫冷痛小便自利附子炮去皮白朮各一兩杜仲去皮銼炒去絲半兩上㕮咀每服四錢水一盞半生薑七片煎至七分去滓溫服空心食前獨活寄生湯治風傷腎經腰痛如掣久而不治流入腳膝為偏枯冷痹緩弱之患方見腳氣門腳氣論治小七香丸治鬱怒憂思或因閃肭顛撲一切氣滯腰痛方載和劑局方中上一貼作二服橘仁一錢鹽少許水一盞煎至七分放溫送下空心服二至丸治老人弱人腎氣虛損腰痛不可屈伸鹿角鎊二兩麋角鎊二兩附子炮去皮一兩桂心不見火一兩補骨脂炒一兩杜仲去皮銼炒絲斷一兩鹿茸酒蒸焙一兩青鹽別研半兩上為細末酒糊為丸如梧桐子大每服七十丸空心用胡桃肉細嚼以鹽酒鹽湯任下惡熱藥者去附子加肉蓯蓉一兩菴䕡丸治墜墮閃肭血氣凝滯腰痛者菴䕡子半兩沒藥二錢半別研乳香二一錢半別研杜仲去粗皮銼炒令絲斷補骨脂炒威靈仙洗去蘆官桂不見火川當歸去蘆酒潤切焙各半兩上為細末酒糊為丸如梧桐子大每服七十丸空心食前鹽酒鹽湯任下立安散專治腰痛杜仲去粗皮銼炒令絲斷橘核取仁炒上等分為細末每服二錢入鹽少許溫酒調食前服婦人門婦人論治夫婦人乃衆陰所集常與濕居貴乎血盛氣衰者也血盛氣衰是謂從從則百疾不生血衰氣盛是謂逆逆者災害至矣且婦人嗜欲多於丈夫生病倍於男子及其病也比之男子十倍難療尤不可不考若是四時節氣喜怒憂思飲食房勞為患者悉與丈夫同也有如七症八瘕九痛十二帶下産蓐乃男子所無之證此其生病倍於男子也又況慈戀愛憎嫉妒憂恚抑鬱不能自釋為病深固者所以治療十倍難於男子也由是婦人別立方焉倘能推所自而調之可謂盡善盡美矣血氣論治內經云百病皆生於氣經有所謂七氣有所謂九氣喜怒憂思悲恐驚者七氣也七情之外益之以寒熱二證而為九氣也氣之為病男子婦人皆有之惟婦人血氣為患尤甚蓋人身血隨氣行氣一壅滯則血與氣並或月事不調心腹作痛或月事將行預先作痛或月事已行淋漓不斷心脹作痛或連腰脅或引背膂上下攻刺吐逆不食甚則手足搐搦狀類驚癇或作寒熱或為癥瘕肌肉消瘦非特不能受孕久而不治轉而為瘵疾者多矣玄胡索湯治婦人室女七情傷感遂使血與氣並心腹作痛或連腰脅或引背膂上下攻刺甚作搐搦經候不調但是一切血氣疼痛並可服之當歸去蘆酒浸銼炒玄胡索炒去皮蒲黃炒赤芍藥官桂不見火各半兩片子薑黃洗乳香沒藥木香不見火各三兩甘草炙二錢半上㕮咀每服四錢水一盞半生薑七片煎至七分去滓食前溫服吐逆加半夏橘紅各半兩琥珀散治婦人室女月水凝滯脅肋脹刺臍腹㽱痛不可忍及惡露不下血上攻心迷悶不省凡有血氣腹痛並皆治之牡丹皮去木赤芍藥蓬莪朮銼京三稜銼劉寄奴去梗熟地黃酒浸蒸玄胡索炒去皮當歸去蘆酒浸烏藥官桂不見火各一兩上用前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為細末每服二錢用溫酒調服空心食前三神丸治室女血氣相搏腹中刺痛痛引心端經行澀少或經事不調以致疼痛橘紅二兩玄胡索去皮醋煮一兩當歸去蘆酒浸銼略炒一兩上為細末酒煮米糊為丸如梧桐子大每服七十丸加至一百丸空心艾湯送下米飲亦得抑氣散治婦人氣盛於血變生諸證頭暈膈滿皆可服之香附子炒淨四兩茯神去木一兩橘紅二兩甘草炙一兩上為末每服二錢食前用沸湯調服崩漏論治崩漏之疾本乎一證輕者謂之漏下甚者謂之崩中且平居婦人經脈調適衝任二脈互相滋養陰陽二氣不相偏勝則月事以時下倘若將理失宜喜怒不節疲極過度大傷於肝蓋肝為血之府庫喜怒勞役一或傷之肝不能藏血於宮宮不能傳血於海所以崩中漏下漏下者淋瀝不斷是也崩中者忽然暴下乃漏證之甚者其狀或如豚肝或成五色與血俱下又或如泔涕如爛瓜汁又或如豆羹汁如藍靛色至有黑如干血相雜亦有純下瘀血者此皆衝任虛損喜怒勞役之過致傷於肝而然也久久不止面黃肌瘦虛煩口乾臍腹冷痛吐逆不食四肢虛困甚則為脹為腫診其脈寸口脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏其脈為革主半産漏下又尺寸脈虛者漏血漏血脈浮者不可治治之之法調養衝任鎮注血海血海溫和歸於有用內養百脈外為月事自無崩中漏下之患矣又論崩漏之疾本乎一證然有輕重之別焉輕者謂之漏下漏下者淋瀝不斷是也重者謂之崩中忽然暴下乃漏證之甚者也多因喜怒勞役以致衝任虛損陰陽互相勝負而然若血下過多真陰走耗遂致頭暈眼花氣乏怔忡身體羸瘦飲食減少腹內冷痛四肢無力驚惕恐怖此其證也有對證服之而作效者亦有試之而罔功者非藥之不應乃由衝任極虛血海極寒故爾蓋血緩則流暢外為月事內灌百脈今既虛極而又寒極血寒則凝而不運是以崩中不已狀如豚肝或下五色或與血俱下或如泔涕或如豆羹汁或如藍靛色或純下瘀血此血寒之極所致若以謂血熱致崩而用涼藥誤矣每用歲丹作效始進三五粒而未愈再進十粒尤未愈服至四五十粒瘥愈服至百粒方能作效此歲丹之力也然歲丹之性全恃火力如水寒成冰血寒成塊血得溫則流散四肢冰得日則烘消成水血凝得丹而流暢火之力也大抵醫者意也以意醫之所以作效倘或疑而未敢輕用先進陽起石丸服之二日未效卻進歲丹庶無可疑矣又有室女二七天癸當至也有當至而未至者近十八九左右方行者有卒然暴下亦有淋瀝不止有若崩漏者卻又不宜服前二藥也惟當以四物湯加香附子煎血色鮮而不止者挾熱也宜去熟地黃加生地黃煎臨病之際又在乎審處之鎮宮丸治婦人崩漏不止或下五色或赤白不定或如豆汁或狀若豚肝或下瘀血臍腹脹痛頭暈眼花久久不止令人黃瘦口乾胸煩不食代赭石火煅醋淬七次紫石英火煅醋淬七次禹餘糧火煅醋淬七次香附子醋炙各二兩陽起石煅紅細研芎藭鹿茸燎去毛醋蒸焙茯神去木阿膠銼蛤粉炒成珠子蒲黃炒當歸去蘆酒浸各一兩血竭別研半兩上為細末用艾煎醋汁打糯米和丸如梧桐子大每服七十丸空心米飲下十灰丸治崩中下血不止錦灰黃絹灰馬尾灰艾葉灰藕節灰蓮蓬灰油發灰赤松皮灰棕櫚灰蒲黃灰上等分為細末用醋煮糯米糊為丸如梧桐子大每服七十丸加至一百丸空心米飲下柏子仁湯治婦人憂思過度勞傷心經心主於血心虛不能維持諸經之血亦能致崩中下血之患當歸去蘆酒炒芎藭茯神去木小草阿膠銼蛤粉炒成珠子鹿茸燎去毛酒蒸焙柏子仁炒各一兩香附子炒去毛二兩川續斷酒浸一兩半甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓空心食前溫服陽起石丸治衝任不交虛寒之極崩中不止變生他證陽起石火煅紅別研令極細二兩鹿茸去毛醋炙一兩上為細末醋煎艾汁打糯米糊為丸如梧桐子大每服百丸空心食前米飲送下加減四物湯治室女二七天癸至亦有當時未至而後至者有卒然暴下淋瀝不止有若崩漏者失血過多變生諸證悉宜服之川當歸去蘆酒潤切焙一兩川芎一兩熟地黃洗淨一兩白芍藥一兩香附子炒去毛一兩半上班㕮咀每服四錢水一盞半生薑五片煎至七分去滓食前溫服如血色鮮而不止者去熟地黃加生地黃煎帶下論治巢氏病源論婦人有三十六疾所論三十六疾者七症八瘕九痛十二帶下是也然所謂十二帶下者亦不顯其證狀今人所患惟赤白二帶而已推其所自勞傷過度衝任虛損風冷據於胞絡此病所由生也且婦人平居之時血欲常多氣欲常少方謂主氣有原百疾不生倘或氣倍於血氣倍生寒血不化赤遂成白帶氣平血少血少生熱血不化經遂成赤帶寒熱交併則赤白俱下有室女虛損而有此疾者皆令孕育不成以致絶嗣凡有是證速宜治之久而不治令人面色皯𪒟肌肉瘦瘠腹脅脹滿攻刺疼痛甚致足脛枯細多苦逆冷尫羸不能食矣診其脈右手尺脈浮浮為陽陽絶者無子苦足冷帶下也白堊丸治婦人白帶久而不止面生皯𪒟繞臍疼痛腰膝冷痛日漸虛困産後白帶並宜服之白堊火煅禹餘糧煅醋淬七次鱉甲醋炙烏賊骨醋炙當歸去蘆酒浸鵲巢灰乾薑炮紫石英火煅醋淬七次附子炮去皮臍金毛狗脊燎去毛芎藭各一兩艾葉灰半兩鹿茸燎去毛切片醋炙一兩香附子醋煮二兩上為細末醋煮糯米糊為丸如梧桐子大每服七十丸空心用溫酒米飲任下白蘞丸治室女衝任虛寒帶下純白鹿茸醋蒸焙二兩白蘞金毛狗脊燎去毛各一兩上為細末用艾煎醋汁打糯米糊為丸如梧桐子大每服五十丸空心溫酒下當歸煎治婦人室女赤帶不止腹內疼痛四肢煩疼不欲飲食日漸羸瘦當歸去蘆酒浸赤芍藥牡蠣火煅取粉熟地黃酒蒸焙阿膠銼蛤粉炒成珠子白芍藥續斷酒浸以上各一兩地榆半兩上為細末醋糊為丸如梧桐子大每服五十丸空心米飲送下
