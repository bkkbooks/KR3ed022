front:
  text: 原序一古人不在朝廷之上必居醫卜之中雖然醫之為藝誠難矣亦貴乎精也所謂精者當先造於四者之妙而已古人云脈病證治是也夫微妙在脈不可不察察之有理乃知受病之因得病之因乃識其證既識其證則可詳其所治四者不失臨病之際可以療寒以冷有餘者與之不足者取之是謂實實虛虛損不足而益有餘苟不明此鮮有不致斃者良可嘆哉用和幼自八歲喜讀書年十二受學於復真劉先生之門先生名開立之其字也獨荷豫進面命心傳既十七四方士夫曾不以少年淺學而邀問者踵至今留心三十餘歲矣偶因暇間慨念世變有古今之殊風土有燥濕之異故人稟亦有厚薄之不齊概執古方以療今之病往往枘鑿之不相入者輒因臆見乃度時宜採古人可用之方裒所學已試之效疏其論治犁為條類名曰濟生方集既成不敢私祕竟鋟諸木用廣其傳不惟可以備衛生家緩急之需抑以示平日師傳濟生之實意云時寶治癸丑上已廬山嚴用和序原序二余夙嗜方書蚤即師授以醫道行世五十餘年比因暇日論治凡八十制方凡四百總為十卷號濟生方總而用之十有五年收效甚多然間有前書所未備而不可盡索者因著續方為方又九十為評二十四用鋟諸梓以廣其傳或謂古者處齊不過數種針灸不過數處君之方奚以多為余應之曰醫者意也生意在天地間一息不可間斷續此方所以續此意續此意所以續此生請勿多議余時咸淳丁卯良月廬山嚴用和謹書
