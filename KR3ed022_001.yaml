氣散白朮白茯苓去皮青皮去白香白芷陳皮去白天台烏藥人參各一兩甘草炙半兩上為細末每服三錢水一大盞煎至七分溫服不拘時候仍以酒化蘇合香丸間服有風之人先宜服此次進治風藥小續命湯治卒中風欲臥身體緩急口目不正舌強不語奄奄忽忽神情悶亂諸風服之皆驗不令人虛防已麻黃去根節湯泡人參桂心不見火黃芩甘草炙白芍藥杏仁湯浸去皮尖炒芎藭各一兩附子炮去皮臍一枚防風去蘆一兩半上㕮咀每服四錢水一盞半生薑七片棗二枚煎至七分去滓溫服不拘時候恍惚者加茯神遠志骨煩疼本有熱者去附子加秦艽一兩星附湯治因虛中風痰涎壅塞不省人事脈來沉伏服涼藥不得者附子去皮生用天南星生用各一兩木香半兩不見火上㕮咀每服四錢水二盞生薑九片煎至七分去滓溫服不拘時候兼寒者當用熟星附沉困甚手足厥冷者加川烏名曰三生飲不效者加天雄名曰三建湯痰涎壅塞聲如牽鋸服藥不下宜於關元丹田二穴多灸之良虎脛骨酒治中風偏枯半死行勞得風若鬼所擊四肢不遂不能行步但是一切諸風攣急之證悉皆治療石斛去根石楠葉防風去蘆虎脛骨酥炙當歸去蘆茵芋葉杜仲川牛膝去蘆芎藭金毛狗脊燎去毛川續斷川巴戟去心各一兩上件銼如豆大以絹囊盛藥以酒一斗漬之十日每服一盞蕩熱服不拘時候搐鼻法治卒暴中風昏塞不省牙關緊急藥不得下咽者細辛洗去土葉豬牙皂角去子上各一錢研為細末每用少許以紙捻蘸藥入鼻俟噴嚏然後進藥稀涎散治風涎不下喉中作聲狀如牽鋸半夏大者十四枚生切片豬牙皂角一條炙上作一服水二盞煎一盞去滓入薑汁少許溫服不能咽徐徐灌之星香散治諸風及痰厥天南星一兩生用木香二錢上㕮咀分作二服水二盞生薑十片煎至七分去滓溫服不拘時候省風湯治中風痰涎壅塞口眼喎斜半身不遂不省人事半夏生用防風去蘆甘草半兩炙全蠍去毒三個白附子生用川烏生用木香天南星生用各半兩上㕮咀每服半兩水二盞生薑十片煎至八分去滓溫服不拘時候豨蘞丸治中風偏風口眼喎斜時吐涎沫語言蹇澀筋脈拘攣手足緩弱伏床不起之證悉宜服之久服耳目聰明髭鬢烏黑筋力壯健多有效驗又曰治中風口眼喎斜四肢頑痹豨蘞草一名火杴草上五月五日六月六日七月七日收採洗去土摘其葉不拘多少九蒸九曝每一次蒸用少酒蜜水灑之蒸一飯久曝乾如此九遍蒸曝日乾為末煉蜜為丸如梧桐子大每服百丸空心食前溫酒米飲任下此草多生於沃壤間帶豬蘞氣者是二香三建湯治男子婦人中風虛極六腑俱微舌強不語痰涎並多精神如癡手足偏廢不能舉運此等證候不可攻風只可扶虛天雄生去皮用附子生去皮用川烏生去皮用各一兩木香不見火半兩沉香旋磨水入上㕮咀每服四錢水二盞生薑十片煎至七分去滓溫服空心食前壽星丸治因病驚憂涎留心胞精神不守譫言妄語不得安臥天南星一斤生用琥珀一兩別研硃砂水飛二兩上為細末和勻用生薑自然汁打麵糊為丸如緑豆大每服四十丸不拘時候用人參石菖蒲煎湯送下淡薑湯亦得若心氣狂甚入鐵豔粉一兩排風湯治風濕虛冷邪氣入臟狂言妄語精神錯亂肝風發則面青心悶吐逆嘔沫脅痛頭眩不聞人聲偏枯筋急曲蜷而臥心風發則面赤翕然而熱悲傷嗔怒目張呼喚脾風發則面黃身體不仁不能行步飲食失味夢寐顛倒與亡人相隨肺風發則面白咳逆唾膿血上氣奄然而極腎風發則面黑手足不遂腰痛難以俯仰冷痹骨疼諸有此證令人心驚志意不定恍惚多忘服此湯安心志聰耳明目逐臟腑諸風疾悉主之白朮白蘚皮芎藭白芍藥當歸去蘆桂心不見火防風去蘆杏仁去皮尖甘草炙各一兩獨活去蘆麻黃去根節茯苓去皮各三兩上㕮咀每服四錢水一盞半生薑七片棗二枚煎七分去滓溫服不拘時候服之微汗不妨此藥大理榮血摧抑肝邪肝實有風脈來浮實有力目赤脅疼口苦心煩錯語多怒宜加羚羊角熱盛者加犀角肝虛有風脈來浮虛無力當去麻黃加黃耆不能言語者加荊瀝青龍妙應丸治諸風攣急遍體疼痛遊走無定百藥之所不效者穿山甲十五片石灰炒全蠍去毒三七個地龍去土一兩蚣蜈七條生用麝香一字別研草烏生去皮一兩沒藥三錢別研乳香三錢別研松香半兩斑蝥七個糯米炒去尖足白殭蠶薑汁炒半兩五靈脂三錢去砂石上為細末酒糊為丸如緑豆大以青黛為衣每服二十丸不拘時候溫酒送下忌食熱物加減地仙丹治風冷邪濕留滯下焦足膝拘攣腫滿疼痛不能步履地龍炒去土五靈脂去石烏藥白膠香別研椒紅炒去汗威靈仙木瓜去瓤赤小豆炒黑豆炒去皮天仙藤川烏炮去皮五加皮蒼朮泔水浸去黑皮炒木鱉子去殼油上等分為細末酒糊為丸如梧桐子大每服七十丸空心用鹽酒鹽湯任下換肌丸治諸癩大風疾苦參三兩大風油一兩上將苦參為細末入大風油及少酒糊為丸如梧桐子大每服五十丸不拘時候用溫酒送下仍將苦參煎湯帶熱洗之為佳白虎歷節論治夫白虎歷節病者世有體虛之人將理失宜受風寒濕毒之氣使筋脈凝滯血氣不流蘊於骨節之間或在四肢肉色不變其病晝靜夜劇其痛徹骨如虎之齧名曰白虎之病也痛如掣者為寒多腫滿如脫者為濕多汗出者為風多巢氏云飲酒當風汗出入水遂成斯疾久而不愈令人骨節蹉跌為癲病者誠有此理也羌活湯治白虎歷節風毒攻注骨髓疼痛發作不定羌活去蘆二兩附子炮去皮臍秦艽去蘆桂心不見火木香不見火川芎當歸去蘆川牛膝去蘆酒浸桃仁去皮尖麩炒骨碎補防風去蘆各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候虎骨散治白虎風肢節疼痛發則不可忍虎骨酥炙二兩花蛇酒浸取肉天麻防風去蘆川牛膝去蘆酒浸白殭蠶炒去絲嘴川當歸去蘆酒浸乳香別研桂心不見火各一兩甘草炙全蠍去毒各半兩麝香一錢別研上為細末每服二錢溫酒調服或用豆淋酒調服亦可不拘時候蠲痛丸治諸風歷節令人骨節疼痛腫滿古今以來無問貴賤往往苦之此是風之毒害者也又曰治諸風歷節疼痛及手下側疼痛川烏一枚生用黑豆七七粒生去皮全蠍二七個去毒地龍去土半兩麝香半錢別研上為細末用清酒糊為丸如緑豆大每服十五丸加至二十丸臨臥膈空用冷酒吞下微汗不妨諸寒門中寒論治素問云冬三月是謂閉藏水冰地坼無擾乎陽早臥晚起必待日光此去寒就溫之意也不善調攝觸冒之者卒然眩暈口噤失音四肢強直或灑灑惡寒或翕翕發熱面赤多汗大抵中寒脈必遲緊挾風則脈浮眩暈不仁兼濕則脈濡腫滿疼痛治之之法切不可妄下妄吐惟當溫散之又論夫人生天地之間以氣血籍其真是故天無一歲不寒暑人無一日不憂苦故有傷寒天行瘟疫之病焉蓋冬令為殺厲之氣君子善攝生者當嚴寒之時行住坐臥護身周密故不犯寒毒彼奔馳荷重勞房之人皆辛苦之徒耳當陽閉藏而反擾動之則鬱發腠理津液強漬為寒所薄膚腠緻密寒毒與榮衛相渾當是之時壯者氣行則已怯者則著而成病矣不即病者寒氣藏於肌骨之間春則病溫夏則病熱此皆一氣使然也古之治法一曰在皮當摩膏而火灸之二曰在膚依法針解肌發散之汗出而愈三曰在肌再亦發汗則愈四曰在胸宜吐之五曰在腹六曰在胃宜下之此華他之治法也若按三陰三陽之法傳變無出仲景之書蓋治傷寒有法治雜病有方雜病之方可以異其傳調理傷寒當按定法也茲不復述今俱四時大略用藥於後春病風寒頭痛發熱身體強痛宜進香蘇散或十神湯或欲發汗加蔥白薑豉煎夏感風暑頭痛發熱身疼煩渴宜用五苓散或煎蔥白湯調服秋感風冷身熱頭痛鼻塞咳嗽宜進金沸草散冬冒風寒身熱頭痛無汗惡寒宜進五積散以上方載和劑局方中薑附湯治五臟中寒口噤四肢強直失音不語或卒然暈悶手足厥冷乾薑炮附子炮去皮臍甘草炙各等分上㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服食前挾風不仁加防風半兩兼濕腫滿加白朮半兩筋脈攣急加木瓜半兩肢節疼痛加桂心半兩諸暑門中暑論治夫中暑所以脈虛者蓋熱傷氣而不傷形也且暑者在天為熱在地為火在人臟為心是以暑氣傷心令人身熱頭痛狀類傷寒但背寒面垢此為異耳甚則昏倒不知人手足微冷煩渴口燥或吐或瀉或喘或滿此皆暑氣之所為也大抵中暑悶亂切不可便與冷水及臥冷濕地得冷則死唯溫養用布衣蘸熱湯尉臍中及氣海或掬熱土圈臍心乃更溺之候漸蘇醒以米湯徐徐灌之然後隨證調治近來江浙之間中暑多有搐搦不省人事者屢見之矣醫經所載診其脈浮而虛蓋浮則為風虛則為暑此中暑而又傷風故有是證俗命名謂之暑風若作驚癇治之多致不救倉卒之際宜以溫熱水化蘇合香丸灌之候期稍蘇卻以黃連香薷散加羌活煎服作效者多矣二氣丹治伏暑傷冷二氣交錯中脘痞悶或頭痛惡心並皆治之硝石硫黃等分上為末於銀石器內文武火上炒令鵝黃色再研細用糯米糊為丸如梧桐子大每服四十丸新汲水送下不拘時候水浸丹治伏暑傷冷冷熱不調口乾煩渴黃丹一兩一分巴豆二十五枚去皮心上同研勻用黃蠟拌作汁丸如梧桐子大每服五丸以冷水浸少頃別以新汲水吞下冷香飲子治老人虛人伏暑煩躁引飲無度噁心疲倦服涼藥不得者草果仁三兩附子炮去皮臍橘紅各一兩甘草炙半兩上㕮咀每服一兩水二碗生薑十片煎至半碗去滓沉冷旋旋服不拘時候加味香薷飲治伏暑傷冷霍亂轉筋煩渴心腹撮痛吐利交作四肢厥冷香薷半斤扁豆四兩厚朴薑製炒六兩檳榔二兩黃連去須三兩上㕮咀每服四錢水一盞用酒半盞煎至八分去滓沉冷服不拘時候諸濕門中濕論治活人書云風雨襲虛山澤蒸氣令人中濕濕流關節身體煩痛其脈沉緩為中濕大抵中濕變證萬端挾風者為煩熱為流走為拘急兼寒者為痛為浮腫與風寒二氣合則為痹皆由中濕而後挾以異氣而然也治濕之法不可大發汗慎不可以火攻之唯當利其小便醫經所謂治濕不利小便非其治也撫芎湯治濕流關節臂疼手重不可俯仰或自汗頭眩痰逆噁心撫芎白朮橘紅各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑七片煎至八分去滓溫服不拘時候滲濕湯治坐臥濕地或為雨露所襲身重腳弱關節重疼發熱惡寒或多汗惡風或腿膝浮腫或小便不利大腑溏泄白朮二兩人參半兩乾薑炮白芍藥附子炮去皮臍白茯苓去皮桂枝不見火甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片大棗一枚煎至八分去滓溫服不拘時候羌附湯治風濕相搏身體疼煩掣痛不可屈伸或身微腫不仁羌活去蘆附子炮去皮臍白朮甘草炙上等分㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候痼冷積熱門痼冷積熱論治一陰一陽之謂道偏陰偏陽之謂疾夫人一身不外乎陰陽氣血相與流通焉耳如陰陽得其平則疾不生陰陽偏勝則為痼冷積熱之患也所謂痼冷者陰毒沉涸而不解也積熱者陽毒蘊積而不散也故陰偏勝則偏而為痼冷陽偏勝則偏而為積熱古賢云偏勝則有偏害偏害則致偏絶不可不察也大抵真陽既弱胃氣不溫復啖生冷冰雪以益其寒陰沍於內陽不能勝遂致嘔吐涎沫畏冷憎寒手足厥逆飲食不化大腑洞泄小便頻數此皆陰偏勝而為痼冷之證也其或陰血既衰三焦已燥復餌酒炙丹石以助其熱陽熾於內陰不能制遂致口苦咽乾涎稠目澀膈熱口瘡心煩喜冷大便閉結小便赤淋此皆陽偏勝而為積熱之證也施治之法冷者熱之熱者冷之痼者解之積者散之使陰陽各得其平則二者無偏勝之患矣洞陽丹治陽虛陰盛手足厥冷暴吐大下脈細羸瘦傷寒陰證悉皆治之附子炮去皮臍鍾乳粉各二兩天雄炮去皮三兩川烏炮去皮四兩陽起石火煅一兩硃砂一兩別研細上為細末酒煮神麯糊為丸如梧桐子大每服五十丸空心溫酒鹽湯任下豆附丸治久虛下寒泄瀉不止腸滑不禁日夜無度全不進食一切虛實泄瀉困乏並皆治之肉豆蔻麵裹煨附子炮去皮臍良薑銼炒訶子麵裹煨乾薑炮赤石脂火煅陽起石火煅龍骨生用白礬枯各二兩白茯苓去皮桂心不見火細辛洗各一兩上為細末酒煮麵糊為丸如梧桐子大每服七十丸空心食前米飲送下利膈湯治上膈壅熱口苦咽乾痰唾稠黏心煩喜冷咽喉生瘡疼痛但是一切上壅之證皆可服之防風去蘆雞蘇葉桔梗去蘆牛蒡子荊芥穗各一兩川升麻人參甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候三黃丸治三焦積熱頭目昏痛肩背拘急肢節煩疼熱氣上衝口苦唇焦咽喉腫痛痰涎壅滯眼赤睛疼及大便祕澀或下鮮血大黃酒蒸黃連去須黃芩各等分上為細末煉蜜為丸如梧桐子大每服五十丸不拘時候用溫熟水送下如臟腑壅實可加丸數以利為度諸虛門虛損論治醫經所説諸虛百損難經所有五損不過因虛而致損也素問云恬淡虛無真氣從之精神內守病安從來人能法道清淨精神內持疴疾不起乃知固養之道也不自衛生或大病未復便合陰陽或疲極筋力飢飽失節盡神度量或叫呼走氣榮衛虛損百病交作或吐血衄血便血瀉血遺泄白濁冷滑洞泄盜汗自汗潮熱發熱嘔吐啘咯痰飲涎沫等證因斯積微成損積損成衰者多矣且婦人産蓐過於大病之後虛損尤甚治之之法詳審脈理原其所自隨證施治然病候非一略具數條以為備治之要又論夫人稟中和之氣以生常能保守真元何患乎有病焉不善衛生者思慮役其知嗜欲亂其真營衛一虛因茲積微成損積損成衰及其病也既不能御氣以全身又不能餌藥以延壽聖人有言曰治未病不治已病治未亂不治已亂夫病已成而後藥亂已成而後治不亦晚乎凡人有虛損之病豈可不早為之補益庶有延齡之望後方所載藥性平補柔而不僭專而不雜間有藥用群隊必使剛柔相濟佐使合宜可以取效前賢之書有單服附子之戒者正慮其腎惡燥也既欲用一剛劑專而易效須當用一柔劑以制其剛則庶幾剛柔相濟不特取效之速亦可使無後患後方所載參附沉附茸附耆附是矣若陽虛陰極之證當有薑附三建諸丹之類或升或沉為之佐使欲其剛多於柔不致太僭庶免炎上之患用藥在乎穩重故也大建中湯治諸虛不足小腹急痛脅肋䐜脹骨肉痠痛短氣喘促痰多咳嗽潮熱多汗心下驚悸腰背強痛多臥少氣黃耆去蘆附子炮去皮臍鹿茸酒蒸地骨皮去木續斷石斛去根人參川芎當歸去蘆酒浸白芍藥小草各一兩甘草炙半兩上㕮咀每服四錢水一盞半生薑五片煎至七分去滓溫服不拘時候咳嗽者加款冬花咳血者加阿膠便精遺泄者加龍骨怔忡者加茯神芡實丸治思慮傷心疲勞傷腎心腎不交精元不固面少顏色驚悸健忘夢寐不安小便赤澀遺精白濁足脛痠疼耳聾目昏口乾腳弱芡實蒸去殼蓮花須各二兩茯神去木山茱萸取肉龍骨五味子枸杞子熟地黃酒蒸焙韭子炒肉蓯蓉酒浸川牛膝去蘆酒浸焙紫石英煅七次各一兩上為細末酒煮山藥糊為丸如桐子大每服七十丸空心鹽酒鹽湯任下白丸治元氣虛寒精滑不禁大腸溏泄手足厥冷陽起石煅研令極細鍾乳粉各等分上為細末酒煮附子糊為丸如桐子大每服五十丸空心米飲下黑丸治精血耗竭面色黧黑耳聾目昏口乾多渴腰痛腳弱小便白濁上燥下寒不受峻補鹿茸酒蒸當歸去蘆酒浸上等分為細末煮烏梅膏為丸如桐子大每服五十丸空心米飲下玉關丸治諸虛不足膀胱腎經痼敗陰陽不交致生多病水欲升而沃心火欲降而溫腎如是則坎離既濟陰陽協和火不炎而神自清水不滲而精自固久服閉精補益永無膏淋白濁遺精之患神效非一難以具述辰砂一兩鹿茸二兩作片酥炙當歸酒浸焙附子七錢重者四個生去皮臍各切下項剜空心中安辰砂在內以前項子蓋定用線扎木瓜大者二個去皮瓢切開項入辰砂附子四個在內以木瓜原項子蓋之線扎定蒸爛訖取出附子切作片焙乾為末辰砂細研水飛木瓜研如膏宣瓜為妙柏子仁炒別研沉香別研巴戟去心黃耆去蘆蜜炙肉蓯蓉酒浸茯神去心川牛膝去蘆酒浸石斛去根酒浸各一兩杜仲去粗皮酒浸菟絲子水淘淨酒浸焙別研五味子各一兩半遠志去心炒二兩上為細末用木瓜膏杵和入少酒糊為丸如桐子大每服七十丸空心米飲溫酒鹽湯任下膃肭臍丸治五勞七傷真陽衰憊臍腹冷痛肢體痠疼腰背拘急腳膝緩弱面色黧黑肌肉消瘦目眩耳鳴口苦舌乾飲食無味腹中虛鳴脅下刺痛心常慘戚夜多異夢晝少精神小便滑數大腸溏泄時有遺瀝陽事不舉但是風虛痼冷皆宜服之膃肭臍一對酒蒸熟打和後藥天雄炮去皮附子炮去皮臍川烏炮去皮尖陽起石煅鍾乳粉各二兩獨體硃砂研極細人參沉香不見火別研鹿茸酒蒸一兩上為細末用膃肭臍膏入少酒臼內杵和為丸如桐子大每服七十丸空心鹽酒鹽湯任下黃犬肉丸治真精衰憊臍腹冷痛小便頻數頭暈耳鳴足脛酸冷步履無力腰背拘痛水穀不消飲食無味肌肉瘦悴遺泄失精磁石三兩煅水飛川烏炮去皮尖附子炮去皮臍桑寄生鹿茸燎去毛酒蒸麋茸同上制仙茅酒浸肉蓯蓉酒浸切焙川巴戟去心葫蘆巴炒各二兩沉香別研青鹽別研陽起石煅研極細龍骨生