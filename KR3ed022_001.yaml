body:
  text: 五臟門肝膽虛實論治夫肝者足厥陰之經位居東方屬乎甲乙木開竅於目候於左脅其政變動病發驚駭藏魂養筋者是也與足少陽膽之經相為表裡謀慮過制喜怒不節疲勞之極擾亂其經因其虛實由是寒熱見焉方其虛也虛則生寒寒苦脅下堅脹時作寒熱腹滿不食悒悒不樂如人將捕眼生黑花視物不明口苦頭痛關節不和筋脈攣縮爪甲乾枯喜怒悲恐不得太息診其脈沉細而滑者皆虛寒之候也及其實也實則生熱熱者心下堅滿兩脅下痛痛引小腹令人善怒氣逆頭暈眥赤悒悒先寒後熱頸直背強筋急不得屈伸診其脈浮大而數者皆實熱之候也脈來弦而長乃不病之脈脈來弦而澀或急而益徑如新張弓弦或脈至中外急急如循刀刃嘖嘖然如按琴瑟弦者此皆肝死矣治之之法當分虛實冷熱而調之以平為期柏子仁湯治肝氣虛寒兩脅脹滿筋脈拘急腰膝小腹痛面青口噤柏子仁炒白芍藥防風去蘆茯神去木當歸去蘆酒浸芎藭附子炮去皮各一兩細辛洗去土葉桂心不見火甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候柴胡散治肝氣實熱頭痛目眩眼目赤痛胸中煩悶夢寐驚恐肢節不利柴胡去蘆地骨皮去木玄參羚羊角鎊甘菊花去枝梗赤芍藥黃芩各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候茯神湯治膽氣虛冷頭痛目眩心神恐畏不能獨處胸中滿悶茯神去木酸棗仁炒去殼黃耆去蘆白芍藥五味子柏子仁炒各一兩桂心不見火熟地黃洗人參甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至七分去滓溫服不拘時候酸棗仁丸治膽氣實熱不得睡神思不安茯神去木酸棗仁炒去殼遠志去心炒柏子仁炒別研防風去蘆各一兩生地黃洗枳殼去瓤各半兩青竹茹二錢半上為細末煉蜜為丸如梧桐子大每服七十丸不拘時候熟水送下心小腸虛實論治夫心者手少陰之經位居南方屬乎丙丁火為形之君外應於舌主宰一身統攝諸臟血脈灌溉溪谷內潤五臟外衛腠理與手陽明小腸之經相為表裡若憂愁思慮傷之因其虛實由是寒熱見焉方其虛也虛則生寒寒則血脈虛少時多恐畏情緒不樂心暴痛時唾清涎心膈脹悶好忘多驚夢寐飛揚精神離散其脈浮而虛者是虛寒之候也及其實也實則生熱熱則心神煩亂面赤身熱口舌生瘡咽燥頭痛喜笑恐悸手心煩熱汗出衄血其脈洪實者是實熱之候也診其脈浮大而散是不病之脈反得浮澀而短或前曲後據如操帶鉤此皆心死矣治之之法熱則清之寒則溫之又當審其所自焉補心丸治憂愁思慮過度心血虛寒悸恐不樂舌強話難恍惚喜忘愁恚面黃多汗不進飲食紫石英火煅研細熟地黃洗菖蒲茯神去木當歸去蘆附子炮去皮臍黃耆去蘆遠志去心炒川芎桂心不見火龍齒各一兩人參半兩上為細末煉蜜為丸如梧桐子大每服七十丸不拘時候用棗湯下心丹又名法丹此丹顆粒辰砂加心藥煮煉主男子婦人心氣不足神志不寧憂愁思慮謀用過度或因驚恐傷神失志耗傷心氣恍惚振悸差錯健忘夢寐驚魘喜怒無時或發狂眩暈不省人事及治元氣虛弱唇燥咽乾潮熱盜汗或肺熱上壅痰唾稠黏咳嗽煩渴或大病後心虛煩躁小兒心氣虛弱欲發驚癇或直視發搐應是一切心疾並宜服之常服養心益血安魂定魄寧心志止驚悸順三焦和五臟助脾胃進飲食聰明耳目悅澤顏色輕身耐老不僭不燥神驗不可具述硃砂五十兩新羅人參遠志去心甘草煮熟地黃洗淨酒蒸焙白朮石菖蒲當歸去蘆酒浸焙麥門冬去心黃耆去蘆茯苓去皮茯神去木柏子仁揀淨木鱉仁炒去殼石蓮肉去心炒益智仁以上各五兩上加人參等十四味各如法修制銼碎拌勻次將此藥滾和以夾生絹袋盛貯用麻線緊繫袋口於尖上安大銀鍋一口著長流水令及七分重安銀罐入白沙蜜二十斤將藥袋懸之中心勿令著底使蜜浸袋令沒以桑柴燒鍋滾沸勿令火歇煮三日蜜焦黑換蜜再煮候七日足住火取出淘去衆藥洗淨砂令乾入牛心內蒸七次蒸煮砂時別安銀鍋一口暖水候大鍋水耗從鍋弦添溫水候牛心蒸爛熟取砂再換牛心如前法蒸凡換七次其砂已熟即用沸水淘淨焙乾入乳鉢玉杵研直候十分細米粽為丸如豌豆大陰乾每服十粒至二十粒食後參湯棗湯麥門冬湯任下導赤散治心臟實熱口乾煩渴或口舌生瘡驚怖不安黃連去須麥門冬去心半夏湯泡七次地骨皮去木茯神去木赤芍藥木通去節生地黃洗黃芩以上各一兩甘草炙半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候椒附丸治小腸虛冷小便頻多椒紅炒出汗桑螵蛸酒炙龍骨生用山茱萸取肉附子炮去皮鹿茸酒蒸焙上等分細末酒糊為丸如梧桐子大每服七十丸空心鹽湯送下赤茯苓湯治小腸實熱面赤多汗小便不利木通去節赤茯苓去皮檳榔生地黃洗黃芩赤芍藥甘草炙麥門冬去心上等分㕮咀每服四錢水一盞半生薑五片煎至八分去滓溫服不拘時候脾胃虛實論治夫脾胃者足太陰之經位居中央屬乎戊巳土主於中州候身肌肉與足陽明胃之經相為表裡表裡溫和水穀易於腐熟運化精微灌溉諸經若飲食不節或傷生冷或思慮過度沖和失布因其虛實由是寒熱見焉方其虛也虛則生寒寒則四肢不舉食飲不化喜噫吞酸或食即嘔吐或卒食不下腹痛腸鳴時自溏泄四肢沉重常多思慮不欲聞人聲夢見飲食不足脈來沉細軟弱者皆虛寒之候也及其實也實則生熱熱者心胸煩悶唇焦口乾身熱頰痛體重腹脹善飢善瘛甚則舌根腫強口內生瘡夢見歌樂四肢怠墮脈來緊實者是實熱之候也況土旺四季各十八日脈來常欲中緩而短乃不病之脈也如鳥之喙如烏之啄如屋之漏如水之溜此皆脾死矣進食散治脾胃虛寒或食生冷或飲食不節或因思慮傷動沖和之氣胸膈痞塞腹脹怠墮全不進食痰逆噁心大便溏泄半夏曲肉豆蔻麵裹煨草果仁高良薑銼炒麥糵炒附子炮去皮丁香厚朴去皮薑汁炒陳皮去白各一兩人參去蘆青皮去白甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不拘時候六君子湯治脾臟不和不進飲食上燥下寒服熱藥不得者人參白朮各一兩橘紅半夏湯洗七次枳殼去瓤麩炒甘草炙各半兩上㕮咀每服四錢水一盞半生薑七片棗子一枚煎至七分去滓溫服不拘時候畢澄茄丸治脾胃虛弱胸膈不快不進飲食畢澄茄不拘多少上為細末薑汁打神麯末煮糊為丸如梧桐子大每服七十丸食後淡薑湯吞下附子建中湯治脾氣虛寒腹脅脹滿身體沉重面色痿黃嘔吐不食水穀不化大腑自利肉豆蔻麵裹煨白豆蔻仁附子炮去皮厚朴去皮薑製炒白朮乾薑炮紅豆神麯炒各一兩丁香胡椒木香不見火甘草炙各半兩上㕮咀每服四錢水一盞半生薑五片棗子一枚煎至七分去滓溫服不拘時候生胃丹治脾胃不足痰多嘔逆不思飲食此藥以南星粟米黃土為主蓋南星醒脾粟米養胃黃土取其以土養土性味和平為進食化痰之要劑真良方也大天南星四兩用真黃土半斤將生薑滓作黃土成面劑包裹南星慢火煨香透去土不用將南星切碎焙乾和後藥研丁香不見火粟米一斤用生薑二斤和皮擂取自然汁浸蒸焙木香不見火厚朴去皮薑汁裂炒神麯炒麥糵炒橘紅防風去蘆白朮谷蘖炒縮砂仁白豆蔻仁青皮去白各一兩半夏曲二兩人參沉香不見火甘草炙各半兩上為細末法丸如緑豆大每服七十丸不拘時候淡薑湯送下壯脾丸治脾胃虛寒飲食不進心腹脹滿四肢無力吐逆食不消或手足浮腫臟腑溏泄獖豬肚一枚洗淨用造酒大麴四兩同銼厚朴二兩茴香一兩入在肚內以線縫定外用蔥椒酒煮爛取大麴茴香厚朴焙乾和後藥肉豆蔻麵裹煨禹餘糧煅研極細縮砂仁麥糵炒神麯銼炒橘紅附子炮去皮臍白朮各一兩木香不見火丁香各半兩上為細末用豬肚杵和千百下丸如梧桐子大每服五十丸用米飲送下不拘時候胃丹硃砂稟太陰之精不經火煅以丁附等脾藥陰煉成丹平補不僭善治真陽衰虛心火怯弱不養脾土沖和失布中州虛寒飲食不進胸膈痞塞或不食而脹滿或已食而不消痰逆噁心翻胃吐食臟氣虛寒米穀不化心腹絞痛泄利不止應是一切脾胃諸疾不問男子婦人皆可服之硃砂大塊不夾石者五十兩新羅人參縮砂仁肉豆蔻麵裹煨畢澄茄白豆蔻仁紅豆高良薑銼炒附子炮去皮臍白朮厚朴薑汁製炒丁香不見火藿香葉五味子乾薑炮去土胡椒益智仁麥門冬去心草果仁橘紅以上各四兩上將人參等二十味各如法修制銼如豆大以銀鍋一口用白沙蜜五十斤將藥一半同蜜拌勻入銀鍋內以夾生絹袋盛貯硃砂懸宕鍋內以桑柴火重湯煮四日四夜換蜜五斤入前藥一半和勻再煮三日三夜取砂淘淨焙乾入乳鉢用玉錘研直候十分細米粽為丸如緑豆大陰乾每服十粒加至十五粒空心食前用人參湯送下棗湯亦得如或嘔吐用淡薑湯送下忌食豬羊血補真丸大抵不進飲食以脾胃之藥治之多不效者亦有謂焉人之有生不善攝養房勞過度真陽衰虛坎火不溫不能上蒸脾土沖和失布中州不運是致飲食不進胸膈痞塞或不食而脹滿或已食而不消大腑溏泄此皆真火衰虛不能蒸蘊脾土而然古人云補腎不如補脾余謂補脾不若補腎腎氣若壯丹田火經上蒸脾土脾土溫和中焦自治膈開能食矣葫蘆巴炒附子炮去皮臍陽起石煅川烏炮去皮菟絲子淘淨酒蒸沉香不見火別研肉豆蔻麵裹煨肉蓯蓉酒浸焙五味子各半兩鹿茸去毛酒蒸焙川巴戟去心鍾乳粉各一兩上為細末用羊腰子二對治如食法蔥椒酒煮爛入少酒杵和為丸如梧桐子大每服七十丸空心食前用米飲鹽湯任下瀉黃散治脾胃壅實口內生瘡煩悶多渴頰痛心煩唇口乾燥壅滯不食藿香葉七錢石膏煅縮砂仁山梔子仁甘草炙各半兩防風去蘆四兩上銼碎用蜜酒炒香焙為細末每服三錢水一大盞煎至七分去滓溫服不拘時候枳殼丸治脾實心腹壅滯四肢疼悶兩脅脹滿大小便不利皂角一挺去黑皮微炒枳殼去瓤麩炒川大黃二兩銼微炒羌活去蘆木香不見火橘紅桑白皮蜜水炙香白芷各二兩上為細末煉蜜為丸如桐子大每服七十丸空心米飲薑湯任下橘皮竹茹湯治胃熱多渴嘔噦不食赤茯苓去皮橘皮去白批杷葉拭去毛麥門冬去心青竹茹半夏湯泡七次各一兩人參甘草炙各半兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候肺大腸虛實論治夫肺者手太陽之經位居西方屬乎庚辛金為五臟之華蓋其氣象天其候胸中之氣布清氣於皮膚其政涼其令肅其主魄是肺之司化也與手陽明大腸之經相為表裡貴無偏勝之患或因叫呼或過食煎爆或飲酒過度或飢飽失宜因其虛實由是寒熱見焉方其虛也虛則生寒寒則聲嘶語言用力顫掉緩弱少氣不足咽中干無津液虛寒乏氣恐怖不樂咳嗽及喘鼻有清涕皮毛焦枯診其脈沉緩者是肺虛之候也及其實也實則生熱熱則胸膈滿鼻赤口張飲水無度上氣咳逆咽中不利肩背生瘡尻陰股膝髀腨肘足皆痛脈來浮澀而短者是不病之脈也脈來不上不下如循雞羽曰病按之消索如風吹毛曰死白石英湯治肺氣虛弱惡寒咳嗽鼻流清涕喘息氣微白石英細辛洗去土五味子陳皮去白鍾乳粉阿膠銼蛤粉炒桂心不見火人參甘草炙各半兩紫菀洗一兩上㕮咀每服四錢水一盞半薑五片煎至八分去滓溫服不拘時候瀉白散治肺臟實熱心胸壅悶咳嗽煩喘大便不利桑白皮炙桔梗去蘆銼炒